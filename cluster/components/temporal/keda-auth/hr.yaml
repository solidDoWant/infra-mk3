---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Standalone tbot deployment that issues a Temporal JWT-SVID for the ${NAMESPACE}
# Temporal namespace (permissions=["${NAMESPACE}:read"]) and writes it to the shared
# Secret `${NAMESPACE}-temporal-keda-auth`. KEDA scalers in this namespace
# consume the secret via TriggerAuthentication to authenticate to the
# Temporal frontend.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${NAMESPACE}-temporal-keda-auth
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      ${NAMESPACE}-temporal-keda-auth:
        replicas: 2
        # Both replicas write the same Secret. Available > Consistent: a
        # rolling restart would briefly leave only one pod running, but the
        # JWT in the Secret stays valid until the next renewal regardless.
        strategy: RollingUpdate
        podDisruptionBudget:
          minAvailable: 1
        serviceAccount:
          identifier: ${NAMESPACE}-temporal-keda-auth
        pod:
          labels:
            # Picked up by the central teleport-cluster netpol, which allows
            # any pod with this label to reach the proxy on the TLS-routing
            # port — no per-namespace netpol edit needed when adding new
            # tbot consumers.
            endpoints.netpols.home.arpa/teleport-bot-client: "true"
        containers:
          tbot:
            image:
              repository: public.ecr.aws/gravitational/tbot-distroless
              tag: 18.8.2
            args:
              - start
              - --config
              - /etc/tbot/tbot.yaml
              - --diag-addr
              - :4444
            env:
              # tbot's kubernetes_secret destination reads this to know which
              # namespace to write the Secret to.
              POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              # Dial the configured proxy_server for the reverse tunnel too,
              # instead of the proxy's advertised public_addr (teleport.<domain>,
              # which resolves to the internal gateway in-cluster). Keeps all
              # tbot traffic direct to the proxy ClusterIP. Requires the proxy's
              # TLS routing/multiplex mode, which is enabled.
              TBOT_USE_PROXY_ADDR: "yes"
            ports:
              - name: tbot-diag
                containerPort: 4444
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                port: tbot-diag
                path: /livez
              readiness:
                <<: *probe
                path: /readyz
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 64Mi

    defaultPodOptions:
      # Run pods in their own user namespace — UIDs in the container are
      # remapped on the host so a container-root escape lands as an
      # unprivileged host user. Safe here: no NFS mounts and no other
      # features incompatible with userns remapping.
      hostUsers: false
      securityContext:
        # Distroless tbot image's non-root user (65532).
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"

    service:
      ${NAMESPACE}-temporal-keda-auth:
        controller: ${NAMESPACE}-temporal-keda-auth
        ports:
          tbot-diag:
            port: 4444
            primary: true

    serviceMonitor:
      ${NAMESPACE}-temporal-keda-auth:
        enabled: true
        serviceName: ${NAMESPACE}-temporal-keda-auth
        endpoints:
          - port: tbot-diag

    configMaps:
      tbot-config:
        data:
          # Mounted at /etc/tbot/tbot.yaml in every tbot pod. Each pod joins
          # the cluster via its in-cluster ServiceAccount token and
          # continually renews a JWT-SVID (containing
          # permissions=["${NAMESPACE}:read"]) into the shared k8s Secret
          # `${NAMESPACE}-temporal-keda-auth`. TriggerAuthentications in this
          # namespace then surface the `jwt_svid` key as the Temporal
          # scaler's apiKey — KEDA re-reads the secret on each polling
          # interval, so renewals propagate without any restarts.
          tbot.yaml: |
            version: v2
            # In-cluster ClusterIP publicAddr of the proxy. tbot only joins and renews
            # SVIDs (no reverse tunnel), so it honors the dialed address and reaches the
            # proxy directly — bypassing the internal gateway. The proxy lists this name
            # in publicAddr and serves a matching internal keypair, so TLS/SNI validate.
            proxy_server: teleport-cluster.security.svc.cluster.local:443
            onboarding:
              token: ${NAMESPACE}-temporal-keda-auth
              join_method: kubernetes
            storage:
              type: memory
            services:
              - type: workload-identity-jwt
                selector:
                  name: ${NAMESPACE}-temporal-keda-auth
                audiences:
                  - temporal.${SECRET_PUBLIC_DOMAIN_NAME}
                destination:
                  # Both replicas write to the same Secret. Last-write-wins is fine:
                  # the JWTs are equivalent (same WID, same audience), and the
                  # Temporal frontend validates against the JWKS regardless of which
                  # tbot issued the token.
                  type: kubernetes_secret
                  name: ${NAMESPACE}-temporal-keda-auth

    persistence:
      tbot-config:
        type: configMap
        identifier: tbot-config
        defaultMode: 0440
        items:
          - key: tbot.yaml
            path: tbot.yaml
        advancedMounts:
          ${NAMESPACE}-temporal-keda-auth:
            tbot:
              - path: /etc/tbot
                readOnly: true
      # Cluster intermediate-CA root, distributed to every namespace by the
      # extract-root-ca-certificate Kyverno ClusterPolicy. tbot needs this to
      # validate the Teleport proxy's serving cert.
      tbot-root-ca:
        type: secret
        name: root-ca-pub-cert
        defaultMode: 0440
        items:
          - key: ca.pem
            path: root-ca.pem
        advancedMounts:
          ${NAMESPACE}-temporal-keda-auth:
            tbot:
              - path: /etc/ssl/certs/root-ca.pem
                subPath: root-ca.pem
                readOnly: true

    serviceAccount:
      ${NAMESPACE}-temporal-keda-auth: {}

    rbac:
      roles:
        ${NAMESPACE}-temporal-keda-auth:
          type: Role
          rules:
            # Tight: only the placeholder Secret created in secret.yaml.
            # tbot's kubernetes_secret destination calls Get and Update;
            # patch is included for compatibility with future tbot versions
            # that may switch to strategic-merge patches.
            - apiGroups:
                - ""
              resources:
                - secrets
              resourceNames:
                - ${NAMESPACE}-temporal-keda-auth
              verbs:
                - get
                - update
                - patch
      bindings:
        ${NAMESPACE}-temporal-keda-auth:
          type: RoleBinding
          roleRef:
            identifier: ${NAMESPACE}-temporal-keda-auth
          subjects:
            - identifier: ${NAMESPACE}-temporal-keda-auth
