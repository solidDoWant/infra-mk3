---
# Namespace-scoped Temporal read credential for KEDA scalers: a standalone
# tbot Deployment that continually renews a `${NAMESPACE}:read` JWT-SVID into
# the Secret `${NAMESPACE}-temporal-keda-auth`, plus the Teleport bot/role/
# token/workload-identity it authenticates with.
#
# One instance per Temporal-consuming namespace: each instance is just a Flux
# Kustomization pointing directly at this directory, parameterized solely by
# its `postBuild.substitute` NAMESPACE variable (and targetNamespace). See
# cluster/gitops/media/temporal-keda-auth/ks.yaml and
# cluster/gitops/backup/temporal-keda-auth/ks.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./hr.yaml
  - ./netpol.yaml
  - ./secret.yaml
  - ./teleport-bot.yaml
  - ./teleport-role.yaml
  - ./teleport-token.yaml
  - ./teleport-workload-identity.yaml
