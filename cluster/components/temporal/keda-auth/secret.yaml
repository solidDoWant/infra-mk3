---
# Pre-created so the tbot ServiceAccount can be granted get/update/patch on
# this exact resource name only — RBAC `create` does not honour
# resourceNames, so without this placeholder tbot would need namespace-wide
# create on Secrets. Flux server-side apply does not claim ownership of the
# `data` field (since it isn't specified here), so tbot's writes survive
# reconciliation.
apiVersion: v1
kind: Secret
metadata:
  name: ${NAMESPACE}-temporal-keda-auth
type: Opaque
