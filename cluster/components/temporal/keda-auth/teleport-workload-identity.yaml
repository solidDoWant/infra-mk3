---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/resources.teleport.dev/teleportworkloadidentityv1_v1.json
# Read-only access to the ${NAMESPACE} Temporal namespace. Consumed by KEDA
# Temporal scalers in this namespace (e.g. the tape-archiver control worker's
# ScaledJob), which only need DescribeTaskQueue backlog reads, never write
# operations.
apiVersion: resources.teleport.dev/v1
kind: TeleportWorkloadIdentityV1
metadata:
  name: ${NAMESPACE}-temporal-keda-auth
  labels:
    # Selected by the bot's role (workload_identity_labels) and by tbot's
    # service.selector. Must stay in sync with both.
    app: ${NAMESPACE}-temporal-keda-auth
spec:
  spiffe:
    # Per-pod SPIFFE ID so audit logs identify the issuing pod. Templated by
    # Teleport at issuance time from kubernetes join attributes.
    id: /svc/${NAMESPACE}-temporal-keda-auth/{{ join.kubernetes.pod.name }}
    jwt:
      extra_claims:
        permissions:
          - ${NAMESPACE}:read
  rules:
    allow:
      - conditions:
          - attribute: join.kubernetes.service_account.namespace
            eq:
              value: ${NAMESPACE}
          - attribute: join.kubernetes.service_account.name
            eq:
              value: ${NAMESPACE}-temporal-keda-auth
