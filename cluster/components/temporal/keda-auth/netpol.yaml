---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ${NAMESPACE}-temporal-keda-auth
specs:
  - description: tbot
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: ${NAMESPACE}-temporal-keda-auth
        app.kubernetes.io/instance: ${NAMESPACE}-temporal-keda-auth
    egress:
      # DNS resolution — required for cluster DNS lookups (proxy hostname,
      # kubernetes.default).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Teleport proxy — tbot joins via the in-cluster ServiceAccount token
      # and renews JWT-SVIDs over the proxy's TLS-routing port.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: teleport-cluster
              app.kubernetes.io/instance: teleport-cluster
              app.kubernetes.io/component: proxy
        toPorts:
          - ports:
              - port: tls
                protocol: TCP
      # kube-apiserver — tbot's kubernetes_secret destination Gets/Updates
      # the placeholder Secret in this namespace.
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
    ingress:
      # Kubelet liveness/readiness probes hit the diag port directly.
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "4444"
                protocol: TCP
      # Victoria Metrics agent scrapes /metrics on the diag port.
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "4444"
                protocol: TCP
