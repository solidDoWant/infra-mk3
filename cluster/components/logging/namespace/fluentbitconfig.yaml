---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/fluentbit.fluent.io/fluentbitconfig_v1alpha2.json
# Per-namespace FluentBitConfig that lets a namespace own node-agent log
# filters vertically. It is selected by the node-agent FluentBit's
# `namespaceFluentBitCfgSelector` and contributes ONLY filter sections — the
# platform-owned ClusterFluentBitConfig still provides the service (storage
# path/metrics), inputs (tail), and the forward output. Confirmed by render:
# namespaced filters merge into the single shared fluent-bit.conf and ride the
# cluster input/output (no per-namespace input/output needed).
#
# Static by design — `targetNamespace` (set by the per-namespace Flux
# Kustomization) places it; nothing here is namespace-specific, so unlike the
# issuers component it needs no ${NAMESPACE} substitution.
#
# Note: namespaced FluentBit filters are NOT auto-scoped to the namespace's log
# stream (that is a Fluentd-only feature). Each Filter selected here MUST scope
# its own `match`/`matchRegex` (e.g. `^kube\.<namespace>\.`); the FluentBitConfig
# cannot enforce it.
apiVersion: fluentbit.fluent.io/v1alpha2
kind: FluentBitConfig
metadata:
  name: node-agent
  labels:
    # Matched by the FluentBit `namespaceFluentBitCfgSelector`.
    config.fluentbit.fluent.io/enabled: "true"
    config.fluentbit.fluent.io/agent: node
spec:
  # Selects this namespace's Filter resources carrying the same convention
  # labels (the namespaced filterSelector only sees Filters in its own
  # namespace).
  filterSelector:
    matchLabels:
      config.fluentbit.fluent.io/enabled: "true"
      config.fluentbit.fluent.io/agent: node
