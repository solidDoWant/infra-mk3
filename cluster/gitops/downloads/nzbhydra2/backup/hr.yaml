---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nzbhydra2-backup
spec:
  interval: 5m
  chart:
    spec:
      chart: dr-job
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
      version: 0.0.18
  values:
    jobConfig:
      drType: generic
      drAction: backup
      cronjob:
        schedule: "50 1 * * *" # Staggered to avoid concurrent snapshots on the shared zfs-generic-nfs provisioner
      configFile:
        backupName: nzbhydra2-backup
        backupVolume:
          storageClass: zfs-generic-nfs # Backed by storage server
          size: 1Gi
        files:
          # Contains nzbhydra2's database, keys, etc
          - name: config
            pvc: nzbhydra2
            snapshotClass: ssd-replicated-3x-block
            exclude:
              - glob: backup
              - glob: blackhole
              - glob: cache
              - glob: logs
              - glob: lost+found
              - glob: restore
