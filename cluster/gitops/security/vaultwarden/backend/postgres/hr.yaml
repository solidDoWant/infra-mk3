---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden-postgres
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster2
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    clusterName: vaultwarden
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    certificates:
      client:
        ca:
          subject: &subject
            countries:
              - US
            provinces:
              - ${SECRET_STATE}
            organizations:
              - infra-mk3
      serving:
        issuerRef:
          name: security-intermediary-ca
        subject: *subject
    users:
      vaultwarden:
        username: vaultwarden
        disableReloading: true
      vaultwarden-metrics:
        username: vaultwarden-metrics
        disableReloading: true
        # Same perms as the vaultwarden user (inRoles) but a separate identity so
        # audit trails distinguish it. Too permissive, but the best achievable
        # declaratively. See https://github.com/cloudnative-pg/cloudnative-pg/issues/7133
        role:
          comment: VaultWarden metrics
          inRoles:
            - vaultwarden
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        selectors:
          - matchLabels:
              app.kubernetes.io/instance: vaultwarden
              app.kubernetes.io/name: vaultwarden
          - matchLabels:
              app.kubernetes.io/instance: vaultwarden-metrics
              app.kubernetes.io/name: vaultwarden-metrics
