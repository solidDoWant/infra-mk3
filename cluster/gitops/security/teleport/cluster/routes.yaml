# Teleport requires application-aware TLS all the way to the proxy. Previously this
# could not be done behind an Istio gateway: a TLSRoute in passthrough mode broke
# because browsers coalesce TLS connections onto the gateway's shared wildcard cert
# and reuse them with the wrong SNI, and Istio did not support BackendTLSPolicy so
# the gateway could not re-originate TLS to the proxy backend.
#
# As of Istio 1.29 + Gateway API 1.5 (BackendTLSPolicy is GA/v1), we instead:
#   1. Terminate the client's TLS at the external gateway (HTTPRoute, wildcard cert).
#      Routing is by HTTP Host, so connection coalescing is no longer a problem.
#   2. Re-originate a new TLS connection from the gateway to the proxy's multiplex
#      port, with the proxy serving its internal cert (SNI = the in-cluster service
#      name) and the gateway validating it against the root CA (BackendTLSPolicy).
#
# Native clients (tsh / Teleport Connect) work through the L7 gateway via Teleport's
# WebSocket ALPN connection-upgrade, so SSH/kube/db access is unaffected.
#
# Internal/intranet access continues to use the proxy LoadBalancer directly (see the
# coredns.io/hostname annotation in hr.yaml); only public ingress flows through here.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: teleport
  labels:
    # Publish the public DNS record (Cloudflare). external-dns runs with
    # --cloudflare-proxied and --default-targets=public-wan, so this becomes a
    # CF-proxied CNAME to the WAN (the internal 10.x gateway IP is excluded).
    external-dns.home.arpa/publish: "true"
spec:
  hostnames:
    - teleport.${SECRET_PUBLIC_DOMAIN_NAME}
  parentRefs:
    # Public ingress (Cloudflare -> external gateway).
    - name: external-gateway
      namespace: networking
      sectionName: https
    # Internal/intranet ingress. The k8s-gateway CoreDNS watches HTTPRoutes on
    # the internal-gateways class and publishes teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    # -> the internal gateway address, so in-network clients flow through it
    # (terminate + re-encrypt) instead of hitting the proxy LB directly.
    - name: internal-gateway
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: teleport-cluster
          port: 443
      matches:
        - path:
            type: PathPrefix
            value: /
---
# Re-encrypt traffic from the gateway to the Teleport proxy. The proxy serves its
# internal cert (teleport-proxy-internal-cert) for this SNI; it chains to the root
# CA, which is distributed to every namespace as a ConfigMap by the Kyverno
# extract-root-ca-certificate policy. The root CA is long-lived (10y, no rotation),
# so this survives intermediary-CA rotation.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: teleport-cluster
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: teleport-cluster
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: root-ca-pub-cert
    # Must match a SAN on the proxy's internal serving cert (see proxy-cert.yaml).
    hostname: teleport-cluster.security.svc.cluster.local
---
# Teleport Application Access serves proxied apps at <app>.teleport.<domain>.
# This second-level wildcard attaches to the gateways' existing *.<domain> HTTPS
# listener (Gateway API does multi-label suffix matching); the listener cert
# (wildcard-public-domain-name-cert) carries the *.teleport.<domain> SAN. Same
# backend + BackendTLSPolicy re-encrypt as the apex route above.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: teleport-apps
  labels:
    external-dns.home.arpa/publish: "true"
  annotations:
    # Cloudflare Universal SSL does not cover second-level wildcards, so it can't
    # proxy *.teleport.<domain> without Advanced Certificate Manager. Publish
    # DNS-only: clients hit the gateway directly (which serves the LE wildcard
    # cert). Teleport + Authentik still enforce auth on app access.
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  hostnames:
    - "*.teleport.${SECRET_PUBLIC_DOMAIN_NAME}"
  parentRefs:
    - name: external-gateway
      namespace: networking
      sectionName: https
    - name: internal-gateway
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: teleport-cluster
          port: 443
      matches:
        - path:
            type: PathPrefix
            value: /
