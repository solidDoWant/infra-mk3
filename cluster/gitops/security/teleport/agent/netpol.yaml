---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: teleport-agent
specs:
  - description: teleport-agent
    endpointSelector:
      matchLabels:
        app: teleport-agent
    egress:
      # DNS resolution
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
      # Access to all CNPG instances
      - toEndpoints:
          - matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
              - key: cnpg.io/podRole
                operator: In
                values:
                  - instance
        toPorts:
          - ports:
              - port: "5432"
                protocol: TCP
      # Access to all Dragonfly instances
      - toEndpoints:
          - matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - dragonfly
              - key: app.kubernetes.io/part-of
                operator: In
                values:
                  - dragonfly
        toPorts:
          - ports:
              - port: "6379"
                protocol: TCP
      # To the fluentd aggregator's forward input: backend of the
      # fluentd-forward Teleport TCP app (off-cluster hosts ship logs through
      # a tbot application-tunnel; see
      # cluster/gitops/monitoring/fluent/aggregator/teleport-app.yaml).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              app.kubernetes.io/name: fluentd-aggregator
              app.kubernetes.io/component: fluentd
              app.kubernetes.io/instance: fluentd
        toPorts:
          - ports:
              - port: "24224"
                protocol: TCP
      # Access to the proxy server
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: teleport-cluster
              app.kubernetes.io/instance: teleport-cluster
              app.kubernetes.io/component: proxy
        toPorts:
          - ports:
              - port: tls
                protocol: TCP
      # Reverse tunnel to the proxy via the internal gateway. The agent dials the
      # proxy's public_addr (teleport.<domain>), which now resolves to the
      # internal gateway for in-cluster clients; it tunnels through it via the
      # ALPN connection upgrade.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      # Access to get the agent state secret
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
    ingress:
      # Kubelet for healthcheck
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: diag
                protocol: TCP
      # Metrics
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: diag
                protocol: TCP
