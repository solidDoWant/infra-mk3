---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport-backup
spec:
  interval: 5m
  chart:
    spec:
      chart: dr-job
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
      version: 0.0.18
  values:
    jobConfig:
      drType: teleport
      drAction: backup
      cronjob:
        schedule: "40 1 * * *" # Staggered to avoid concurrent snapshots on the shared zfs-generic-nfs provisioner
      configFile:
        backupName: teleport-backup
        backupVolume:
          storageClass: zfs-generic-nfs # Backed by storage server
        cnpgClusters:
          core:
            name: teleport-core-postgres
          audit:
            name: teleport-audit-postgres
        auditSessionLogs:
          credentials:
            # Required when not using AWS S3
            region: dummy-value
            s3ForcePathStyle: true
  valuesFrom:
    - kind: Secret
      name: teleport-audit-sessions
      valuesKey: AWS_ACCESS_KEY_ID
      targetPath: jobConfig.configFile.auditSessionLogs.credentials.accessKeyId
    - kind: Secret
      name: teleport-audit-sessions
      valuesKey: AWS_SECRET_ACCESS_KEY
      targetPath: jobConfig.configFile.auditSessionLogs.credentials.secretAccessKey
    - kind: ConfigMap
      name: teleport-audit-sessions-backup-vars
      valuesKey: endpoint
      targetPath: jobConfig.configFile.auditSessionLogs.credentials.endpoint
    - kind: ConfigMap
      name: teleport-audit-sessions-backup-vars
      valuesKey: s3Path
      targetPath: jobConfig.configFile.auditSessionLogs.s3Path
