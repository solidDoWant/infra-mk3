---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport-audit-postgres
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    clusterName: teleport-audit
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    certificates:
      client:
        ca:
          subject: &subject
            countries:
              - US
            provinces:
              - ${SECRET_STATE}
            organizations:
              - infra-mk3
      serving:
        issuerRef:
          name: security-intermediary-ca
        subject: *subject
    users:
      teleport-audit:
        username: teleport-audit
        disableReloading: true
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        selector:
          matchLabels:
            app.kubernetes.io/instance: teleport-cluster
            app.kubernetes.io/name: teleport-cluster
            app.kubernetes.io/component: auth
