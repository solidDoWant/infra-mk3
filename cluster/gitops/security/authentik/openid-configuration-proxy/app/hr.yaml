---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Tiny Envoy proxy that fronts Authentik to work around Authentik's lack of
# per-listener issuer override: in-cluster server-side OIDC clients want to
# validate tokens with iss=https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/... but
# fetch the heavy endpoints (token / userinfo / JWKS / introspect / revoke)
# in-cluster without going through the public gateway. This proxy
# transparent-passes everything to authentik-server.security.svc.cluster.local
# and only rewrites GET .../.well-known/openid-configuration responses to point
# those five endpoints at the in-cluster URL while keeping issuer,
# authorization_endpoint, and end_session_endpoint pointed at the public URL.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openid-configuration-proxy
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      openid-configuration-proxy:
        replicas: 2
        podDisruptionBudget:
          minAvailable: 1
        containers:
          envoy:
            image:
              # Distroless Envoy: non-root by default, no shell. Lua HTTP filter
              # is in stock Envoy; we don't need the contrib build (which Harbor
              # uses only for the postgres protocol filter).
              repository: envoyproxy/envoy
              tag: distroless-v1.35.3
            args:
              - -c
              - /etc/envoy/envoy.yaml
            ports:
              - name: http
                containerPort: &http_port 8080
            probes:
              liveness: &probe
                enabled: true
                type: TCP
                port: http
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: &memory 64Mi
              limits:
                memory: *memory
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        pod:
          hostUsers: false
          labels:
            # Mirrors the label Authentik's own server pods carry so that
            # existing oidc-querier consumers can target this proxy through
            # the same netpol surface. See authentik/app/hr.yaml line ~190.
            endpoints.netpols.home.arpa/oidc-supplier: "true"
            # Required for Authentik's ingress netpol to admit our upstream
            # requests on port 9000 — Cilium intersects both endpoints' policies,
            # so the proxy must declare itself an oidc-querier even though its
            # egress already targets the authentik-server pod selector directly.
            endpoints.netpols.home.arpa/oidc-querier: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            fsGroupChangePolicy: OnRootMismatch
          dnsConfig:
            options:
              - name: ndots
                value: "1"
    service:
      openid-configuration-proxy:
        controller: openid-configuration-proxy
        ports:
          http:
            port: 80
            targetPort: *http_port
            primary: true
    persistence:
      envoy-config:
        # ConfigMap is generated by ./envoy-config/kustomization.yaml. The
        # `kyverno.home.arpa/reload` label on the generated CM causes the
        # cluster's reload policy to bounce pods when the config changes.
        type: configMap
        name: openid-configuration-proxy-envoy-config
        advancedMounts:
          openid-configuration-proxy:
            envoy:
              - path: /etc/envoy
