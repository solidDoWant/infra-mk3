---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Tiny Envoy proxy that acts as the canonical in-cluster OIDC origin for
# Authentik. Authentik has no fixed issuer — it stamps the discovery
# `issuer`, every endpoint URL, and the token `iss` claim from each request's
# Host + X-Forwarded-Proto — so in-cluster server-side OIDC clients need one
# consistent host to do the whole back-channel through. This proxy is that
# host: it rewrites Host to its own FQDN and forces XFP=https upstream, so
# for every provider <slug> the issuer is deterministically
#   https://openid-configuration-proxy.security.svc.cluster.local/application/o/<slug>/
# and discovery URL == doc issuer == token iss. Strict OIDC clients
# (go-oidc's NewProvider, openid-client) work unmodified — no hairpin
# through the public gateway, no issuer-check escape hatches.
#
# Routing: the discovery doc's two browser-facing endpoints
# (authorization_endpoint, end_session_endpoint) are Lua-rewritten to
# https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/...; everything else under
# /application/o/ (token, JWKS, userinfo, revoke, introspect) passes through
# to authentik-server so tokens are stamped with this proxy's origin. Paths
# outside /application/o/ return 404 — the rest of Authentik (admin UI,
# flows, outposts) is deliberately out of scope. See the oidc-querier /
# oidc-supplier label pattern in docs/labels and annotations.md.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openid-configuration-proxy
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      openid-configuration-proxy:
        replicas: 2
        podDisruptionBudget:
          minAvailable: 1
        containers:
          envoy:
            image:
              # Distroless Envoy: non-root by default, no shell. Lua HTTP filter
              # is in stock Envoy; we don't need the contrib build (which Harbor
              # uses only for the postgres protocol filter).
              repository: envoyproxy/envoy
              tag: distroless-v1.35.3
            args:
              - -c
              - /etc/envoy/envoy.yaml
            ports:
              - name: https
                containerPort: &https_port 8443
              - name: metrics
                containerPort: &metrics_port 9090
            probes:
              # Plain TCP connect — works against the TLS listener without a
              # handshake.
              liveness: &probe
                enabled: true
                type: TCP
                port: https
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: &memory 64Mi
              limits:
                memory: *memory
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        pod:
          hostUsers: false
          labels:
            # Mirrors the label Authentik's own server pods carry so that
            # existing oidc-querier consumers can target this proxy through
            # the same netpol surface. See authentik/app/hr.yaml line ~190.
            endpoints.netpols.home.arpa/oidc-supplier: "true"
            # Required for Authentik's ingress netpol to admit our upstream
            # requests on port 9000 — Cilium intersects both endpoints' policies,
            # so the proxy must declare itself an oidc-querier even though its
            # egress already targets the authentik-server pod selector directly.
            endpoints.netpols.home.arpa/oidc-querier: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            fsGroupChangePolicy: OnRootMismatch
          dnsConfig:
            options:
              - name: ndots
                value: "1"
    service:
      openid-configuration-proxy:
        controller: openid-configuration-proxy
        ports:
          https:
            port: 443
            targetPort: *https_port
            primary: true
          metrics:
            port: *metrics_port
            targetPort: *metrics_port
    serviceMonitor:
      openid-configuration-proxy:
        endpoints:
          # Envoy serves Prometheus stats on this path (proxied from the
          # loopback admin interface — see envoy-config/envoy.yaml).
          - port: metrics
            path: /stats/prometheus
    persistence:
      envoy-config:
        # ConfigMap is generated by ./envoy-config/kustomization.yaml. The
        # `kyverno.home.arpa/reload` label on the generated CM causes the
        # cluster's reload policy to bounce pods when the config changes.
        type: configMap
        name: openid-configuration-proxy-envoy-config
        advancedMounts:
          openid-configuration-proxy:
            envoy:
              - path: /etc/envoy
      serving-cert:
        # cert-manager Certificate -> Secret. Same kyverno-reload label is
        # set on the secret via the Certificate's secretTemplate, so pods
        # bounce on cert rotation and Envoy picks up the new keypair.
        type: secret
        name: openid-configuration-proxy-serving-cert
        defaultMode: 0440
        advancedMounts:
          openid-configuration-proxy:
            envoy:
              - path: /etc/openid-configuration-proxy/certs/serving
