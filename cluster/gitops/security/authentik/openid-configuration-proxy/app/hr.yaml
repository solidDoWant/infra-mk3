---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Tiny Envoy proxy that serves a rewritten OIDC discovery doc. Authentik has
# no per-listener issuer override, so in-cluster server-side OIDC clients
# (e.g. the Jellyfin SSO plugin) need a discovery doc whose iss claim still
# resolves to https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/... but whose
# token / userinfo / JWKS / introspection / revocation endpoints point at the
# in-cluster authentik-server Service so those calls don't hairpin through
# the public gateway.
#
# Scope is intentionally narrow: this proxy ONLY answers
# GET /application/o/<provider>/.well-known/openid-configuration. Any other
# path returns 404. Clients are expected to call
# authentik-server.security.svc.cluster.local directly for the rewritten
# endpoints (they already do today — see the oidc-querier / oidc-supplier
# label pattern in docs/labels and annotations.md).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openid-configuration-proxy
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      openid-configuration-proxy:
        replicas: 2
        podDisruptionBudget:
          minAvailable: 1
        containers:
          envoy:
            image:
              # Distroless Envoy: non-root by default, no shell. Lua HTTP filter
              # is in stock Envoy; we don't need the contrib build (which Harbor
              # uses only for the postgres protocol filter).
              repository: envoyproxy/envoy
              tag: distroless-v1.35.3
            args:
              - -c
              - /etc/envoy/envoy.yaml
            ports:
              - name: http
                containerPort: &http_port 8080
            probes:
              liveness: &probe
                enabled: true
                type: TCP
                port: http
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: &memory 64Mi
              limits:
                memory: *memory
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        pod:
          hostUsers: false
          labels:
            # Mirrors the label Authentik's own server pods carry so that
            # existing oidc-querier consumers can target this proxy through
            # the same netpol surface. See authentik/app/hr.yaml line ~190.
            endpoints.netpols.home.arpa/oidc-supplier: "true"
            # Required for Authentik's ingress netpol to admit our upstream
            # requests on port 9000 — Cilium intersects both endpoints' policies,
            # so the proxy must declare itself an oidc-querier even though its
            # egress already targets the authentik-server pod selector directly.
            endpoints.netpols.home.arpa/oidc-querier: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            fsGroupChangePolicy: OnRootMismatch
          dnsConfig:
            options:
              - name: ndots
                value: "1"
    service:
      openid-configuration-proxy:
        controller: openid-configuration-proxy
        ports:
          http:
            port: 80
            targetPort: *http_port
            primary: true
    persistence:
      envoy-config:
        # ConfigMap is generated by ./envoy-config/kustomization.yaml. The
        # `kyverno.home.arpa/reload` label on the generated CM causes the
        # cluster's reload policy to bounce pods when the config changes.
        type: configMap
        name: openid-configuration-proxy-envoy-config
        advancedMounts:
          openid-configuration-proxy:
            envoy:
              - path: /etc/envoy
