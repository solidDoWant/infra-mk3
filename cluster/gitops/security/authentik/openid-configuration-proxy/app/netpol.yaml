---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openid-configuration-proxy
specs:
  - description: openid-configuration-proxy
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: openid-configuration-proxy
        app.kubernetes.io/instance: openid-configuration-proxy
    egress:
      # DNS resolution for the upstream authentik-server service.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Upstream Authentik server pods. Plain HTTP on 9000; the Host header is
      # rewritten by Envoy's host_rewrite_literal so Authentik picks the right
      # Brand and stamps tokens with the public issuer.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: authentik
              app.kubernetes.io/instance: authentik
              app.kubernetes.io/component: server
        toPorts:
          - ports:
              - port: "9000"
                protocol: TCP
    ingress:
      # In-cluster OIDC consumers fetching the rewritten discovery doc / JWKS.
      # Same oidc-querier label these clients already use to reach Authentik
      # directly (see authentik/app/netpol.yaml).
      - fromEndpoints:
          - matchLabels:
              endpoints.netpols.home.arpa/oidc-querier: "true"
            matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
      # Kubelet TCP probes.
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
