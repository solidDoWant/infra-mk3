---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openid-configuration-proxy
specs:
  - description: openid-configuration-proxy
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: openid-configuration-proxy
        app.kubernetes.io/instance: openid-configuration-proxy
    egress:
      # DNS resolution for the upstream authentik-server service.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Upstream Authentik server pods. Plain HTTP on 9000; Envoy rewrites the
      # Host header to this proxy's own canonical FQDN (and forces
      # X-Forwarded-Proto: https) so Authentik stamps the discovery issuer and
      # token iss with the proxy's https origin — see envoy-config/envoy.yaml.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: authentik
              app.kubernetes.io/instance: authentik
              app.kubernetes.io/component: server
        toPorts:
          - ports:
              - port: "9000"
                protocol: TCP
    ingress:
      # In-cluster OIDC consumers running the full back-channel here:
      # discovery, token exchange, JWKS, userinfo. Same oidc-querier label
      # other in-cluster OIDC clients use (see authentik/app/netpol.yaml).
      - fromEndpoints:
          - matchLabels:
              endpoints.netpols.home.arpa/oidc-querier: "true"
            matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      # Kubelet TCP probes.
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      # Victoria Metrics agent scrapes Envoy stats on the metrics listener.
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9090"
                protocol: TCP
