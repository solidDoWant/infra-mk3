admin:
  # Loopback only; for `kubectl exec` debugging.
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
static_resources:
  listeners:
    - name: https
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: openid_configuration_proxy
                # Authentik builds the issuer and token iss from each
                # request's Host + X-Forwarded-Proto. host_rewrite_literal
                # (below) pins the Host; edge mode here pins XFP — Envoy
                # overwrites any client-supplied value with the listener's
                # real scheme (https), keeping the stamped issuer
                # deterministic. Edge mode also appends the caller's pod IP
                # to X-Forwarded-For, so Authentik's audit log attributes
                # back-channel calls to the calling app rather than this
                # proxy's pod IP.
                use_remote_address: true
                # Per-request record of the OIDC back-channel (stdout → the
                # cluster log pipeline). Authentik's event log only covers
                # selected events, so this is the complete proxy-side trail
                # (incl. failed token exchanges).
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          time: "%START_TIME%"
                          client: "%DOWNSTREAM_REMOTE_ADDRESS%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          status: "%RESPONSE_CODE%"
                          flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: authentik
                      domains:
                        - "*"
                      routes:
                        # Discovery doc. Same upstream as the passthrough
                        # route, plus a Lua body rewrite that points the two
                        # browser-facing endpoints at the public gateway.
                        - name: discovery
                          match:
                            safe_regex:
                              regex: "^/application/o/[^/]+/\\.well-known/openid-configuration/?$"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: GET
                          route:
                            cluster: authentik_upstream
                            host_rewrite_literal: &canonical_host openid-configuration-proxy.security.svc.cluster.local
                          # Without this, Authentik may gzip the response and
                          # the Lua rewrite silently no-ops on the binary body.
                          request_headers_to_remove:
                            - accept-encoding
                          typed_per_filter_config:
                            envoy.filters.http.lua:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                              name: rewrite_discovery
                        # Back-channel endpoints (token, JWKS, userinfo,
                        # revoke, introspect). The token exchange must flow
                        # through here — Authentik stamps the token `iss` from
                        # this request, and it has to match the doc issuer.
                        - name: oauth-passthrough
                          match:
                            prefix: "/application/o/"
                          route:
                            cluster: authentik_upstream
                            host_rewrite_literal: *canonical_host
                        # Everything outside the OAuth2/OIDC provider tree
                        # (admin UI, flows, outposts) is out of scope.
                        - name: not-found
                          match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: |
                                openid-configuration-proxy: this proxy only serves the
                                OIDC provider tree under /application/o/ (discovery,
                                token, JWKS, userinfo, revoke, introspect). All other
                                Authentik functionality is out of scope.
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      # No default_source_code: only the discovery route opts
                      # in via LuaPerRoute.
                      source_codes:
                        rewrite_discovery:
                          inline_string: |
                            -- Point the two endpoints the user's BROWSER visits
                            -- at the public gateway; everything else in the doc
                            -- (issuer, token, jwks, userinfo, revoke,
                            -- introspect) keeps this proxy's origin so the
                            -- back-channel stays in-cluster. gsub without a
                            -- match is a no-op, so error bodies pass through.
                            function envoy_on_response(rh)
                              local body = rh:body():getBytes(0, rh:body():length())
                              local pub = "https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}"
                              -- pesc escapes the origin for use in a Lua pattern
                              -- (`-` and `.` are pattern metacharacters).
                              local function pesc(s) return (s:gsub("(%W)", "%%%1")) end
                              local int = pesc("https://openid-configuration-proxy.security.svc.cluster.local")
                              body = body:gsub('("authorization_endpoint"%s*:%s*")' .. int, "%1" .. pub)
                              body = body:gsub('("end_session_endpoint"%s*:%s*")' .. int, "%1" .. pub)
                              rh:body():setBytes(body)
                              rh:headers():remove("content-length")
                            end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/openid-configuration-proxy/certs/serving/tls.crt
                    private_key:
                      filename: /etc/openid-configuration-proxy/certs/serving/tls.key
    # Exposes ONLY /stats/prometheus from the loopback admin interface for
    # scraping; the rest of the admin API (config dumps, /quitquitquit,
    # runtime overrides) stays unreachable. Any other path 404s.
    - name: metrics
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9090
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: metrics
                route_config:
                  name: metrics_route
                  virtual_hosts:
                    - name: metrics
                      domains:
                        - "*"
                      routes:
                        - name: prometheus-stats
                          match:
                            path: /stats/prometheus
                          route:
                            cluster: admin_local
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: authentik_upstream
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: authentik_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: authentik-server.security.svc.cluster.local
                      # Service port (maps to containerPort 9000). The netpol
                      # authorizes 9000 — Cilium evaluates the pod port after
                      # service translation.
                      port_value: 80
    - name: admin_local
      connect_timeout: 1s
      type: STATIC
      load_assignment:
        cluster_name: admin_local
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9901
