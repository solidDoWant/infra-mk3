admin:
  # Bound to loopback only — never reachable from outside the pod.
  # Used for local debugging via `kubectl exec`.
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
static_resources:
  listeners:
    - name: http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters: &http_filters
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: openid_configuration_proxy
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: authentik
                      domains:
                        - "*"
                      routes:
                        # Discovery doc: GET .../.well-known/openid-configuration.
                        # The Lua filter rewrites the JSON body in the
                        # response; routing is otherwise the same as the
                        # passthrough route below.
                        - name: discovery
                          match:
                            safe_regex:
                              regex: "^/application/o/[^/]+/\\.well-known/openid-configuration/?$"
                            headers:
                              - name: ":method"
                                string_match:
                                  exact: GET
                          route:
                            cluster: authentik_upstream
                            # Rewrite the Host to the internal service name so the
                            # discovery `issuer` (and token/jwks/userinfo URLs)
                            # Authentik stamps here are identical to the `iss` it
                            # stamps when an app calls authentik-server directly
                            # for the token exchange. Strict OIDC clients (e.g.
                            # Immich's openid-client) enforce token.iss ===
                            # metadata.issuer, so the two MUST match. The Lua below
                            # rewrites only the browser-facing endpoints back to
                            # the public gateway.
                            host_rewrite_literal: authentik-server.security.svc.cluster.local
                          # Force the perceived scheme to http so the issuer scheme
                          # also matches the plain-HTTP token call (apps reach
                          # authentik-server over http). Authentik builds the
                          # discovery URLs from this and trusts the pod CIDR
                          # (AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS=10.32.0.0/16 in
                          # authentik/app/hr.yaml), so the header is honored.
                          # OVERWRITE because Envoy otherwise sets https for the
                          # 8443 (TLS) listener.
                          request_headers_to_add:
                            - header:
                                key: X-Forwarded-Proto
                                value: http
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          # Force the upstream response to be uncompressed so
                          # the Lua filter can pattern-match the JSON body.
                          # Authentik honors Accept-Encoding: gzip and returns
                          # a gzipped body — Lua sees binary and silently
                          # no-ops the rewrite. The discovery doc is ~1.5 KB
                          # so dropping compression costs nothing.
                          request_headers_to_remove:
                            - accept-encoding
                          typed_per_filter_config:
                            envoy.filters.http.lua:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                              name: rewrite_discovery
                        # Catch-all: this proxy only exists to rewrite the
                        # OIDC discovery doc. Any other path is operator
                        # error — surface a clear 404 instead of silently
                        # proxying to Authentik (which would also work but
                        # masks misconfiguration and bypasses the Host
                        # rewrite story we documented).
                        - name: not-found
                          match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: |
                                openid-configuration-proxy: this proxy only serves
                                GET /application/o/<provider>/.well-known/openid-configuration.
                                For all other Authentik endpoints, call
                                authentik-server.security.svc.cluster.local directly.
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      # No default_source_code: the filter is a no-op on any
                      # route that doesn't opt in via LuaPerRoute.
                      source_codes:
                        rewrite_discovery:
                          inline_string: |
                            -- The route is scoped to GET on the discovery
                            -- URL, so Authentik always returns the discovery
                            -- JSON here. If gsub finds no match it's a no-op,
                            -- so unexpected error bodies pass through cleanly.
                            function envoy_on_response(rh)
                              local body = rh:body():getBytes(0, rh:body():length())
                              local pub = "https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}"
                              local int = "http://authentik-server.security.svc.cluster.local"
                              local function pesc(s) return (s:gsub("(%W)", "%%%1")) end
                              -- The Host rewrite makes Authentik emit every URL
                              -- (incl. issuer) with the internal host, matching the
                              -- direct token call's iss. Rewrite ONLY the two
                              -- browser-facing endpoints to the public gateway; the
                              -- issuer and the back-channel endpoints (token, jwks,
                              -- userinfo, revoke, introspect) stay internal.
                              for _, k in ipairs({
                                "authorization_endpoint", "end_session_endpoint",
                              }) do
                                body = body:gsub('("' .. k .. '"%s*:%s*")' .. pesc(int), "%1" .. pub)
                              end
                              rh:body():setBytes(body)
                              rh:headers():remove("content-length")
                            end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
    # HTTPS variant. Same filter chain as the HTTP listener (reused via the
    # `&http_filters` anchor above) so the route table, Lua rewrite, and
    # upstream cluster are identical. The only addition is a TLS transport
    # socket terminating with the namespace-issued serving cert.
    - name: https
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - filters: *http_filters
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/openid-configuration-proxy/certs/serving/tls.crt
                    private_key:
                      filename: /etc/openid-configuration-proxy/certs/serving/tls.key
  clusters:
    - name: authentik_upstream
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: authentik_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: authentik-server.security.svc.cluster.local
                      # Service port, not container port. The Authentik Service
                      # maps 80 → containerPort 9000. The CiliumNetworkPolicy
                      # still authorizes port 9000 because it evaluates against
                      # the destination pod port after Cilium service xlation.
                      port_value: 80
