---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/objectbucket.io/objectbucketclaim_v1alpha1.json
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: authentik-media
spec:
  generateBucketName: authentik-media
  storageClassName: ssd-replicated-object
  additionalConfig:
    maxObjects: "1000"
    maxSize: 10G
    # Versioning is enabled out-of-band by the authentik-media-versioning
    # HelmRelease — Rook's OBC has no field to enable it (rook/rook#17318). These
    # rules clean up the resulting deleted/old versions so they don't accumulate:
    # drop noncurrent versions after 30 days and remove leftover delete markers.
    bucketLifecycle: |
      {
        "Rules": [
          {
            "ID": "AbortIncompleteMultipartUploads",
            "Status": "Enabled",
            "Prefix": "",
            "AbortIncompleteMultipartUpload": {
              "DaysAfterInitiation": 1
            }
          },
          {
            "ID": "ExpireDeleteMarkers",
            "Status": "Enabled",
            "Prefix": "",
            "Expiration": {
              "ExpiredObjectDeleteMarker": true
            }
          },
          {
            "ID": "ExpireNoncurrentVersions",
            "Status": "Enabled",
            "Prefix": "",
            "NoncurrentVersionExpiration": {
              "NoncurrentDays": 30
            }
          }
        ]
      }
