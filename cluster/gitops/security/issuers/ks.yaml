---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name security-namespace-issuer
spec:
  targetNamespace: &namespace security
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/security/issuers/namespace
  postBuild:
    substitute:
      NAMESPACE: *namespace
      # The security intermediary CA signs the Teleport proxy's internal serving
      # cert, which the Istio/Envoy gateway must validate for BackendTLSPolicy
      # re-encrypt. Envoy's BoringSSL cannot validate Ed25519 cert chains (same
      # limitation the root CA documents for .NET), so this intermediary must be
      # ECDSA. Size 384 (P-384) matches the root.
      CERT_ALGORITHM: ECDSA
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: cluster-issuers
