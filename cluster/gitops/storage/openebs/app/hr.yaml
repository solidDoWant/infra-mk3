---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 5m
  chart:
    spec:
      chart: openebs
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: openebs-charts
      version: 4.4.0
  values:
    # Disable openebs-installed volume snapshot CRDs entirely
    openebs-crds: &crds
      csi:
        # Handled via volume-snapshot-crds
        volumeSnapshots:
          enabled: false
    # Disable localpv provisioner entirely
    localpv-provisioner:
      rbac:
        create: false
      localpv:
        enabled: false
      serviceAccount:
        create: false
      hostpathClass:
        enabled: false
    # Disable everything but zfs-localpv
    preUpgradeHook:
      enabled: false
    loki:
      enabled: false
    alloy:
      enabled: false
    engines:
      local:
        lvm:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    zfs-localpv:
      zfsNode:
        resources: &resources
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 32Mi
        # cspell:words encr
        encrKeysDir: /var/zfs/encryption-keys
        nodeSelector: &node_selector
          zfs.home.arpa/node.local-storage-deployed: "true"
      zfsController:
        replicas: 2
        resources: *resources
        nodeSelector: *node_selector
      plugin:
        image:
          # ghcr.io mirrors docker.io/openebs; trailing slash required by the chart
          registry: ghcr.io/
      analytics:
        enabled: false
      # Disable zfs-localpv-installed volume snapshot CRDs entirely
      crds: *crds
  postRenderers:
    # Remove the volume snapshot controller
    # Why TF is this included in every CSI controller pod???
    - kustomize:
        patches:
          - patch: |
              - op: remove
                path: /spec/template/spec/containers/2
            target:
              group: apps
              version: v1
              kind: Deployment
              labelSelector: component = openebs-zfs-controller
