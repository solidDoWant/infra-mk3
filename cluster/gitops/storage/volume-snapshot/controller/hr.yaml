---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name volume-snapshot-controller
  labels:
    patches.flux.home.arpa/helmrelease.skip-crds: "true"
spec:
  interval: 5m
  chart:
    spec:
      chart: snapshot-controller
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: piraeus-charts
      version: 5.0.4
  values:
    installCRDs: false
    webhook:
      enabled: false
      tls:
        autogenerate: false
    controller:
      revisionHistoryLimit: 1
      replicaCount: 2
      pdb:
        minAvailable: 1
      serviceMonitor:
        create: true
