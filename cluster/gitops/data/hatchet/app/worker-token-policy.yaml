---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: distribute-hatchet-worker-token
spec:
  rules:
    - name: distribute-hatchet-worker-token
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  hatchet.home.arpa/worker-token: "true"
      skipBackgroundRequests: true
      context:
        - name: workerTokenData
          apiCall:
            method: GET
            urlPath: /api/v1/namespaces/data/secrets/hatchet-worker-token
            jmesPath: data
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: hatchet-worker-token
        namespace: >-
          {{ request.object.metadata.name }}
        data:
          type: Opaque
          data: >-
            {{ workerTokenData }}
