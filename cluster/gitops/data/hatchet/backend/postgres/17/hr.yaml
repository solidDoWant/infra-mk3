---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hatchet-postgres-17
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  dependsOn:
    - name: hatchet-postgres-auth
  values:
    clusterName: hatchet
    certificates:
      serving:
        issuerRef:
          name: data-intermediary-ca
        subject:
          countries:
            - US
          provinces:
            - ${SECRET_STATE}
          organizations:
            - infra-mk3
        # This is needed for anything that C# services talk to because
        # .net core does not support Ed25519, despite there being multiple
        # decade-old requests for it.
        privateKey:
          algorithm: ECDSA
          size: 384
          encoding: PKCS8
          rotationPolicy: Always
    parameters:
      max_connections: "300"
    pooler:
      rw: &pooler_config
        enabled: true
        poolMode: transaction
        parameters:
          max_client_conn: "1000"
          default_pool_size: "50"
      ro: *pooler_config
    additionalClusterConfig:
      inheritedMetadata:
        annotations:
          k8tz.io/timezone: UTC
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        selectors:
          - matchLabels: &application_labels
              app.kubernetes.io/name: hatchet
              app.kubernetes.io/controller: engine
              app.kubernetes.io/instance: hatchet
          - matchLabels:
              <<: *application_labels
              app.kubernetes.io/controller: api
          - matchLabels:
              <<: *application_labels
              app.kubernetes.io/controller: migrate
          - matchLabels:
              <<: *application_labels
              app.kubernetes.io/controller: seed
          - matchLabels:
              <<: *application_labels
              app.kubernetes.io/controller: worker-token
