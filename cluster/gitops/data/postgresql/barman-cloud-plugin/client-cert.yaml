---
# CNPG-I client certificate (operator -> plugin mTLS) for the barman-cloud plugin.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: barman-cloud-client
spec:
  secretName: barman-cloud-client-tls
  usages:
    - client auth
  commonName: barman-cloud-client
  duration: 720h # One month (overrides the chart's 1h user-cert default)
  secretTemplate:
    labels:
      cnpg.io/reload: "true"
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: data-intermediary-ca
