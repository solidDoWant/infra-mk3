---
# CNPG-I server certificate for the barman-cloud plugin's gRPC endpoint
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: barman-cloud-server
spec:
  commonName: barman-cloud
  dnsNames:
    - barman-cloud.data.svc
    - barman-cloud.data.svc.cluster.local
  subject:
    countries:
      - US
    provinces:
      - ${SECRET_STATE}
    organizations:
      - infra-mk3
  usages:
    - server auth
  duration: 720h # One month
  privateKey:
    algorithm: Ed25519
    encoding: PKCS8
    rotationPolicy: Always
  secretTemplate:
    labels:
      cnpg.io/reload: "true"
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: data-intermediary-ca
  secretName: barman-cloud-server-tls
