---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name plugin-barman-cloud
spec:
  interval: 1h
  chart:
    spec:
      chart: plugin-barman-cloud
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: cnpg-charts
      version: 0.6.0
  values:
    nameOverride: *app_name
    fullnameOverride: *app_name
    # The CNPG-I plugin uses leader election, so run two replicas: if the plugin
    # is down, WAL archival and restore for every cluster using it fails.
    replicaCount: 2
    priorityClassName: system-cluster-critical
    crds:
      create: true
    certificate:
      # The CNPG-I mTLS certs are authored directly (server-cert.yaml /
      # client-cert.yaml) so they issue from the namespace CA with the correct
      # namespace-scoped names, rather than being rewritten via post-render.
      createServerCertificate: false
      createClientCertificate: false
    resources:
      requests:
        cpu: 50m
        memory: &memory 128Mi
      limits:
        memory: *memory
  postRenderers:
    - kustomize:
        patches:
          # The chart creates a selfSigned Issuer unconditionally. This cluster
          # issues all in-namespace certs from the namespace intermediary CA
          # (and approver-policy would deny certs from an ad-hoc issuer anyway),
          # so drop it.
          - target:
              group: cert-manager.io
              version: v1
              kind: Issuer
              name: plugin-barman-cloud-selfsigned-issuer
            patch: |
              $patch: delete
              apiVersion: cert-manager.io/v1
              kind: Issuer
              metadata:
                name: plugin-barman-cloud-selfsigned-issuer
          # By default the operator verifies the plugin's server cert against the
          # bare Service name; tell it to use the namespace-scoped DNS name that
          # the CA is actually able to sign (see server-cert.yaml).
          - target:
              version: v1
              kind: Service
              name: barman-cloud
            patch: |
              - op: add
                path: /metadata/annotations/cnpg.io~1pluginServerName
                value: barman-cloud.data.svc
          # The chart hard-codes a tcpSocket readiness probe on the gRPC port
          # 9090, which only the elected leader ever opens — so the passive
          # replica is perpetually NotReady and spams "connection refused"
          # (cnpg charts #710 / #896). Point the probes at the controller-runtime
          # health server on :8081 instead: every replica serves it, and /readyz
          # + /healthz are ungated healthz.Ping checks, so the standby reports
          # Ready. Also adds the liveness probe the chart omits. Implements
          # cloudnative-pg/charts#776 (discussion r2732064035).
          #
          # Trade-off: a Ready standby now joins the barman-cloud Service
          # endpoints even though it does NOT serve gRPC on 9090, so the operator
          # will occasionally dial the standby and get refused. Its plugin
          # connection pool pings and retries onto the leader, so this is
          # tolerable, but expect some reconnect churn until upstream routes the
          # Service to the leader only.
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: plugin-barman-cloud
            patch: |
              # Single-container Deployment, so index 0 is the barman-cloud
              # container. `replace` drops the chart's tcpSocket handler wholesale.
              - op: replace
                path: /spec/template/spec/containers/0/readinessProbe
                value:
                  httpGet:
                    path: /readyz
                    port: 8081
                    scheme: HTTP
                  initialDelaySeconds: 10
                  periodSeconds: 10
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe
                value:
                  httpGet:
                    path: /healthz
                    port: 8081
                    scheme: HTTP
                  initialDelaySeconds: 10
                  periodSeconds: 10
