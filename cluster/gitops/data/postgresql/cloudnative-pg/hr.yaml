---
# yaml-language-server: $schema=./schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name cloudnative-pg
spec:
  interval: 5m
  chart:
    spec:
      chart: cloudnative-pg
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: cnpg-charts
      version: 0.28.0
  values:
    # If the operator fails, then instance failover will also fail.
    replicaCount: 2
    nameOverride: *app_name
    fullnameOverride: *app_name
    config:
      data:
        INHERITED_LABELS: app.kubernetes.io/instance
    priorityClassName: system-cluster-critical
    monitoring:
      podMonitorEnabled: true
      grafanaDashboard:
        create: true
        sidecarLabel: "" # Unset this and load via operator resource
    updateStrategy:
      type: RollingUpdate
