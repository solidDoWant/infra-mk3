---
# Approve the Temporal frontend serving cert specifically. Without an
# explicit allow, approver-policy refuses to sign requests against the
# namespace intermediary.
apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: data-intermediary-ca-temporal-frontend
spec:
  selector:
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: data-intermediary-ca
    namespace:
      matchNames:
        - data
  allowed:
    dnsNames:
      required: true
      values:
        - temporal-frontend.data.svc
        - temporal-frontend.data.svc.cluster.local
    subject:
      countries:
        required: true
        values:
          - US
      provinces:
        required: true
        values:
          - ${SECRET_STATE}
      organizations:
        required: true
        values:
          - infra-mk3
    usages:
      - server auth
  constraints:
    maxDuration: 4h
