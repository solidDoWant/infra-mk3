---
# Plain Secret consumed by the Temporal Web UI for Authentik OIDC. Values come from
# Flux variable substitution (cluster-secrets.sops.yaml), so SOPS encryption isn't
# needed at rest in git.
apiVersion: v1
kind: Secret
metadata:
  name: temporal-ui-oidc
type: Opaque
stringData:
  TEMPORAL_AUTH_CLIENT_ID: "${SECRET_TEMPORAL_AUTHENTIK_OIDC_CLIENT_ID}"
  TEMPORAL_AUTH_CLIENT_SECRET: "${SECRET_TEMPORAL_AUTHENTIK_OIDC_CLIENT_SECRET}"
