---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
# cspell:words admintools dockerize Npgsql
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name temporal
spec:
  interval: 5m
  chart:
    spec:
      chart: temporal
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: temporal-charts
      version: 1.2.0
  valuesFrom:
    - kind: ConfigMap
      name: &archival_hr_vars temporal-archival-hr-vars
      valuesKey: endpoint
      targetPath: server.archival.history.provider.s3store.endpoint
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: endpoint
      targetPath: server.archival.visibility.provider.s3store.endpoint
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: uri
      targetPath: server.namespaceDefaults.archival.history.URI
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: uri
      targetPath: server.namespaceDefaults.archival.visibility.URI
  values:
    # Temporal 1.30+: shims are no longer needed.
    shims:
      dockerize: false
      elasticsearchTool: false

    # Schema migrations run as Helm pre-install/pre-upgrade hooks so the schema is
    # always migrated before new server pods roll. Flux helm-controller honors this.
    schema:
      useHelmHooks: true
      backoffLimit: 10
      ttlSecondsAfterFinished: 86400
      # The schema job mounts postgres TLS certs (via admintools.additionalVolumes)
      # but k8s mounts secret files as root:root mode 0440. Without fsGroup, the
      # admintools image's user 1000 can't read them.
      securityContext:
        fsGroup: 1000
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 256Mi

    server:
      enabled: true
      image:
        repository: temporalio/server
        tag: 1.31.0
      # Default replicas for every server component (frontend/history/matching/worker).
      replicaCount: 2
      # Applied to every server pod (frontend/internal-frontend/history/matching/
      # worker). All five fetch JWKS for JWT validation; this label opens the
      # netpol path to oidc-supplier pods (Authentik server, Teleport proxy).
      podLabels:
        endpoints.netpols.home.arpa/oidc-querier: "true"

      # Mount the postgres user cert (auth) and serving CA (verify-full) into every
      # server pod. The same mounts back the persistence.tls.* paths in server.config.
      additionalVolumes:
        - name: postgres-user-cert
          secret:
            secretName: temporal-postgres-temporal-user
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: postgres-serving-ca
          secret:
            secretName: temporal-postgres-17-serving-cert
            defaultMode: 0440
            items:
              - key: ca.crt
                path: ca.crt
      additionalVolumeMounts:
        - name: postgres-user-cert
          mountPath: /etc/temporal/certs/postgres/user
          readOnly: true
        - name: postgres-serving-ca
          mountPath: /etc/temporal/certs/postgres/serving
          readOnly: true

      # S3 archival credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) come from
      # the OBC-generated Secret. The s3store provider uses the AWS SDK env var chain.
      additionalEnvSecretName: temporal-archival

      metrics:
        annotations:
          enabled: false
        serviceMonitor:
          enabled: true

      # Cluster-level archival. The chart pastes this verbatim under the
      # server `archival:` key (NOT `server.config.archival` — that path is
      # silently ignored). The s3store `endpoint` field is filled in by
      # `valuesFrom` above from the Kyverno-generated ConfigMap.
      archival:
        history: &archival_config
          state: enabled
          enableRead: true
          provider:
            s3store:
              region: us-east-1
              s3ForcePathStyle: true
        visibility: *archival_config

      namespaceDefaults:
        archival:
          history:
            state: enabled
          visibility:
            state: enabled

      # Dynamic config — rendered into temporal-dynamic-config ConfigMap and
      # mounted at /etc/temporal/dynamic_config/dynamic_config.yaml. Each key
      # is a dynamic-config setting; the value is a list of entries with
      # {value, constraints}.
      dynamicConfig:
        frontend.workerHeartbeatsEnabled:
          - value: true
            constraints: {}
        # Suppress the periodic call to version-info.temporal.io. The frontend
        # version-checker loop only starts when this is true (see temporal
        # service/frontend/version_checker.go).
        frontend.enableServerVersionCheck:
          - value: false
            constraints: {}

      config:
        logLevel: info

        persistence:
          defaultStore: default
          visibilityStore: visibility
          # Locked at deploy time. Cannot be changed without wiping temporal_persistence.
          # Sized for a single-failure-tolerant homelab; ~32 shards per history pod.
          numHistoryShards: 64
          datastores:
            default:
              sql:
                # The CNPG Database CRDs in backend/postgres/databases/ create both
                # databases. Skip the chart's create-database init container, which
                # would fail with "database already exists". Schema setup/upgrade
                # still runs (manageSchema defaults to true).
                createDatabase: false
                pluginName: postgres12
                databaseName: temporal_persistence
                connectAddr: temporal-postgres-17-rw.data.svc.cluster.local:5432
                connectProtocol: tcp
                user: temporal
                # 10 conns/pod for History's hot-path workflow state writes.
                # Total budget: 8 server pods × 10 = 80 conns to the default datastore.
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
                tls:
                  enabled: true
                  caFile: /etc/temporal/certs/postgres/serving/ca.crt
                  certFile: /etc/temporal/certs/postgres/user/tls.crt
                  keyFile: /etc/temporal/certs/postgres/user/tls.key
                  enableHostVerification: true
                  serverName: temporal-postgres-17-rw.data.svc.cluster.local
            visibility:
              sql:
                createDatabase: false
                pluginName: postgres12
                databaseName: temporal_visibility
                connectAddr: temporal-postgres-17-rw.data.svc.cluster.local:5432
                connectProtocol: tcp
                user: temporal
                # 5 conns/pod for the cooler visibility workload (Frontend list queries,
                # History writes after state changes). Total: 8 × 5 = 40 conns.
                maxConns: 5
                maxIdleConns: 5
                maxConnLifetime: 1h
                tls:
                  enabled: true
                  caFile: /etc/temporal/certs/postgres/serving/ca.crt
                  certFile: /etc/temporal/certs/postgres/user/tls.crt
                  keyFile: /etc/temporal/certs/postgres/user/tls.key
                  enableHostVerification: true
                  serverName: temporal-postgres-17-rw.data.svc.cluster.local

        # Namespaces are managed externally via Job manifests in app/namespaces/, not
        # by the chart's namespace-creation feature.
        namespaces:
          create: false

        authorization:
          jwtKeyProvider:
            # Both URLs reach pods labeled `oidc-supplier` and the worker netpol
            # allows direct egress to those pods (no ingress-gateway hop):
            #   - Authentik: in-cluster service URL → authentik-server pods
            #   - Teleport:  public hostname → teleport proxy LoadBalancer →
            #     teleport-proxy pods (proxy isn't behind the ingress gateway
            #     because of TLS routing; resolves to its own LB IP via the
            #     coredns.io/hostname annotation on the proxy Service)
            keySourceURIs:
              - http://authentik-server.security.svc.cluster.local/application/o/temporal/jwks/
              # Service workers (e.g. media-processor) present these JWTs to the frontend.
              - https://teleport.${SECRET_PUBLIC_DOMAIN_NAME}/workload-identity/jwt-jwks.json
          authorizer: default
          claimMapper: default

      frontend:
        replicaCount: 2
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            memory: 384Mi
        podDisruptionBudget:
          minAvailable: 1

      # Internal Frontend: a second gRPC endpoint (port 7236) that bypasses the
      # JWT authorizer. Required when `authorization.authorizer: default` is set,
      # otherwise internal services (Worker for system workflows, admintools,
      # namespace-creation jobs) get "Request unauthorized" because they have
      # no JWT to present. Temporal's binary auto-routes Worker → internal
      # frontend when this is enabled.
      internal-frontend:
        enabled: true
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1

      history:
        replicaCount: 2
        resources:
          requests:
            cpu: 200m
            memory: 768Mi
          limits:
            memory: 768Mi
        podDisruptionBudget:
          minAvailable: 1

      matching:
        replicaCount: 2
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1

      worker:
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1

    admintools:
      enabled: true
      image:
        repository: temporalio/admin-tools
        tag: 1.31.0
      # Same fsGroup reasoning as schema.securityContext — admintools mounts the
      # same postgres TLS secrets, and its image runs as user 1000.
      securityContext:
        fsGroup: 1000
      # The schema setup Job runs from this image and reuses the persistence config
      # (including the same TLS cert paths). The chart mounts admintools volumes onto
      # the schema Job pods, so the certs must be declared here too — otherwise the
      # job fails with "open /etc/temporal/certs/postgres/serving/ca.crt: no such file".
      additionalVolumes:
        - name: postgres-user-cert
          secret:
            secretName: temporal-postgres-temporal-user
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: postgres-serving-ca
          secret:
            secretName: temporal-postgres-17-serving-cert
            defaultMode: 0440
            items:
              - key: ca.crt
                path: ca.crt
      additionalVolumeMounts:
        - name: postgres-user-cert
          mountPath: /etc/temporal/certs/postgres/user
          readOnly: true
        - name: postgres-serving-ca
          mountPath: /etc/temporal/certs/postgres/serving
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 128Mi

    web:
      enabled: true
      replicaCount: 2
      image:
        repository: temporalio/ui
        tag: 2.49.1
      # TEMPORAL_ADDRESS is hardcoded by the chart (web-deployment.yaml) using the
      # release name + namespace + frontend port — including it here causes a
      # duplicate-env-key error on apply. Don't re-add it.
      additionalEnv:
        - name: TEMPORAL_AUTH_ENABLED
          value: "true"
        - name: TEMPORAL_AUTH_TYPE
          value: oidc
        - name: TEMPORAL_AUTH_PROVIDER_URL
          value: https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/application/o/temporal/
        - name: TEMPORAL_AUTH_ISSUER_URL
          value: https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/application/o/temporal/
        - name: TEMPORAL_AUTH_CALLBACK_URL
          value: https://temporal.${SECRET_PUBLIC_DOMAIN_NAME}/auth/sso/callback
        - name: TEMPORAL_AUTH_SCOPES
          # temporal-permissions: custom scope (defined in the Authentik blueprint)
          # that injects the `permissions` claim Temporal's authorizer reads.
          value: openid,profile,email,temporal-permissions
      additionalEnvSecretName: temporal-ui-oidc
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 128Mi
      podDisruptionBudget:
        minAvailable: 1
