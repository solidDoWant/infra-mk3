---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
# cspell:words admintools dockerize Npgsql
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name temporal
spec:
  interval: 5m
  chart:
    spec:
      chart: temporal
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: temporal-charts
      version: 1.2.0
  valuesFrom:
    - kind: ConfigMap
      name: &archival_hr_vars temporal-archival-hr-vars
      valuesKey: endpoint
      targetPath: server.archival.history.provider.s3store.endpoint
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: endpoint
      targetPath: server.archival.visibility.provider.s3store.endpoint
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: uri
      targetPath: server.namespaceDefaults.archival.history.URI
    - kind: ConfigMap
      name: *archival_hr_vars
      valuesKey: uri
      targetPath: server.namespaceDefaults.archival.visibility.URI
  values:
    # Temporal 1.30+: shims are no longer needed.
    shims:
      dockerize: false
      elasticsearchTool: false

    # Schema migrations run as Helm pre-install/pre-upgrade hooks so the schema is
    # always migrated before new server pods roll. Flux helm-controller honors this.
    schema:
      useHelmHooks: true
      backoffLimit: 10
      ttlSecondsAfterFinished: 86400
      # The schema job mounts postgres TLS certs (via admintools.additionalVolumes)
      # but k8s mounts secret files as root:root mode 0440. Without fsGroup, the
      # admintools image's user 1000 can't read them.
      securityContext:
        fsGroup: 1000
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 256Mi

    server:
      enabled: true
      image:
        repository: temporalio/server
        tag: 1.31.0
      # Default replicas for every server component (frontend/history/matching/worker).
      replicaCount: 2
      # Applied to every server pod (frontend/internal-frontend/history/matching/
      # worker). All five fetch JWKS for JWT validation; this label opens the
      # netpol path to oidc-supplier pods (Authentik server, Teleport proxy).
      podLabels:
        endpoints.netpols.home.arpa/oidc-querier: "true"

      # Mount the postgres user cert (auth) and serving CA (verify-full) into every
      # server pod. The same mounts back the persistence.tls.* paths in server.config.
      # Frontend serving certs are not here because they're per-service; the
      # postRenderer below mounts them on frontend + internal-frontend only.
      additionalVolumes:
        - name: postgres-user-cert
          secret:
            secretName: temporal-postgres-temporal-user
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: postgres-serving-ca
          secret:
            secretName: temporal-postgres-17-serving-cert
            defaultMode: 0440
            items:
              - key: ca.crt
                path: ca.crt
        # ImageVolume (beta in k8s 1.32, on by default in 1.33) mounts the
        # upstream grpc-health-probe distroless image read-only at /probe so
        # frontend / internal-frontend exec readiness probes can validate
        # gRPC + TLS without a custom init image or runtime egress to GH
        # releases. Only those two services use the binary; mounting it on
        # every server controller is harmless (~12 MB image, no exec cost).
        - name: probe-bin
          image:
            reference: ghcr.io/grpc-ecosystem/grpc-health-probe:v0.4.49
            pullPolicy: IfNotPresent
      additionalVolumeMounts:
        - name: postgres-user-cert
          mountPath: /etc/temporal/certs/postgres/user
          readOnly: true
        - name: postgres-serving-ca
          mountPath: /etc/temporal/certs/postgres/serving
          readOnly: true
        - name: probe-bin
          mountPath: /probe
          readOnly: true

      # S3 archival credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) come from
      # the OBC-generated Secret. The s3store provider uses the AWS SDK env var chain.
      additionalEnvSecretName: temporal-archival

      metrics:
        annotations:
          enabled: false
        serviceMonitor:
          enabled: true

      # Cluster-level archival. The chart pastes this verbatim under the
      # server `archival:` key (NOT `server.config.archival` — that path is
      # silently ignored). The s3store `endpoint` field is filled in by
      # `valuesFrom` above from the Kyverno-generated ConfigMap.
      archival:
        history: &archival_config
          state: enabled
          enableRead: true
          provider:
            s3store:
              region: us-east-1
              s3ForcePathStyle: true
        visibility: *archival_config

      namespaceDefaults:
        archival:
          history:
            state: enabled
          visibility:
            state: enabled

      # Dynamic config — rendered into temporal-dynamic-config ConfigMap and
      # mounted at /etc/temporal/dynamic_config/dynamic_config.yaml. Each key
      # is a dynamic-config setting; the value is a list of entries with
      # {value, constraints}.
      dynamicConfig:
        frontend.workerHeartbeatsEnabled:
          - value: true
            constraints: {}
        # Suppress the periodic call to version-info.temporal.io. The frontend
        # version-checker loop only starts when this is true (see temporal
        # service/frontend/version_checker.go).
        frontend.enableServerVersionCheck:
          - value: false
            constraints: {}

      config:
        logLevel: info

        persistence:
          defaultStore: default
          visibilityStore: visibility
          # Locked at deploy time. Cannot be changed without wiping temporal_persistence.
          # Sized for a single-failure-tolerant homelab; ~32 shards per history pod.
          numHistoryShards: 64
          datastores:
            default:
              sql:
                # The CNPG Database CRDs in backend/postgres/databases/ create both
                # databases. Skip the chart's create-database init container, which
                # would fail with "database already exists". Schema setup/upgrade
                # still runs (manageSchema defaults to true).
                createDatabase: false
                pluginName: postgres12
                databaseName: temporal_persistence
                connectAddr: temporal-postgres-17-rw.data.svc.cluster.local:5432
                connectProtocol: tcp
                user: temporal
                # 10 conns/pod for History's hot-path workflow state writes.
                # Total budget: 8 server pods × 10 = 80 conns to the default datastore.
                maxConns: 10
                maxIdleConns: 10
                maxConnLifetime: 1h
                tls:
                  enabled: true
                  caFile: /etc/temporal/certs/postgres/serving/ca.crt
                  certFile: /etc/temporal/certs/postgres/user/tls.crt
                  keyFile: /etc/temporal/certs/postgres/user/tls.key
                  enableHostVerification: true
                  serverName: temporal-postgres-17-rw.data.svc.cluster.local
            visibility:
              sql:
                createDatabase: false
                pluginName: postgres12
                databaseName: temporal_visibility
                connectAddr: temporal-postgres-17-rw.data.svc.cluster.local:5432
                connectProtocol: tcp
                user: temporal
                # 5 conns/pod for the cooler visibility workload (Frontend list queries,
                # History writes after state changes). Total: 8 × 5 = 40 conns.
                maxConns: 5
                maxIdleConns: 5
                maxConnLifetime: 1h
                tls:
                  enabled: true
                  caFile: /etc/temporal/certs/postgres/serving/ca.crt
                  certFile: /etc/temporal/certs/postgres/user/tls.crt
                  keyFile: /etc/temporal/certs/postgres/user/tls.key
                  enableHostVerification: true
                  serverName: temporal-postgres-17-rw.data.svc.cluster.local

        # Namespaces are managed externally via Job manifests in app/namespaces/, not
        # by the chart's namespace-creation feature.
        namespaces:
          create: false

        authorization:
          jwtKeyProvider:
            # Both URLs reach pods labeled `oidc-supplier` and the worker netpol
            # allows direct egress to those pods (no ingress-gateway hop):
            #   - Authentik: in-cluster service URL → authentik-server pods
            #   - Teleport:  public hostname → teleport proxy LoadBalancer →
            #     teleport-proxy pods (proxy isn't behind the ingress gateway
            #     because of TLS routing; resolves to its own LB IP via the
            #     coredns.io/hostname annotation on the proxy Service)
            keySourceURIs:
              - http://authentik-server.security.svc.cluster.local/application/o/temporal/jwks/
              # Service workers (e.g. media-processor) present these JWTs to the frontend.
              - https://teleport.${SECRET_PUBLIC_DOMAIN_NAME}/workload-identity/jwt-jwks.json
          authorizer: default
          claimMapper: default

        # tls.frontend covers two listeners on each frontend-class pod:
        #   - frontend pod: gRPC (7233) and HTTP API (7243) both use it
        #   - internal-frontend pod: gRPC (7236) does NOT (it uses Internode
        #     TLS, left unset → plaintext); HTTP API (7246) DOES, because
        #     http_api_server.go calls GetFrontendServerConfig regardless of
        #     service kind.
        # So internal-frontend's gRPC stays plaintext (admintools, namespace-
        # manager, worker → internal-frontend hop are all plaintext) but the
        # cert provider still loads the file when its HTTP API listener inits.
        # requireClientAuth=false because authn is JWT bearer, not client cert.
        tls:
          frontend:
            server:
              certFile: /etc/temporal/certs/frontend/tls.crt
              keyFile: /etc/temporal/certs/frontend/tls.key
              requireClientAuth: false

      frontend:
        replicaCount: 2
        resources:
          requests:
            cpu: 100m
            memory: 384Mi
          limits:
            memory: 384Mi
        podDisruptionBudget:
          minAvailable: 1
        # Chart default is a Kubernetes-native gRPC probe on 7233. The
        # built-in probe doesn't support TLS, so once frontend started
        # serving TLS the kubelet's plaintext gRPC frame couldn't complete
        # the TLS handshake and pods stayed NotReady. Drop the chart's grpc
        # handler (null in Helm merge becomes absent at apply time) and run
        # the upstream grpc-health-probe binary, mounted via the probe-bin
        # ImageVolume above, with -tls and the cluster root CA. Probes the
        # same WorkflowService health check the chart's default did.
        readinessProbe:
          grpc: ~
          exec:
            command:
              - /probe/ko-app/grpc-health-probe
              - -addr=127.0.0.1:7233
              - -tls
              - -tls-ca-cert=/etc/ssl/certs/root-ca.pem
              - -tls-server-name=temporal-frontend.data.svc.cluster.local
              - -service=temporal.api.workflowservice.v1.WorkflowService

      # Internal Frontend: a second gRPC endpoint (port 7236) that bypasses the
      # JWT authorizer. Required when `authorization.authorizer: default` is set,
      # otherwise internal services (Worker for system workflows, admintools,
      # namespace-creation jobs) get "Request unauthorized" because they have
      # no JWT to present. Temporal's binary auto-routes Worker → internal
      # frontend when this is enabled.
      internal-frontend:
        enabled: true
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1
        # gRPC on 7236 stays plaintext (internal-frontend's gRPC uses Internode
        # TLS, which we leave unset). Same exec shape as frontend for
        # consistency; -tls flags are dropped because the listener is plaintext.
        readinessProbe:
          grpc: ~
          exec:
            command:
              - /probe/ko-app/grpc-health-probe
              - -addr=127.0.0.1:7236
              - -service=temporal.api.workflowservice.v1.WorkflowService

      history:
        replicaCount: 2
        resources:
          requests:
            cpu: 200m
            memory: 768Mi
          limits:
            memory: 768Mi
        podDisruptionBudget:
          minAvailable: 1

      matching:
        replicaCount: 2
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1

      worker:
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 256Mi
        podDisruptionBudget:
          minAvailable: 1

    admintools:
      enabled: true
      image:
        repository: temporalio/admin-tools
        tag: 1.31.0
      # Same fsGroup reasoning as schema.securityContext — admintools mounts the
      # same postgres TLS secrets, and its image runs as user 1000.
      securityContext:
        fsGroup: 1000
      # The schema setup Job runs from this image and reuses the persistence config
      # (including the same TLS cert paths). The chart mounts admintools volumes onto
      # the schema Job pods, so the certs must be declared here too — otherwise the
      # job fails with "open /etc/temporal/certs/postgres/serving/ca.crt: no such file".
      additionalVolumes:
        - name: postgres-user-cert
          secret:
            secretName: temporal-postgres-temporal-user
            defaultMode: 0440
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: postgres-serving-ca
          secret:
            secretName: temporal-postgres-17-serving-cert
            defaultMode: 0440
            items:
              - key: ca.crt
                path: ca.crt
      additionalVolumeMounts:
        - name: postgres-user-cert
          mountPath: /etc/temporal/certs/postgres/user
          readOnly: true
        - name: postgres-serving-ca
          mountPath: /etc/temporal/certs/postgres/serving
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 128Mi

    web:
      enabled: true
      replicaCount: 2
      image:
        repository: temporalio/ui
        tag: 2.49.1
      # TEMPORAL_ADDRESS is hardcoded by the chart (web-deployment.yaml) using the
      # release name + namespace + frontend port — including it here causes a
      # duplicate-env-key error on apply. Don't re-add it.
      additionalEnv:
        - name: TEMPORAL_AUTH_ENABLED
          value: "true"
        - name: TEMPORAL_AUTH_TYPE
          value: oidc
        - name: TEMPORAL_AUTH_PROVIDER_URL
          value: https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/application/o/temporal/
        - name: TEMPORAL_AUTH_ISSUER_URL
          value: https://authentik.${SECRET_PUBLIC_DOMAIN_NAME}/application/o/temporal/
        - name: TEMPORAL_AUTH_CALLBACK_URL
          value: https://temporal.${SECRET_PUBLIC_DOMAIN_NAME}/auth/sso/callback
        - name: TEMPORAL_AUTH_SCOPES
          # temporal-permissions: custom scope (defined in the Authentik blueprint)
          # that injects the `permissions` claim Temporal's authorizer reads.
          value: openid,profile,email,temporal-permissions
        # Setting TEMPORAL_TLS_CA enables TLS in the UI's gRPC client. SNI
        # comes from TEMPORAL_ADDRESS (chart-set to temporal-frontend.data.svc),
        # which matches the cert SAN, so no TEMPORAL_TLS_SERVER_NAME override.
        - name: TEMPORAL_TLS_CA
          value: /etc/ssl/certs/root-ca.pem
      additionalEnvSecretName: temporal-ui-oidc
      additionalVolumes:
        # 0444 because the temporalio/ui image runs as a non-root user and no
        # fsGroup is set on this pod — 0440 lands as root:root and is unreadable.
        - name: root-ca
          secret:
            secretName: root-ca-pub-cert
            defaultMode: 0444
            items:
              - key: ca.pem
                path: root-ca.pem
      additionalVolumeMounts:
        - name: root-ca
          mountPath: /etc/ssl/certs/root-ca.pem
          subPath: root-ca.pem
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 128Mi
      podDisruptionBudget:
        minAvailable: 1

  # The chart's server.additionalVolumes apply to every server pod with no
  # per-component knob. Doing it via values would mount the frontend serving
  # cert on three pods that never read it AND roll all five on every rotation
  # (the Secrets carry kyverno.home.arpa/reload). Patches are additive —
  # kustomize's $patch: delete on nested merge-key lists is buggy and wipes
  # the whole sibling list, so we add only to the two frontend-class pods.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: temporal-frontend
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: temporal-frontend
              spec:
                template:
                  spec:
                    volumes:
                      - name: frontend-tls
                        secret:
                          secretName: temporal-frontend-tls
                          defaultMode: 0440
                          items:
                            - key: tls.crt
                              path: tls.crt
                            - key: tls.key
                              path: tls.key
                      # The exec readiness probe runs grpc-health-probe with
                      # -tls-ca-cert=/etc/ssl/certs/root-ca.pem to validate
                      # the TLS handshake against 127.0.0.1:7233. Mounted only
                      # on this pod — internal-frontend's probe is plaintext.
                      - name: root-ca
                        secret:
                          secretName: root-ca-pub-cert
                          defaultMode: 0444
                          items:
                            - key: ca.pem
                              path: root-ca.pem
                    containers:
                      - name: temporal-frontend
                        volumeMounts:
                          - name: frontend-tls
                            mountPath: /etc/temporal/certs/frontend
                            readOnly: true
                          - name: root-ca
                            mountPath: /etc/ssl/certs/root-ca.pem
                            subPath: root-ca.pem
                            readOnly: true
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: temporal-internal-frontend
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: temporal-internal-frontend
              spec:
                template:
                  spec:
                    volumes:
                      - name: frontend-tls
                        secret:
                          secretName: temporal-internal-frontend-tls
                          defaultMode: 0440
                          items:
                            - key: tls.crt
                              path: tls.crt
                            - key: tls.key
                              path: tls.key
                    containers:
                      - name: temporal-internal-frontend
                        volumeMounts:
                          - name: frontend-tls
                            mountPath: /etc/temporal/certs/frontend
                            readOnly: true
