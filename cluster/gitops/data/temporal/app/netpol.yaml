---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
# cspell:words admintools archivers Archiver Ringpop ringpop tctl
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: temporal
specs:
  # ---------------------------------------------------------------------------
  # Frontend service. The only service exposing 7233 to UI / admintools / SDK
  # workers. Forwards workflow ops to History (7234) and queue ops to Matching
  # (7235).
  # ---------------------------------------------------------------------------
  - description: temporal-frontend
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: frontend
    egress:
      # DNS resolution
      - &dns_egress
        toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Postgres (default + visibility datastores)
      - &postgres_egress
        toEndpoints:
          - matchLabels:
              cnpg.io/cluster: temporal-postgres-17
        toPorts:
          - ports:
              - port: "5432"
                protocol: TCP
      # Forward workflow operations to History
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
        toPorts:
          - ports:
              - port: "7234"
                protocol: TCP
      # Forward task-queue ops / worker polls to Matching
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
        toPorts:
          - ports:
              - port: "7235"
                protocol: TCP
      # Internal Frontend gRPC (no JWT). Frontend redirects internal callers
      # here for system workflows / namespace ops.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
        toPorts:
          - ports:
              - port: "7236"
                protocol: TCP
      # Internal gateway. Frontend uses this to read archived workflow
      # histories from Rook Ceph S3 when answering describe/list workflow
      # queries against archived data.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      # JWKS polling for JWT validation. All five server services init the
      # JWT key provider when authorization is configured; each pod refreshes
      # JWKS on its own cycle. Hits any in-cluster pod labeled as an OIDC
      # supplier (Authentik server pod port 9000, Teleport proxy pod port
      # 3080).
      - &jwks_egress
        toEndpoints:
          - matchLabels:
              endpoints.netpols.home.arpa/oidc-supplier: "true"
            matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
        toPorts:
          - ports:
              - port: "9000"
                protocol: TCP
              - port: "3080"
                protocol: TCP
      # Ringpop membership gossip to all sister services. Each service uses a
      # distinct membership port: frontend 6933, history 6934, matching 6935,
      # internal-frontend 6936, worker 6939. Members talk to all peers on every
      # membership port.
      - &ringpop_egress
        toEndpoints:
          - &all_temporal_servers
            matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values:
                  - frontend
                  - internal-frontend
                  - history
                  - matching
                  - worker
        toPorts:
          - ports:
              - port: "6933"
                protocol: TCP
              - port: "6934"
                protocol: TCP
              - port: "6935"
                protocol: TCP
              - port: "6936"
                protocol: TCP
              - port: "6939"
                protocol: TCP
    ingress:
      # Web UI is the public Frontend's primary in-cluster caller —
      # internal Temporal services (Worker system workflows, admintools,
      # namespace-jobs) go through the Internal Frontend so they don't need
      # to present a JWT.
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: web
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Any in-cluster service-worker that authenticates with a JWT (e.g.
      # media-processor with a Teleport Workload Identity JWT-SVID).
      - fromEndpoints:
          - matchLabels:
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
            matchExpressions:
              - key: io.kubernetes.pod.namespace
                operator: Exists
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Ringpop membership ingress from all peers
      - fromEndpoints:
          - *all_temporal_servers
        toPorts:
          - ports:
              - port: "6933"
                protocol: TCP
      # Worker probes Frontend on the internal-frontend membership port (6936)
      # as part of cluster-wide ringpop discovery.
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: worker
        toPorts:
          - ports:
              - port: "6936"
                protocol: TCP
      # Metrics scraping
      - &metrics_ingress
        fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9090"
                protocol: TCP
      # Kubelet readiness probe (Frontend is the only server service with a probe
      # configured by the chart; it grpc-probes 7233).
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP

  # ---------------------------------------------------------------------------
  # Internal Frontend service. Same gRPC API as Frontend on port 7236, but with
  # a noop authorizer so internal services (Worker for system workflows,
  # admintools, namespace-creation jobs) can call it without a JWT. Never
  # exposed externally — only sister services and admintools-class clients.
  # ---------------------------------------------------------------------------
  - description: temporal-internal-frontend
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: internal-frontend
    egress:
      - *dns_egress
      - *postgres_egress
      # Forward workflow operations to History
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
        toPorts:
          - ports:
              - port: "7234"
                protocol: TCP
      # Forward task-queue ops / worker polls to Matching
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
        toPorts:
          - ports:
              - port: "7235"
                protocol: TCP
      # Sister internal-frontend pods (gRPC). Required for any cross-pod
      # internal API call routed via membership.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
        toPorts:
          - ports:
              - port: "7236"
                protocol: TCP
      # Internal gateway. Internal Frontend uses this to read archived
      # workflow histories from Rook Ceph S3 when answering describe/list
      # workflow queries against archived data.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      - *jwks_egress
      - *ringpop_egress
    ingress:
      # Internal callers: Frontend (redirects internal calls), sister
      # internal-frontend pods, Worker for system workflows, admintools
      # deployment, and the namespace-manager.
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: worker
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: admintools
          - matchLabels:
              app.kubernetes.io/name: temporal-namespace-manager
              app.kubernetes.io/instance: temporal-namespace-manager
              app.kubernetes.io/controller: temporal-namespace-manager
        toPorts:
          - ports:
              - port: "7236"
                protocol: TCP
      # Ringpop membership ingress from all peers
      - fromEndpoints:
          - *all_temporal_servers
        toPorts:
          - ports:
              - port: "6936"
                protocol: TCP
      # Worker probes Internal Frontend on the worker membership port (6939)
      # as part of cluster-wide ringpop discovery.
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: worker
        toPorts:
          - ports:
              - port: "6939"
                protocol: TCP
      - *metrics_ingress

  # ---------------------------------------------------------------------------
  # History service. Owns workflow execution state. The only service that runs
  # the archivers, so the only one that needs S3 egress.
  # ---------------------------------------------------------------------------
  - description: temporal-history
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: history
    egress:
      - *dns_egress
      - *postgres_egress
      # Add tasks to Matching task queues
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
        toPorts:
          - ports:
              - port: "7235"
                protocol: TCP
      # Sister history pods (cross-shard reads after Ringpop ownership changes).
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
        toPorts:
          - ports:
              - port: "7234"
                protocol: TCP
      # Internal gateway. History uses this for S3 archival (HistoryArchiver and
      # VisibilityArchiver write workflow histories to Rook Ceph via the gateway).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      - *jwks_egress
      - *ringpop_egress
    ingress:
      # gRPC from Frontend / Internal Frontend (forwarded workflow ops) and
      # from sister history pods (cross-shard reads triggered by Ringpop
      # ownership changes).
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
        toPorts:
          - ports:
              - port: "7234"
                protocol: TCP
      # Ringpop membership ingress from all peers
      - fromEndpoints:
          - *all_temporal_servers
        toPorts:
          - ports:
              - port: "6934"
                protocol: TCP
      - *metrics_ingress

  # ---------------------------------------------------------------------------
  # Matching service. Owns task queue partitions. Reached by Frontend (worker
  # poll forwarding) and History (RecordTaskStarted callbacks). Talks back to
  # History to confirm task processing.
  # ---------------------------------------------------------------------------
  - description: temporal-matching
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: matching
    egress:
      - *dns_egress
      - *postgres_egress
      # Talk back to History (e.g. RecordWorkflowTaskStarted)
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
        toPorts:
          - ports:
              - port: "7234"
                protocol: TCP
      # Cross-partition forwarding between matching pods (sticky workflows route
      # to the matching pod that owns the partition).
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
        toPorts:
          - ports:
              - port: "7235"
                protocol: TCP
      - *jwks_egress
      - *ringpop_egress
    ingress:
      # gRPC from Frontend / Internal Frontend, History, and sister matching
      # pods (cross-partition forwarding for sticky workflows).
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: history
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: matching
        toPorts:
          - ports:
              - port: "7235"
                protocol: TCP
      # Ringpop membership ingress from all peers
      - fromEndpoints:
          - *all_temporal_servers
        toPorts:
          - ports:
              - port: "6935"
                protocol: TCP
      - *metrics_ingress

  # ---------------------------------------------------------------------------
  # Worker service. No service gRPC port — only Ringpop membership on 6939.
  # Acts as an SDK client to its own cluster (Frontend) for system workflows
  # like replication and scheduled-workflow management.
  # ---------------------------------------------------------------------------
  - description: temporal-worker
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: worker
    egress:
      - *dns_egress
      - *postgres_egress
      # Worker calls Internal Frontend (port 7236) — not the public Frontend —
      # for system workflows. The Internal Frontend bypasses JWT authorization
      # so internal calls don't need a token.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
        toPorts:
          - ports:
              - port: "7236"
                protocol: TCP
      - *jwks_egress
      - *ringpop_egress
    ingress:
      # Ringpop membership ingress only — no service gRPC port.
      - fromEndpoints:
          - *all_temporal_servers
        toPorts:
          - ports:
              - port: "6939"
                protocol: TCP
      - *metrics_ingress

  # ---------------------------------------------------------------------------
  # Web UI. Talks to Frontend gRPC and Authentik OIDC.
  # ---------------------------------------------------------------------------
  - description: temporal-web
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: web
    egress:
      - *dns_egress
      # Frontend gRPC for serving the UI
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Authentik OIDC discovery + token exchange via internal-gateway
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
    ingress:
      # User HTTP traffic from internal-gateway
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
      # Kubelet HTTP readiness probe
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP

  # ---------------------------------------------------------------------------
  # Admintools deployment. Uses Internal Frontend (no JWT) for tctl operations.
  # ---------------------------------------------------------------------------
  - description: temporal-admintools
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: admintools
    egress:
      - *dns_egress
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: internal-frontend
        toPorts:
          - ports:
              - port: "7236"
                protocol: TCP

  # ---------------------------------------------------------------------------
  # Schema setup Job. Runs as a Helm pre-install/pre-upgrade hook against
  # postgres only — uses temporal-sql-tool, never talks to the frontend.
  # The chart labels these pods with component=database.
  # ---------------------------------------------------------------------------
  - description: temporal-schema-job
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/instance: temporal
        app.kubernetes.io/component: database
    egress:
      - *dns_egress
      - *postgres_egress
