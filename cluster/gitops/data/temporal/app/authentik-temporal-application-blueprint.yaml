---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-temporal-application-blueprint
  labels:
    k8s-sidecar.home.arpa/application: authentik
type: Opaque
stringData:
  # Must be a Secret (not secretGenerator) so Flux substitution applies inside.
  authentik-temporal-application-blueprint.yaml: |
    ---
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Temporal application
      labels:
        blueprints.goauthentik.io/description: Resources for Temporal SSO
    entries:
      # Dependencies
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Implicit provider authentication
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Password authentication flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Invalidation flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Blueprint library
          required: true
      # Custom scope mapping. Issues a `permissions` claim (string array) read by
      # Temporal's default JWT claim mapper (server.config.authorization). Group
      # membership maps to permission strings:
      #   Temporal admins → temporal-system:admin
      #   Temporal users  → temporal-system:read
      - model: authentik_providers_oauth2.scopemapping
        id: temporal-permissions-scope
        identifiers:
          managed: temporal-permissions
        attrs:
          name: Temporal permissions
          scope_name: temporal-permissions
          description: Temporal authorization permissions claim
          expression: |
            permissions = []
            if request.user.ak_groups.filter(name="Temporal admins").exists():
                permissions.append("temporal-system:admin")
            else if request.user.ak_groups.filter(name="Temporal users").exists():
                permissions.append("temporal-system:read")
            return {"permissions": permissions}
      # Application
      - model: authentik_providers_oauth2.oauth2provider
        id: temporal-provider
        identifiers:
          name: Temporal
        attrs:
          name: Temporal
          authorization_flow:
            !Find [authentik_flows.flow, [slug, implicit-authorization-flow]]
          client_type: confidential
          client_id: "${SECRET_TEMPORAL_AUTHENTIK_OIDC_CLIENT_ID}"
          client_secret: "${SECRET_TEMPORAL_AUTHENTIK_OIDC_CLIENT_SECRET}"
          redirect_uris:
            - url: https://temporal.${SECRET_PUBLIC_DOMAIN_NAME}/auth/sso/callback
              matching_mode: strict
          signing_key:
            !Find [
              authentik_crypto.certificatekeypair,
              [name, authentik Self-signed Certificate],
            ]
          authentication_flow:
            !Find [authentik_flows.flow, [slug, password-authentication-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=8
          refresh_token_validity: days=30
          property_mappings:
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'email'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'openid'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'profile'"],
              ]
            - !KeyOf temporal-permissions-scope
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
      - model: authentik_core.application
        id: temporal-application
        identifiers:
          slug: temporal
        attrs:
          name: Temporal
          slug: temporal
          group: Development
          provider: !KeyOf temporal-provider
          policy_engine_mode: any
          meta_launch_url: https://temporal.${SECRET_PUBLIC_DOMAIN_NAME}
      # Groups
      - model: authentik_core.group
        id: temporal-admins-group
        identifiers:
          name: Temporal admins
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_TEMPORAL_ADMINS_DISCORD_ROLE_ID}"
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf temporal-admins-group
          target: !KeyOf temporal-application
      - model: authentik_core.group
        id: temporal-users-group
        identifiers:
          name: Temporal users
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_TEMPORAL_USERS_DISCORD_ROLE_ID}"
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf temporal-users-group
          target: !KeyOf temporal-application
