---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: temporal-frontend
spec:
  dnsNames:
    - temporal-frontend.data.svc
    - temporal-frontend.data.svc.cluster.local
  subject:
    countries:
      - US
    provinces:
      - ${SECRET_STATE}
    organizations:
      - infra-mk3
  usages:
    - server auth
  duration: 4h
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: data-intermediary-ca
  secretName: temporal-frontend-tls
