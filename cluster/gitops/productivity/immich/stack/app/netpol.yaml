---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: immich-stack
specs:
  - description: immich-stack daily stacking cronjob
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: immich-stack
        app.kubernetes.io/instance: immich-stack
    egress:
      # DNS resolution
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Immich server API: what the main (stacker) container talks to.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: immich
              app.kubernetes.io/instance: immich
              app.kubernetes.io/controller: server
        toPorts:
          - ports:
              - port: "2283"
                protocol: TCP
      # Postgres (immich-postgres -rw): the inject-keys init container provisions
      # per-user API keys directly over native mTLS (no Envoy sidecar here).
      - toEndpoints:
          - matchLabels:
              cnpg.io/cluster: immich-postgres
        toPorts:
          - ports:
              - port: "5432"
                protocol: TCP
