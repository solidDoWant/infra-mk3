---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-dragonfly
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/dragonfly/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    serviceName: immich
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    # Immich's job queue (BullMQ) runs Lua scripts that access keys without
    # declaring them in KEYS[]. Dragonfly rejects this by default, which breaks
    # the bull-board dashboard at /admin/queues ("script tried accessing
    # undeclared key, key: immich_bull:..."). allow-undeclared-keys restores the
    # Redis-compatible behavior BullMQ relies on (single instance, so it only
    # trades some Lua throughput for compatibility — safe, atomicity preserved).
    # NOTE: `args` replaces the chart default, so --proactor_threads is repeated.
    args:
      - --proactor_threads=2
      - --default_lua_flags=allow-undeclared-keys
    certificates:
      serving:
        issuerRef:
          name: productivity-intermediary-ca
    users:
      # Issues the client cert (CN=immich) the Envoy sidecars present for mTLS.
      immich:
        username: immich
        # Don't roll the immich pods when this cert rotates — the Envoy sidecars
        # hot-reload it via file-based SDS (watched_directory).
        disableReloading: true
    netpol:
      applicationAccess:
        # api (server) + microservices reach Dragonfly via their Envoy sidecar.
        selectors:
          - matchLabels:
              app.kubernetes.io/name: immich
              app.kubernetes.io/instance: immich
              app.kubernetes.io/controller: server
          - matchLabels:
              app.kubernetes.io/name: immich
              app.kubernetes.io/instance: immich
              app.kubernetes.io/controller: microservices
