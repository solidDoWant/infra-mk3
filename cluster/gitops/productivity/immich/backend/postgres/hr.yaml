---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-postgres
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    clusterName: immich
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    certificates:
      client:
        ca:
          subject: &subject
            countries:
              - US
            provinces:
              - ${SECRET_STATE}
            organizations:
              - infra-mk3
      serving:
        issuerRef:
          name: productivity-intermediary-ca
        subject: *subject
    users:
      # Owner role `immich` is created by initdb (owner defaults to the database
      # name). This block only issues the client certificate the Envoy sidecars
      # present for mTLS cert auth (CN=immich) — no managed role is created.
      immich:
        username: immich
        # Don't roll the immich pods when this cert rotates — the Envoy sidecars
        # hot-reload it via file-based SDS (watched_directory). Drops the
        # cnpg.io/reload label the kyverno workload-reloader keys on.
        disableReloading: true
    # VectorChord requires its shared library to be preloaded at server start.
    # The `.so` suffix matches the official immich-charts example and the
    # bo0tzz/m00nwtchr reference deployments.
    sharedPreloadLibraries:
      - vchord.so
    # Make the vchord (VectorChord) extension binary available to Postgres via a
    # CNPG image volume. vchord bundles its pgvector dependency. The extensions
    # themselves are created declaratively by the Database CRD (database.yaml),
    # because Immich's non-superuser role cannot CREATE EXTENSION for untrusted
    # extensions. Mirrors the official immich-charts local/cloudnative-pg.yaml.
    extensions:
      - name: vchord
        image:
          reference: ghcr.io/tensorchord/vchord-scratch:pg18-v1.1.1
        dynamic_library_path:
          - /usr/lib/postgresql/18/lib
        extension_control_path:
          - /usr/share/postgresql/18/
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        # Both the api (server) and microservices controllers reach Postgres via
        # their in-pod Envoy sidecar.
        selectors:
          - matchLabels:
              app.kubernetes.io/name: immich
              app.kubernetes.io/instance: immich
              app.kubernetes.io/controller: server
          - matchLabels:
              app.kubernetes.io/name: immich
              app.kubernetes.io/instance: immich
              app.kubernetes.io/controller: microservices
