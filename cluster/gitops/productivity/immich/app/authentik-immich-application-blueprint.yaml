---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-immich-application-blueprint
  labels:
    k8s-sidecar.home.arpa/application: authentik
type: Opaque
stringData:
  # Must be a Secret (not a secretGenerator) so Flux substitutes the variables.
  authentik-immich-application-blueprint.yaml: |
    ---
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Immich application
      labels:
        blueprints.goauthentik.io/description: Resources for Immich SSO
    entries:
      # Dependencies
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Implicit provider authentication
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Password authentication flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Invalidation flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Blueprint library
          required: true
      # Scope mapping that emits the `immich_role` claim (value "admin" for members
      # of the "Immich admins" group, otherwise "user"). On the Immich side, set
      # OAuth "Scope" to `openid email profile immich_role` and leave "Role Claim"
      # at its default (immich_role). Note: Immich only reads the role on user
      # creation, not on subsequent logins.
      - model: authentik_providers_oauth2.scopemapping
        id: immich-role-scope
        identifiers:
          name: Immich Role
        attrs:
          name: Immich Role
          scope_name: immich_role
          description: "Immich role (admin for the Immich admins group, else user)"
          expression: |
            return {
                "immich_role": "admin" if ak_is_group_member(request.user, name="Immich admins") else "user",
            }
      # Application
      - model: authentik_providers_oauth2.oauth2provider
        id: immich-provider
        identifiers:
          name: Immich
        attrs:
          name: Immich
          authorization_flow:
            !Find [authentik_flows.flow, [slug, implicit-authorization-flow]]
          client_type: confidential
          client_id: "${SECRET_IMMICH_AUTHENTIK_OIDC_CLIENT_ID}"
          client_secret: "${SECRET_IMMICH_AUTHENTIK_OIDC_CLIENT_SECRET}"
          # Authentik docs are wrong. The redirect URI should not have a trailing slash.
          redirect_uris:
            - url: https://immich.${SECRET_PUBLIC_DOMAIN_NAME}/auth/login
              matching_mode: strict
            - url: https://immich.${SECRET_PUBLIC_DOMAIN_NAME}/user-settings
              matching_mode: strict
            # Mobile app custom scheme.
            - url: app.immich:///oauth-callback
              matching_mode: strict
          signing_key:
            !Find [
              authentik_crypto.certificatekeypair,
              [name, authentik Self-signed Certificate],
            ]
          authentication_flow:
            !Find [authentik_flows.flow, [slug, password-authentication-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: days=1
          refresh_token_validity: days=30
          property_mappings:
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'email'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'openid'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'profile'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'offline_access'"],
              ]
            # Immich role claim (immich_role: user|admin)
            - !KeyOf immich-role-scope
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
      - model: authentik_core.application
        id: immich-application
        identifiers:
          slug: immich
        attrs:
          name: Immich
          slug: immich
          group: Productivity access
          provider: !KeyOf immich-provider
          policy_engine_mode: any
          meta_launch_url: https://immich.${SECRET_PUBLIC_DOMAIN_NAME}
      # Groups — membership drives the immich_role claim above and app access below.
      - model: authentik_core.group
        id: immich-users-group
        identifiers:
          name: Immich users
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_IMMICH_USERS_DISCORD_ROLE_ID}"
      - model: authentik_core.group
        id: immich-admins-group
        identifiers:
          name: Immich admins
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_IMMICH_ADMINS_DISCORD_ROLE_ID}"
      # Both groups may launch the application (policy_engine_mode: any).
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf immich-users-group
          target: !KeyOf immich-application
      - model: authentik_policies.policybinding
        identifiers:
          order: 1
          group: !KeyOf immich-admins-group
          target: !KeyOf immich-application
