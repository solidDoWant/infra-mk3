# File-based SDS resource for the root CA used to validate the dragonfly serving
# cert. Hot-reloaded via watched_directory on /etc/envoy/secrets/root-ca.
resources:
  - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: redis_serving_cert
    validation_context:
      trusted_ca:
        filename: /etc/envoy/secrets/root-ca/ca.crt
