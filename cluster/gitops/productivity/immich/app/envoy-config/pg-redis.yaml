---
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 8000

# SDS requires node.id and node.cluster to be set (sent in the discovery request
# even for file-based path_config_source). Arbitrary labels used only in stats/logs.
node:
  id: envoy-immich-proxy
  cluster: productivity

static_resources:
  clusters:
    # ---- PostgreSQL (mTLS via STARTTLS) ----
    - name: postgres_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      load_assignment:
        cluster_name: postgres_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: immich-postgres-rw.productivity.svc.cluster.local
                      port_value: 5432
      health_checks:
        - timeout: 1s
          interval: 3s
          unhealthy_threshold: 2
          healthy_threshold: 1
          tcp_health_check: {}
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: postgres_upstream_tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.starttls.v3.UpstreamStartTlsConfig
          tls_socket_config:
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_3
                tls_maximum_protocol_version: TLSv1_3
                signature_algorithms:
                  # ed25519 is the PKI's key algorithm; not enabled by default
                  # because it is not FIPS compliant.
                  - ed25519
                  - rsa_pss_rsae_sha512
              # File-based SDS: Envoy hot-reloads the client cert when the secret
              # mount changes (watched_directory), so cert-manager rotations don't
              # require a pod restart.
              tls_certificate_sds_secret_configs:
                - name: postgres_client_cert
                  sds_config:
                    resource_api_version: V3
                    path_config_source:
                      path: /etc/envoy/postgres-client-cert-sds.yaml
                      watched_directory:
                        path: /etc/envoy/secrets/postgres
              validation_context_sds_secret_config:
                name: postgres_serving_cert
                sds_config:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/postgres-validation-context-sds.yaml
                    watched_directory:
                      path: /etc/envoy/secrets/root-ca
            auto_host_sni: true
            auto_sni_san_validation: true
      close_connections_on_host_health_failure: true
      ignore_health_on_host_removal: true

    # ---- Dragonfly / Redis (mTLS) ----
    # Immich (ioredis) uses a single Redis DB (REDIS_DBINDEX=0) on one connection
    # target, so a transparent TCP proxy that re-originates mTLS upstream works.
    # The protocol-aware redis_proxy filter is intentionally NOT used — its
    # multi-DB bug (envoyproxy/envoy#41659) does not apply to a plain TCP proxy.
    - name: redis_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      load_assignment:
        cluster_name: redis_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: immich-dragonfly.productivity.svc.cluster.local
                      port_value: 6379
      health_checks:
        - timeout: 1s
          interval: 3s
          unhealthy_threshold: 2
          healthy_threshold: 1
          tcp_health_check: {}
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: redis_upstream_tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          common_tls_context:
            tls_params:
              # TLS 1.3 is required by Dragonfly, and Envoy caps TLS at 1.2 for clients by default.
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
              signature_algorithms:
                - rsa_pss_rsae_sha512
                - ed25519
            # File-based SDS — hot-reloaded on cert-manager rotation (see above).
            tls_certificate_sds_secret_configs:
              - name: redis_client_cert
                sds_config:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/redis-client-cert-sds.yaml
                    watched_directory:
                      path: /etc/envoy/secrets/redis
            validation_context_sds_secret_config:
              name: redis_serving_cert
              sds_config:
                resource_api_version: V3
                path_config_source:
                  path: /etc/envoy/redis-validation-context-sds.yaml
                  watched_directory:
                    path: /etc/envoy/secrets/root-ca
          auto_host_sni: true
          auto_sni_san_validation: true
          # Dragonfly does not support TLS session resumption; resumed sessions
          # fail to authenticate, so disable the session-key cache.
          max_session_keys: 0
      close_connections_on_host_health_failure: true
      ignore_health_on_host_removal: true

  listeners:
    - name: postgres_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 5432
      filter_chains:
        - filters:
            - name: envoy.filters.network.postgres_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.postgres_proxy.v3alpha.PostgresProxy
                stat_prefix: egress_postgres
                enable_sql_parsing: false
                upstream_ssl: REQUIRE
            - name: envoy.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_postgres
                cluster: postgres_cluster
                # Disable the idle timeout; rely on the application to close idle
                # connections.
                idle_timeout: 0s

    - name: redis_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 6379
      filter_chains:
        - filters:
            - name: envoy.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_redis
                cluster: redis_cluster
                idle_timeout: 0s
