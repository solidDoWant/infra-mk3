---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    defaultPodOptions:
      securityContext:
        # The immich-server / machine-learning images run as root, so runAsNonRoot
        # is intentionally NOT forced at the pod level. fsGroup lets the non-root
        # Envoy sidecar read the 0440 cert/config secrets, and sets group ownership
        # on the cephfs ML cache (NFS ignores fsGroup).
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"

    controllers:
      # ---- API / web workers (horizontally scalable, HA) ----
      server:
        replicas: 2
        strategy: RollingUpdate
        podDisruptionBudget:
          minAvailable: 1
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              # This controller only runs the api worker. See the microservices
              # controller for the job processor.
              IMMICH_WORKERS_INCLUDE: api
              # Shared DB/Redis/ML config (anchored so the microservices worker
              # reuses it without the api-only worker selector above).
              <<: &immich_app_env
                # Bind IPv4 only — IPv6 is disabled on the host kernel. The server
                # otherwise binds `::` (and the ML default is `[::]`), which fails
                # to bind on an IPv6-disabled kernel.
                IMMICH_HOST: "0.0.0.0"
                # DB + Redis are reached over plaintext localhost; the Envoy
                # sidecar re-originates them as mTLS to CNPG / Dragonfly.
                DB_HOSTNAME: 127.0.0.1
                DB_PORT: "5432"
                DB_USERNAME: immich
                DB_DATABASE_NAME: immich
                DB_PASSWORD: ""
                DB_SSL_MODE: disable
                DB_VECTOR_EXTENSION: vectorchord
                REDIS_HOSTNAME: 127.0.0.1
                REDIS_PORT: "6379"
                REDIS_DBINDEX: "0"
                IMMICH_MEDIA_LOCATION: /data
                IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.productivity.svc.cluster.local:3003
                IMMICH_TELEMETRY_INCLUDE: all
            probes:
              liveness: &server_probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *server_probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 200m
                memory: &server_memory 1Gi
              limits:
                memory: *server_memory
            securityContext: &immich_security
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          envoy: &envoy_sidecar
            image:
              # The contrib image is required for the postgres_proxy filter.
              repository: envoyproxy/envoy
              tag: contrib-v1.35.3
            resources:
              requests:
                cpu: 25m
                memory: &envoy_memory 64Mi
              limits:
                memory: *envoy_memory
            securityContext:
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

      # ---- Background job worker (jobs distributed via BullMQ over Redis) ----
      microservices:
        # Kept at 1 replica: the FacialRecognition, StorageTemplateMigration,
        # DuplicateDetection and BackupDatabase queues are concurrency-1 PER
        # replica, so >1 replica double-runs them (degraded face clustering /
        # racy storage-template file moves). Nightly crons are singleton via a
        # Postgres advisory lock regardless of replica count. Safe to raise to 2
        # once the cross-worker DB-lock serialization ships:
        # https://github.com/immich-app/immich/pull/28410
        replicas: 1
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              # Run every worker EXCEPT the api (i.e. the job processor).
              IMMICH_WORKERS_EXCLUDE: api
              <<: *immich_app_env
            probes:
              # The microservices worker serves no HTTP API; liveness is a TCP
              # check against its telemetry port (bound because telemetry is on).
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8082
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 200m
                memory: &ms_memory 2Gi
              limits:
                memory: *ms_memory
            securityContext: *immich_security
          envoy: *envoy_sidecar

      # ---- Machine learning (OpenVINO on Intel Iris Xe GPU) ----
      machine-learning:
        replicas: 2
        strategy: RollingUpdate
        podDisruptionBudget:
          minAvailable: 1
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: immich-machine-learning-gpu
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5-openvino
            env:
              # Bind IPv4 only — the ML service defaults to immich_host "[::]",
              # which fails to bind on the IPv6-disabled host kernel.
              IMMICH_HOST: "0.0.0.0"
              MACHINE_LEARNING_CACHE_FOLDER: /cache
              # HuggingFace / matplotlib caches must live on the writable PVC.
              TRANSFORMERS_CACHE: /cache
              HF_XET_CACHE: /cache/huggingface-xet
              MPLCONFIGDIR: /cache/matplotlib-config
            probes:
              liveness: &ml_probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *ml_probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  periodSeconds: 10
                  failureThreshold: 60
            resources:
              requests:
                cpu: 500m
                memory: &ml_memory 4Gi
              limits:
                memory: *ml_memory
              # GPU is attached via the DRA ResourceClaimTemplate referenced in
              # pod.resourceClaims (see gpu-claim-template.yaml).
              claims:
                - name: gpu
            securityContext: *immich_security

    service:
      server:
        controller: server
        primary: true
        ports:
          http:
            port: 2283
            primary: true
          metrics-api:
            port: 8081
      microservices:
        controller: microservices
        ports:
          metrics-ms:
            port: 8082
      machine-learning:
        controller: machine-learning
        ports:
          http:
            port: 3003
            primary: true

    serviceMonitor:
      server:
        serviceName: immich-server
        endpoints:
          - port: metrics-api
      microservices:
        serviceName: immich-microservices
        endpoints:
          - port: metrics-ms

    route:
      server:
        hostnames:
          - immich.${SECRET_PUBLIC_DOMAIN_NAME}
        parentRefs:
          - name: internal-gateway
            namespace: networking
        rules:
          - backendRefs:
              - identifier: server
                port: 2283

    persistence:
      # Shared media library (originals, thumbnails, encoded video, profile).
      # RWX so the api replicas and the microservices worker share it across nodes.
      library:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: zfs-generic-nfs
        size: 100Gi
        advancedMounts:
          server:
            main:
              - path: /data
          microservices:
            main:
              - path: /data
      # Downloaded ML model weights (CLIP / face / OCR). RWX so both ML replicas
      # share one download. Read-mostly after warm-up.
      ml-cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        storageClass: ssd-replicated-filesystem
        size: 10Gi
        advancedMounts:
          machine-learning:
            main:
              - path: /cache
      # mTLS material for the Envoy sidecars.
      postgres-cert:
        type: secret
        name: immich-postgres-immich-user
        defaultMode: 0440
        advancedMounts:
          server:
            envoy:
              - path: /etc/envoy/secrets/postgres
          microservices:
            envoy:
              - path: /etc/envoy/secrets/postgres
      dragonfly-cert:
        type: secret
        name: immich-dragonfly-immich-user
        defaultMode: 0440
        advancedMounts:
          server:
            envoy:
              - path: /etc/envoy/secrets/redis
          microservices:
            envoy:
              - path: /etc/envoy/secrets/redis
      # Cluster root CA (distributed to every namespace) for upstream validation.
      root-ca:
        type: secret
        name: root-ca-pub-cert
        defaultMode: 0444
        advancedMounts:
          server:
            envoy:
              - path: /etc/envoy/secrets/root-ca
          microservices:
            envoy:
              - path: /etc/envoy/secrets/root-ca
      envoy-config:
        type: configMap
        name: immich-envoy-config
        defaultMode: 0440
        advancedMounts:
          server:
            envoy:
              - path: /etc/envoy
          microservices:
            envoy:
              - path: /etc/envoy
      # Writable scratch for the read-only-root-filesystem containers.
      tmp:
        type: emptyDir
        advancedMounts:
          server:
            main:
              - path: /tmp
          microservices:
            main:
              - path: /tmp
          machine-learning:
            main:
              - path: /tmp
