---
# Intel GPU for the immich machine-learning pods (OpenVINO inference), via DRA.
#
# Exclusive claim on an Arc Pro (A40/A50, 6GB dedicated VRAM). The only other
# exclusive Arc Pro consumer is openarc-subtitles (a single fixed replica), so two
# of the three Arc Pro dGPUs are always free for the two ML replicas — each gets a
# dedicated GPU that always schedules. media-processor / Coder use adminAccess
# (shared) and never block an exclusive claim.
#
# Arc Pro is chosen over the Iris Xe iGPUs for performance and to avoid sharing
# compute; the model set only needs ~1-2GB of the 6GB. Because there is one Arc Pro
# per node, the two replicas naturally land on different nodes (good spread / HA).
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: immich-machine-learning-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].family == 'Arc Pro'
---
# Intel GPU for the immich microservices worker's video transcoding (ffmpeg
# QSV/VAAPI), via DRA.
#
# adminAccess (shared) — the cluster convention for transcode workloads. Targets
# the Iris Xe iGPUs because they are the least-scheduled GPU type by adminAccess
# claims (the Arc Pros carry ML, Coder, and media-processor transcode). Requires
# the namespace label resource.kubernetes.io/admin-access: "true".
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: immich-microservices-transcode-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            adminAccess: true
            allocationMode: All
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].family == 'Iris Xe'
