---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smartctl-exporter
spec:
  interval: 5m
  chart:
    spec:
      chart: prometheus-smartctl-exporter
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: prometheus-community-charts
      version: 0.16.0
  values:
    fullnameOverride: smartctl-exporter
    serviceMonitor:
      enabled: true
      relabelings:
        - action: labeldrop
          regex: (service|endpoint|pod|container)
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: instance
    prometheusRules:
      enabled: true
      rules:
        # Replaced by the per-drive trip-based alert in alerts.yaml, which
        # joins against smartctl_nvme_warning_temp_celsius from the
        # node-exporter sidecar in ../../victoria-metrics/k8s-stack/.
        # The chart's default fires at a fixed 60°C with `for: 1m`, which is
        # noisy and well below most NVMe drives' manufacturer-defined WCTEMP.
        smartCTLDDeviceTemperature:
          enabled: false
