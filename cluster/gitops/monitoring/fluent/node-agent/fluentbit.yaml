---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/fluentbit.fluent.io/fluentbit_v1alpha2.json
apiVersion: fluentbit.fluent.io/v1alpha2
kind: FluentBit
metadata:
  name: fluentbit-node-agent
  labels:
    app.kubernetes.io/name: fluentbit-node-agent
    app.kubernetes.io/component: fluentbit
    app.kubernetes.io/instance: fluentbit
spec:
  image: ghcr.io/fluent/fluent-operator/fluent-bit:v5.0.6
  # Baseline RSS is ~25-30Mi and legitimate memory is bounded (filesystem storage
  # spills chunks to disk; tail mem_buf_limit is 64MB). The 512Mi limit is a
  # safety net for the known v4.0/5.0 memory-leak reports (tail + kubernetes
  # filter): a genuine leak gets OOM-killed and restarted (resuming from the
  # hostPath position DB) long before it reaches the multi-GB territory those
  # reports describe, while normal operation never trips it.
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 512Mi
  labels:
    app.kubernetes.io/name: fluentbit-node-agent
    app.kubernetes.io/component: fluentbit
    app.kubernetes.io/instance: fluentbit
    endpoints.netpols.home.arpa/record-agent: "true"
  positionDB:
    hostPath:
      path: /var/mnt/local-storage/daemonset/monitoring/fluent/node-agent/position-db
      type: DirectoryOrCreate
  fluentBitConfigName: fluentbit-node-agent-config
  # Additively pulls in per-namespace FluentBitConfigs (filter-only) so a
  # namespace can own its node-agent log filters vertically — see
  # cluster/components/logging/namespace. Their filters merge into the same
  # rendered fluent-bit.conf as this cluster config's input/output. Scoped to
  # the convention labels (not an empty/match-all selector) so pickup is
  # intentional.
  namespaceFluentBitCfgSelector:
    matchLabels:
      config.fluentbit.fluent.io/enabled: "true"
      config.fluentbit.fluent.io/agent: node
  priorityClassName: system-node-critical
  # Needed for kubelet access
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  volumes:
    - name: chunks
      hostPath:
        path: /var/mnt/local-storage/daemonset/monitoring/fluent/node-agent/chunks
        type: DirectoryOrCreate
  volumesMounts:
    - name: chunks
      mountPath: /fluent-bit/chunks
  # /api/v1/uptime is a pure "process is alive" check. fluent-bit v5.0 stopped
  # registering /api/v1/health unless `Health_Check On` is set (returns 404
  # otherwise), and the v5.0 /api/v2/health returns 500 on output error/retry
  # thresholds — unsafe for liveness (a fluentd outage would kill every node-agent).
  readinessProbe: &probe
    httpGet:
      port: 2020
      path: /api/v1/uptime
  livenessProbe: *probe
