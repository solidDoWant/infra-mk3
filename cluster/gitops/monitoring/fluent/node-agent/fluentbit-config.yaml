---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/fluentbit.fluent.io/clusterfluentbitconfig_v1alpha2.json
apiVersion: fluentbit.fluent.io/v1alpha2
kind: ClusterFluentBitConfig
metadata:
  name: fluentbit-node-agent-config
spec:
  inputSelector: &selector
    matchLabels:
      config.fluentbit.fluent.io/enabled: "true"
      config.fluentbit.fluent.io/agent: node
  outputSelector: *selector
  filterSelector: *selector
  multilineParserSelector: *selector
  parserSelector: *selector
  service:
    parsersFiles:
      - /fluent-bit/etc/parsers.conf # Default parsers
      # Parsers provided by the operator
      - /fluent-bit/config/parsers.conf
      - /fluent-bit/config/parsers_multiline.conf
    httpServer: true
    storage:
      path: /fluent-bit/chunks
      deleteIrrecoverableChunks: "on"
      checksum: "on"
      # normal (not full): fsync chunks on rotation/shutdown, not on every
      # write. full was the dominant fsync/write-op amplifier on the node-agent
      # buffer for a loss-tolerant log stream — normal keeps crash-consistency
      # of completed chunks without an fsync per chunk write.
      sync: normal
      metrics: "on"
    # Default (info) makes every restart dump a line PER watched container log
    # file (`[input:tail] inotify_fs_add ...`, ~440/node) plus a line per stale
    # buffer chunk (`[storage] invalid crc32 ...`) -- ~900 lines/restart/node of
    # pure init narration. warning keeps genuine warn/error (output retries,
    # backpressure, the `format check failed` corrupt-chunk errors) while
    # silencing the info storms.
    logLevel: warning
