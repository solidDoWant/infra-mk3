---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-operator
spec:
  interval: 5m
  chart:
    spec:
      chart: fluent-operator
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: fluent-charts
      version: 4.2.0
  values:
    containerRuntime: containerd
    Kubernetes: false # Don't deploy the built-in k8s pipeline
    operator:
      extraArgs:
        - --leader-elect=true
        # Operator 3.9.0 defaults --metrics-bind-address to "0" (metrics disabled)
        # and --metrics-secure to true (HTTPS). The chart still ships an HTTP
        # metrics Service + ServiceMonitor on 8080, so enable HTTP metrics there
        # explicitly, otherwise the scrape gets connection-refused.
        - --metrics-bind-address=:8080
        - --metrics-secure=false
      # Leave resources unbounded so actual usage can be measured (the chart's
      # default caps are low). `null` clears the chart's default requests/limits.
      resources: null
      serviceMonitor:
        enable: true
    fluentbit:
      crdsEnable: false
    fluentd:
      crdsEnable: false
  postRenderers:
    # The chart exposes no value for the operator Deployment replica count, so
    # patch it in.
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/replicas
                value: 2
            target:
              group: apps
              version: v1
              kind: Deployment
