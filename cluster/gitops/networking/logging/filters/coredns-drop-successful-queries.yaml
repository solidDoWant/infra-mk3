---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/fluentbit.fluent.io/filter_v1alpha2.json
apiVersion: fluentbit.fluent.io/v1alpha2
kind: Filter
metadata:
  name: coredns-drop-successful-queries
  labels:
    config.fluentbit.fluent.io/enabled: "true"
    config.fluentbit.fluent.io/agent: node
spec:
  matchRegex: ^kube\.networking\.coredns
  filters:
    # CoreDNS query logging stays enabled (lines still hit /var/log -> visible
    # via `kubectl logs`). This only keeps successful responses OUT of the
    # ingest pipeline: excluding `" NOERROR ` drops successes (incl. NODATA)
    # while KEEPING NXDOMAIN / SERVFAIL / REFUSED / etc. (more likely to
    # indicate a real problem), plus [ERROR]/[WARNING]. Field is `log`.
    - grep:
        exclude: 'log " NOERROR '
