---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox-cert-refresher
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      # One-shot bootstrap so the pin exists immediately rather than only after the
      # CronJob's first tick. A Helm hook re-runs it each install/upgrade and cleans
      # itself up, sidestepping Job immutability.
      cert-refresher-bootstrap:
        type: job
        annotations:
          helm.sh/hook: post-install,post-upgrade,post-rollback
          helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        job: &cert_refresher_job
          backoffLimit: 6
          ttlSecondsAfterFinished: 600
        <<: &cert_refresher_controller
          serviceAccount:
            identifier: proxmox-cert-refresher
          containers:
            app:
              image:
                repository: alpine/k8s
                tag: 1.36.1
              env:
                POD_NAMESPACE:
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                PROXMOX_ADDRESS: 10.2.2.1:8006
                # Also names the pinned ConfigMap: <PROXMOX_HOSTNAME>-leaf-cert.
                PROXMOX_HOSTNAME: proxmox-vm-host-01
              command: /scripts/refresh-proxmox-cert.sh
      # Periodic re-pin so a Proxmox cert regeneration self-heals.
      cert-refresher:
        <<: *cert_refresher_controller
        type: cronjob
        cronjob:
          <<: *cert_refresher_job
          schedule: "@daily"
          concurrencyPolicy: Forbid
    persistence:
      scripts:
        type: configMap
        name: proxmox-cert-refresher-scripts
        defaultMode: 0500
        globalMounts:
          - path: /scripts
    serviceAccount:
      proxmox-cert-refresher: {}
    rbac:
      roles:
        proxmox-cert-refresher:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
              verbs:
                - get
                - create
                - update
                - patch
      bindings:
        proxmox-cert-refresher:
          type: RoleBinding
          roleRef:
            identifier: proxmox-cert-refresher
          subjects:
            - identifier: proxmox-cert-refresher

    # Terminate client TLS at the internal gateway, then re-originate to Proxmox.
    # k8s-gateway/CoreDNS watches HTTPRoutes on the internal-gateways class and
    # publishes proxmox.${SECRET_PUBLIC_DOMAIN_NAME} -> the internal gateway address.
    route:
      proxmox:
        hostnames:
          - proxmox.${SECRET_PUBLIC_DOMAIN_NAME}
        parentRefs:
          - name: internal-gateway
            namespace: networking
        rules:
          - backendRefs:
              - name: proxmox
                port: 8006
