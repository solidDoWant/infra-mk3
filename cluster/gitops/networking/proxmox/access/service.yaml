---
# Proxmox runs off-cluster on the VM host, so it is exposed as a selector-less
# Service backed by a manual EndpointSlice - same pattern as cilium/api-server.
apiVersion: v1
kind: Service
metadata:
  name: proxmox
spec:
  type: ClusterIP
  ports:
    - name: https
      port: 8006
      targetPort: 8006
      protocol: TCP
      appProtocol: https
---
# Off-cluster endpoint for the selector-less proxmox Service.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox
  labels:
    kubernetes.io/service-name: proxmox
addressType: IPv4
endpoints:
  - addresses:
      - 10.2.2.1 # proxmox-vm-host-01
ports:
  - name: https
    port: 8006
    protocol: TCP
    appProtocol: https
