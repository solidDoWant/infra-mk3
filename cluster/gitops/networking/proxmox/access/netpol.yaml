---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: proxmox-cert-refresher
specs:
  - description: proxmox-cert-refresher
    # Selects both the cert-refresher CronJob and the bootstrap Job via the
    # shared app-template release labels.
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: proxmox-cert-refresher
        app.kubernetes.io/instance: proxmox-cert-refresher
    egress:
      # k8s API to upsert the pinned-cert ConfigMap
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
      # Proxmox to scrape its serving certificate
      - toCIDRSet:
          - cidrGroupRef: proxmox-nodes
        toPorts:
          - ports:
              - port: "8006"
                protocol: TCP
