---
# Teleport's proxy_service.trust_x_forwarded_for requires exactly one IP in
# X-Forwarded-For (anti-spoofing). With the teleport record Cloudflare-proxied,
# the chain is client -> Cloudflare -> external gateway, and Envoy appends the
# next hop, so XFF arrives at Teleport with two entries (client + CF/NAT) and the
# proxy rejects it ("expect a single IP for X-Forwarded-For but got [...]").
#
# Cloudflare always sets CF-Connecting-IP to the single real client IP, and our
# OPNsense firewall only admits Cloudflare source IPs to the gateway, so that
# header is trustworthy. Overwrite XFF with it, but only for the Teleport host so
# other services on this gateway are unaffected.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: teleport-xff-from-cf-connecting-ip
spec:
  workloadSelector:
    labels:
      app.kubernetes.io/name: ingress-gateways
      gateway.networking.k8s.io/gateway-name: external-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: teleport-xff-from-cf-connecting-ip
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_request(handle)
                local host = handle:headers():get(":authority") or ""
                host = host:gsub(":%d+$", "")
                local d = "teleport.${SECRET_PUBLIC_DOMAIN_NAME}"
                if host == d or host:sub(-(#d + 1)) == "." .. d then
                  local cf = handle:headers():get("cf-connecting-ip")
                  if cf ~= nil and cf ~= "" then
                    handle:headers():replace("x-forwarded-for", cf)
                  end
                end
              end
