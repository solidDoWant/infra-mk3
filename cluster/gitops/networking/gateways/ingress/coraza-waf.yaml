---
# cspell:words corazawaf
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.5.0
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  pluginConfig:
    rules: |
      # Use the example config. This will provide some value while
      # reducing the need to fine-tune the configuration.
      Include @recommended-conf
      SecRuleEngine On
      # Teleport multiplexes binary protocols (SSH/kube/db) and WebSocket ALPN
      # connection-upgrades over HTTPS. The OWASP CRS reliably flags this as
      # malicious and breaks tsh/Connect, so disable the WAF for the Teleport
      # host. Teleport enforces its own authN/authZ on these connections.
      SecRule REQUEST_HEADERS:Host "@streq teleport.${SECRET_PUBLIC_DOMAIN_NAME}" \
        "id:1000,phase:1,pass,nolog,ctl:ruleEngine=Off"
      # Same for Teleport application access subdomains (<app>.teleport.<domain>).
      SecRule REQUEST_HEADERS:Host "@endsWith .teleport.${SECRET_PUBLIC_DOMAIN_NAME}" \
        "id:1001,phase:1,pass,nolog,ctl:ruleEngine=Off"
      Include @crs-setup-conf
      Include @owasp_crs/*.conf
