---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name gateway-classes
spec:
  targetNamespace: networking
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/networking/gateways/gateway-classes
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: gateway-crds
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name ingress-gateways
spec:
  targetNamespace: networking
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/networking/gateways/ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  # Skip health-checking AuthorizationPolicy: Istio writes
  # status.observedGeneration as a string (CRD declares it as IntOrString),
  # which trips Flux's default int64 accessor. Issue tracked in
  # https://github.com/istio/istio/issues/39605
  healthCheckExprs:
    - apiVersion: security.istio.io/v1
      kind: AuthorizationPolicy
      current: "true"
  dependsOn:
    - name: gateway-classes
    - name: istio-csr
    - name: istio-base
