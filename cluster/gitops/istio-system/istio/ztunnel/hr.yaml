---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ztunnel
spec:
  interval: 1h
  chart:
    spec:
      chart: ztunnel
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: istio-charts
      version: 1.30.1
  values:
    profile: ambient
    caAddress: cert-manager-istio-csr.istio-system.svc.cluster.local.:443
    # Defaults to the bare `istiod.<istioNamespace>.svc:15012`, which cannot resolve
    # absolutely and so burns three NXDOMAINs against the search list first.
    xdsAddress: istiod.istio-system.svc.cluster.local.:15012
    env:
      IPV6_ENABLED: "false"
