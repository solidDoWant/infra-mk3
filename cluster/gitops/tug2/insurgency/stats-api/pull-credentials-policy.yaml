---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/policy_v1.json
apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: build-tug2-pull-credentials-dockerconfig
spec:
  rules:
    # The tug2-pull-credentials secret (created for the game-server VM) is an Opaque
    # secret whose `config.json` key holds a valid docker config for the Harbor
    # registry. Kubernetes only accepts kubernetes.io/dockerconfigjson secrets as
    # imagePullSecrets, so transform that single source of truth into a k8s-consumable
    # pull secret rather than maintaining a second copy of the credentials.
    - name: build-tug2-pull-credentials-dockerconfig
      match:
        any:
          - resources:
              kinds:
                - Secret
              name: tug2-pull-credentials
      skipBackgroundRequests: true
      generate:
        generateExisting: true
        synchronize: true
        apiVersion: v1
        kind: Secret
        name: tug2-pull-credentials-dockerconfig
        namespace: tug2
        data:
          type: kubernetes.io/dockerconfigjson
          data:
            # config.json is already base64-encoded in .data; copy it verbatim into
            # the .dockerconfigjson key that kubelet reads.
            .dockerconfigjson: '{{ request.object.data."config.json" }}'
