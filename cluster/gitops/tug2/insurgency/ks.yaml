---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tug2-insurgency-backend
spec:
  targetNamespace: tug2
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/tug2/insurgency/backend
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: cloudnative-pg
    - name: kyverno-app
    - name: rook-ceph-cluster
    - name: tug2-namespace-issuer
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tug2-insurgency-server
spec:
  targetNamespace: tug2
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/tug2/insurgency/server
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: tug2-insurgency-backend
    - name: kubevirt-app
    - name: teleport-crds
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tug2-insurgency-backup
spec:
  targetNamespace: tug2
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/tug2/insurgency/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: tug2-insurgency-backend
    - name: volume-snapshot-crds
    - name: rook-ceph-cluster
    - name: prometheus-crds
    - name: media-namespace-issuer
    - name: cluster-issuers
    - name: approver-policy
    - name: openebs
    - name: cloudnative-pg
    - name: democratic-csi-zfs-generic-nfs
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tug2-insurgency-stats-api
spec:
  targetNamespace: tug2
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/tug2/insurgency/stats-api
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    # Provides the ro pooler, the stats-api client cert + managed role, and the
    # pooler-ingress network policy.
    - name: tug2-insurgency-backend
    # HTTPRoute CRD for the external-gateway route.
    - name: gateway-crds
    # Kyverno generates the dockerconfigjson pull secret from tug2-pull-credentials.
    - name: kyverno-app
    # ServiceMonitor CRD for the metrics scrape.
    - name: prometheus-crds
