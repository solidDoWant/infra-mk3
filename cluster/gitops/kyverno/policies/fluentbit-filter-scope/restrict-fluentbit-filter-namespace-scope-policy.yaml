---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-fluentbit-filter-namespace-scope
spec:
  # Admission-only. This gates CREATE/UPDATE (including via Flux), which is all
  # that's needed. Background scan is disabled so Kyverno's reports controller
  # doesn't need extra RBAC to watch fluentbit Filters, and there are no
  # pre-existing violations to report on.
  background: false
  rules:
    - name: require-namespace-scoped-match
      # Namespaced Fluent Bit Filters ONLY. Deliberately excludes ClusterFilter
      # (platform-owned, legitimately cross-cutting e.g. leaderelection drops)
      # and fluentd.fluent.io/Filter (different match semantics).
      match:
        any:
          - resources:
              kinds:
                - fluentbit.fluent.io/v1alpha2/Filter
      validate:
        failureAction: Enforce
        # Namespaced Fluent Bit filters are NOT auto-scoped to their namespace's
        # log stream (unlike Fluentd's label router) — an unscoped match applies
        # to EVERY namespace's logs and would silently drop them. Tags are
        # 'kube.<namespace>.<pod>.<container>.<id>', so a namespace-owned filter
        # must self-scope to '^kube\.<namespace>\.' (matchRegex) or
        # 'kube.<namespace>.' (match). Deny unless one of them is so scoped
        # (also catches the dangerous default: no match set == match all).
        message: >-
          Namespaced Fluent Bit Filters must self-scope to their own namespace.
          Set spec.matchRegex to start with
          '^kube\.{{ request.object.metadata.namespace }}\.' or spec.match to
          start with 'kube.{{ request.object.metadata.namespace }}.' — otherwise
          the filter applies to every namespace's logs.
        deny:
          conditions:
            all:
              - key: "{{ starts_with(request.object.spec.matchRegex || '', join('', ['^kube\\.', request.object.metadata.namespace, '\\.'])) }}"
                operator: Equals
                value: false
              - key: "{{ starts_with(request.object.spec.match || '', join('', ['kube.', request.object.metadata.namespace, '.'])) }}"
                operator: Equals
                value: false
