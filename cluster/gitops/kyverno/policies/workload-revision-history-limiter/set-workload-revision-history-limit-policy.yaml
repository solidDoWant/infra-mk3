---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kyverno.io/clusterpolicy_v1.json
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: set-workload-revision-history-limit
spec:
  rules:
    - name: set-deployment-revision-history-limit
      match:
        any:
          - resources:
              kinds:
                - Deployment
      # Skip when any non-Kyverno field manager owns spec.revisionHistoryLimit,
      # so we don't fight operators / charts that template the field. Allows
      # mutation when only Kyverno's background-controller owns it, or when no
      # manager claims it (e.g. brand-new resources on CREATE).
      preconditions:
        all:
          - key: '{{ request.object.metadata.managedFields[?fieldsV1."f:spec"."f:revisionHistoryLimit" != null && manager != ''background-controller''] | length(@) }}'
            operator: Equals
            value: 0
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            namespace: "{{ request.namespace }}"
            name: "{{ request.object.metadata.name }}"
        patchStrategicMerge:
          spec:
            revisionHistoryLimit: 1
    - name: set-statefulset-revision-history-limit
      match:
        any:
          - resources:
              kinds:
                - StatefulSet
      preconditions:
        all:
          - key: '{{ request.object.metadata.managedFields[?fieldsV1."f:spec"."f:revisionHistoryLimit" != null && manager != ''background-controller''] | length(@) }}'
            operator: Equals
            value: 0
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: StatefulSet
            namespace: "{{ request.namespace }}"
            name: "{{ request.object.metadata.name }}"
        patchStrategicMerge:
          spec:
            revisionHistoryLimit: 1
    - name: set-daemonset-revision-history-limit
      match:
        any:
          - resources:
              kinds:
                - DaemonSet
      preconditions:
        all:
          - key: '{{ request.object.metadata.managedFields[?fieldsV1."f:spec"."f:revisionHistoryLimit" != null && manager != ''background-controller''] | length(@) }}'
            operator: Equals
            value: 0
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: DaemonSet
            namespace: "{{ request.namespace }}"
            name: "{{ request.object.metadata.name }}"
        patchStrategicMerge:
          spec:
            revisionHistoryLimit: 1
