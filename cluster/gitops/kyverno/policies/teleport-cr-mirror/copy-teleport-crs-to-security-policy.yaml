---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/generatingpolicy_v1.json
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: copy-teleport-crs-to-security-namespace
spec:
  # The Teleport operator only watches resources in its own namespace
  # (security), so mirror every resources.teleport.dev CR from any other
  # namespace into security where the operator can reconcile it. This
  # workaround can be removed once
  # https://github.com/gravitational/teleport/pull/66134 ships.
  matchConstraints:
    resourceRules:
      - apiGroups:
          - resources.teleport.dev
        apiVersions:
          - "*"
        resources:
          - "*"
        operations:
          - "*"
  matchConditions:
    - name: not-already-in-security
      expression: object.metadata.namespace != 'security'
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  variables:
    # Reconstruct the resource explicitly to drop server-side fields
    # (uid, resourceVersion, generation, creationTimestamp, finalizers,
    # ownerReferences, managedFields, status). Same name as the source —
    # cross-namespace collisions surface as loud generator failures.
    - name: cloned
      expression: |
        {
          'apiVersion': object.apiVersion,
          'kind': object.kind,
          'metadata': {
            'name': object.metadata.name,
            'namespace': 'security',
            'labels': object.metadata.?labels.orValue({}),
            'annotations': object.metadata.?annotations.orValue({}),
          },
          'spec': object.spec,
        }
  generate:
    - expression: generator.Apply('security', [variables.cloned])
