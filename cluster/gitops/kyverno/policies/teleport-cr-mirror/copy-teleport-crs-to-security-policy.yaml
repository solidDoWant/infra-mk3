---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/generatingpolicy_v1.json
apiVersion: policies.kyverno.io/v1
kind: GeneratingPolicy
metadata:
  name: copy-teleport-crs-to-security-namespace
spec:
  # The Teleport operator only watches resources in its own namespace
  # (security), so mirror every resources.teleport.dev CR from any other
  # namespace into security where the operator can reconcile it. This
  # workaround can be removed once
  # https://github.com/gravitational/teleport/pull/66134 ships.
  matchConstraints:
    resourceRules:
      - apiGroups:
          - resources.teleport.dev
        apiVersions:
          - "*"
        resources:
          - "*"
        operations:
          - "*"
  matchConditions:
    # operations: ["*"] above also matches DELETE/CONNECT, where `object` is
    # null. Short-circuit those before downstream conditions touch `object`.
    - name: only-create-or-update
      expression: request.operation in ['CREATE', 'UPDATE']
    - name: not-already-in-security
      expression: object.metadata.namespace != 'security'
  evaluation:
    synchronize:
      enabled: true
    generateExisting:
      enabled: true
  generate:
    # generator.Apply overrides metadata.namespace based on its first
    # argument and strips server-managed fields, mirroring the legacy
    # ClusterPolicy clone behaviour. So passing the trigger object through
    # verbatim is enough.
    - expression: generator.Apply('security', [object])
