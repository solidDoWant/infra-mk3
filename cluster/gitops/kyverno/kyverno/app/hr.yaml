---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app_name kyverno
spec:
  interval: 5m
  chart:
    spec:
      chart: kyverno
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: kyverno-charts
      # Pinned: 3.6.3+ (Kyverno v1.16.3+) ships the CVE-2026-22039 fix, which
      # has a regression that breaks namespaced Policy resources containing any
      # apiCall context entry that uses `service:` instead of `urlPath:` —
      # path.Clean("") becomes "." and trips the new namespace-segment check.
      # Affects our Postgres/Dragonfly CA-bundle policies. Bump back to
      # current once # https://github.com/kyverno/kyverno/pull/16047 is released.
      version: 3.6.2
  values:
    admissionController: &controller_config
      replicas: 2
      revisionHistoryLimit: 1
      # TODO tune this, setting because kyverno is choking
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 1Gi
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - ""
              resources:
                - configmaps
                - secrets
              verbs: &all_common_verbs
                - create
                - delete
                - deletecollection
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - apps
              resources:
                - deployments
                - statefulsets
                - daemonsets
              verbs: *all_common_verbs
            - apiGroups:
                - cert-manager.io
              resources:
                - certificates
              verbs: *all_common_verbs
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - referencegrants
              verbs: *all_common_verbs
            # Required by the teleport-cr-mirror-policy ClusterPolicy,
            # which clones Teleport CRs from any namespace into security
            # so the operator (which only watches its own namespace) can
            # reconcile them.
            - apiGroups:
                - resources.teleport.dev
              resources:
                - "*"
              verbs: *all_common_verbs
      priorityClassName: system-cluster-critical
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: *app_name
          whenUnsatisfiable: DoNotSchedule
      podDisruptionBudget:
        enabled: true
      serviceMonitor:
        enabled: true
    backgroundController:
      <<: *controller_config
      backgroundScan:
        # TODO this may be too high... default value has changed upstream from 1h to 30s to 1h, back and forth.
        # Shorter duration = more CPU usage, but changes are picked up faster.
        backgroundScanInterval: 1m
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
              app.kubernetes.io/instance: *app_name
          whenUnsatisfiable: DoNotSchedule
    cleanupController:
      <<: *controller_config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
              app.kubernetes.io/instance: *app_name
          whenUnsatisfiable: DoNotSchedule
    reportsController:
      <<: *controller_config
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
              app.kubernetes.io/instance: *app_name
          whenUnsatisfiable: DoNotSchedule
