---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: kubernetes-api-server
  labels:
    kubernetes.io/service-name: kubernetes-api-server
addressType: IPv4
endpoints:
  - addresses:
      - 10.3.1.1
      - 10.3.1.2
      - 10.3.1.3
ports:
  - name: https-443
    port: 443
    protocol: TCP
  - name: https-6443
    port: 6443
    protocol: TCP
