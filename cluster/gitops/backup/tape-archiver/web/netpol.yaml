---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tape-archiver-web
specs:
  - description: web
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: tape-archiver-web
        app.kubernetes.io/instance: tape-archiver-web
    egress:
      # DNS resolution — required for cluster DNS lookups (Temporal frontend,
      # teleport proxy, OIDC proxy, monitoring services).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Temporal frontend — run listing/submission/signals over gRPC/TLS,
      # authenticated with the tbot-issued JWT.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: data
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Teleport proxy — the tbot sidecar joins via the in-cluster
      # ServiceAccount token and renews JWT-SVIDs over the TLS-routing port.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: teleport-cluster
              app.kubernetes.io/instance: teleport-cluster
              app.kubernetes.io/component: proxy
        toPorts:
          - ports:
              - port: tls
                protocol: TCP
      # Authentik OIDC back-channel — discovery, token exchange, JWKS, and
      # userinfo all go through the openid-configuration-proxy (the canonical
      # in-cluster OIDC origin; it forwards to authentik-server and stamps a
      # consistent issuer — see security/authentik/openid-configuration-proxy).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: openid-configuration-proxy
              app.kubernetes.io/instance: openid-configuration-proxy
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      # Victoria Metrics query balancer — live drive metrics panels for
      # in-progress runs (VICTORIAMETRICS_URL). The pod's time-series-querier
      # label opens the supplier-side ingress.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/time-series-supplier: "true"
        toPorts:
          - ports:
              - port: "8427"
                protocol: TCP
      # Victoria Logs vmauth — run log panel queries (VICTORIALOGS_URL). The
      # pod's logs-querier label opens the supplier-side ingress.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/logs-supplier: "true"
        toPorts:
          - ports:
              - port: "9428"
                protocol: TCP
    ingress:
      # Internal gateway forwards user traffic to the SPA / JSON API port.
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
      # Kubelet liveness/readiness probes hit the health port and the tbot
      # diag port directly.
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
              - port: "4444"
                protocol: TCP
      # Victoria Metrics agent scrapes /metrics (web + tbot diag).
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9090"
                protocol: TCP
              - port: "4444"
                protocol: TCP
