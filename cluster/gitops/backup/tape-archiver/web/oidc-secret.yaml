---
# Plain Secret consumed by the tape-archiver web UI for Authentik OIDC. The
# value comes from Flux variable substitution (cluster-secrets.sops.yaml), so
# SOPS encryption isn't needed at rest in git. The session key is NOT here —
# the chart generates and persists its own (see hr.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: tape-archiver-web
type: Opaque
stringData:
  oidc-client-secret: "${SECRET_TAPE_ARCHIVER_AUTHENTIK_OIDC_CLIENT_SECRET}"
