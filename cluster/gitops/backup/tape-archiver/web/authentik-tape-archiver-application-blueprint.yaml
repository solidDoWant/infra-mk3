---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-tape-archiver-application-blueprint
  labels:
    k8s-sidecar.home.arpa/application: authentik
type: Opaque
stringData:
  # Must be a Secret (not secretGenerator) so Flux substitution applies inside.
  authentik-tape-archiver-application-blueprint.yaml: |
    ---
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Tape Archiver application
      labels:
        blueprints.goauthentik.io/description: Resources for Tape Archiver SSO
    entries:
      # Dependencies
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Implicit provider authentication
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Password authentication flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Invalidation flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Blueprint library
          required: true
      # Application. Unlike Temporal, no custom scope mapping is needed —
      # cmd/web only authenticates the operator's browser session; its
      # Temporal access uses a separate service credential (tbot JWT-SVID).
      - model: authentik_providers_oauth2.oauth2provider
        id: tape-archiver-provider
        identifiers:
          name: Tape Archiver
        attrs:
          name: Tape Archiver
          authorization_flow:
            !Find [authentik_flows.flow, [slug, implicit-authorization-flow]]
          client_type: confidential
          client_id: "${SECRET_TAPE_ARCHIVER_AUTHENTIK_OIDC_CLIENT_ID}"
          client_secret: "${SECRET_TAPE_ARCHIVER_AUTHENTIK_OIDC_CLIENT_SECRET}"
          # Explicitly required: the model's default is an EMPTY list, and the
          # authorize endpoint rejects any request whose grant type is not
          # listed ("Invalid grant_type for provider") — a blueprint-created
          # provider without this cannot log anyone in. cmd/web runs the
          # authorization-code flow; refresh_token lets its oauth2 client
          # renew sessions without a re-auth round trip.
          grant_types:
            - authorization_code
            - refresh_token
          redirect_uris:
            - url: https://tape-archiver.${SECRET_PUBLIC_DOMAIN_NAME}/auth/callback
              matching_mode: strict
          signing_key:
            !Find [
              authentik_crypto.certificatekeypair,
              [name, authentik Self-signed Certificate],
            ]
          authentication_flow:
            !Find [authentik_flows.flow, [slug, password-authentication-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=8
          refresh_token_validity: days=30
          property_mappings:
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'email'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'openid'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'profile'"],
              ]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
      - model: authentik_core.application
        id: tape-archiver-application
        identifiers:
          slug: tape-archiver
        attrs:
          name: Tape Archiver
          slug: tape-archiver
          group: Infrastructure
          provider: !KeyOf tape-archiver-provider
          policy_engine_mode: any
          meta_launch_url: https://tape-archiver.${SECRET_PUBLIC_DOMAIN_NAME}
      # Groups
      - model: authentik_core.group
        id: tape-archiver-users-group
        identifiers:
          name: Tape Archiver users
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_TAPE_ARCHIVER_USERS_DISCORD_ROLE_ID}"
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf tape-archiver-users-group
          target: !KeyOf tape-archiver-application
