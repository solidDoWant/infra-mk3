---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
# tape-archiver control worker: Kubernetes-side orchestrator (snapshot
# resolution, bin-packing) for tape backup runs. The bulk-data counterpart
# (data worker) runs on ubuntu-storage-host-01 via systemd — see
# ansible/remote/vms/storage/roles/setup_tape_archiver. Both coordinate only
# through Temporal task queues; no direct channel exists between them.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tape-archiver-control-worker
spec:
  interval: 5m
  chart:
    spec:
      chart: tape-archiver-control-worker
      version: 0.0.6
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
  values:
    config:
      temporal:
        # In-cluster gRPC over TLS; auth is JWT bearer (apiKey below).
        # Frontend's serving cert SANs match this hostname, so SNI / cert
        # verification works without a serverName override.
        address: temporal-frontend.data.svc.cluster.local:7233
        # Maps to the Temporal namespace auto-created by temporal-namespace-manager
        # (k8s namespace "backup" carries temporal.home.arpa/enabled=true).
        namespace: backup
        # file:/// prefix tells the worker to re-read the JWT from disk on
        # every RPC. tbot rotates the JWT well before expiry, so the worker
        # picks up new tokens without restart.
        apiKey:
          value: file:///var/run/teleport/jwt/jwt_svid
        # Trust the cluster root CA (distributed to every namespace as
        # root-ca-pub-cert by the extract-root-ca-certificate Kyverno policy).
        # The frontend serves leaf + data-intermediary-ca, which chains to this
        # root, so no per-namespace intermediate distribution is needed.
        tls:
          enabled: true
          caCert:
            secretKeyRef:
              name: root-ca-pub-cert
              key: ca.pem
        # KEDA's Temporal scaler runs in the keda-operator pod and can't host
        # a tbot sidecar, so it reads a JWT-SVID from a Secret refreshed by
        # the namespace-scoped backup-temporal-keda-auth tbot Deployment
        # (separate workload identity scoped to backup:read, distinct from
        # the worker's backup:write credential). KEDA re-reads the Secret
        # each polling interval, picking up rotated JWTs without restart.
        keda:
          apiKey:
            secretKeyRef:
              name: backup-temporal-keda-auth
              key: jwt_svid
          tls:
            enabled: true
            caCert:
              secretKeyRef:
                name: root-ca-pub-cert
                key: ca.pem

      controlWorker:
        logLevel: info
        # Run-failure alerts. Value comes from Flux variable substitution
        # (cluster-secrets.sops.yaml), so it is never committed in plaintext.
        discordFailureWebhookUrl:
          value: ${SECRET_TAPE_ARCHIVER_DISCORD_WEBHOOK_URL}
        # democratic-csi's datasetParentName — prepended to relative CSI
        # snapshotHandles to rebuild absolute ZFS snapshot paths when a run
        # names k8s VolumeSnapshot sources. Must match
        # cluster/gitops/storage/democratic-csi/zfs-generic-nfs/hr.yaml.
        k8sDatasetParent: bulk-pool-01/k8s/democratic-csi/nfs/pvcs
        # Renders a PodMonitor for the worker's :9090 /metrics endpoint.
        metrics:
          enabled: true

    resources:
      defaultPodOptions:
        dnsConfig:
          options:
            - name: ndots
              value: "1"

      controllers:
        main:
          # KEDA scale-to-zero: nothing runs between backup runs. A run
          # submitted to the control queue scales 0 -> 1; the worker drains
          # and exits after WORKER_IDLE_EXIT_AFTER (chart default 15m on this
          # path), completing the Job. Mid-run idle windows (multi-hour tape
          # writes, operator pauses) also scale to zero — the worker replays
          # workflow history and continues on the next scale-up.
          type: scaledjob
          keda:
            pollingInterval: 30
          job:
            ttlSecondsAfterFinished: 900
          pod:
            labels:
              # Ingress allow into temporal-frontend:7233.
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
              # Egress allow to the teleport-cluster proxy TLS-routing port.
              endpoints.netpols.home.arpa/teleport-bot-client: "true"
          # Native sidecar (initContainer with restartPolicy: Always) — k8s
          # blocks the worker container until tbot has started, guaranteeing
          # the JWT exists before the worker tries to call Temporal. Native
          # sidecars are also terminated automatically once the worker exits,
          # so the Job still completes on idle-exit.
          initContainers:
            tbot:
              restartPolicy: Always
              image:
                repository: public.ecr.aws/gravitational/tbot-distroless
                tag: 18.8.2
              args:
                - start
                - --config
                - /etc/tbot/tbot.yaml
                - --diag-addr
                - :4444
              env:
                # Override tbot's hard-coded default
                # (/var/run/secrets/kubernetes.io/serviceaccount/token) so the
                # kubernetes join method reads the audience-scoped projected
                # token mounted via the sa-token persistence entry.
                KUBERNETES_TOKEN_PATH: /var/run/secrets/tokens/token
                # Dial the configured proxy_server for the reverse tunnel too,
                # instead of the proxy's advertised public_addr
                # (teleport.<domain>, which resolves to the internal gateway
                # in-cluster). Keeps all tbot traffic direct to the proxy
                # ClusterIP. Requires the proxy's TLS routing/multiplex mode,
                # which is enabled.
                TBOT_USE_PROXY_ADDR: "yes"
              ports:
                - name: tbot-diag
                  containerPort: 4444
              probes:
                liveness: &probe
                  enabled: true
                  type: HTTP
                  port: tbot-diag
                  path: /livez
                readiness:
                  <<: *probe
                  path: /readyz
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 64Mi
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: &memory 256Mi
                limits:
                  memory: *memory

      configMaps:
        tbot-config:
          data:
            # Mounted at /etc/tbot/tbot.yaml in the tbot sidecar of every
            # control worker pod. The sidecar joins the cluster via the
            # in-cluster kubernetes ServiceAccount token, then continually
            # renews a JWT-SVID (containing permissions=["backup:write"])
            # into a shared emptyDir. The Temporal Go SDK reads the JWT file
            # fresh on every RPC because apiKey is set to
            # file:///var/run/teleport/jwt/jwt_svid — so renewals propagate
            # without restarting the worker.
            tbot.yaml: |
              version: v2
              # In-cluster ClusterIP publicAddr of the proxy. tbot only joins and renews
              # SVIDs (no reverse tunnel), so it honors the dialed address and reaches the
              # proxy directly — bypassing the internal gateway. The proxy lists this name
              # in publicAddr and serves a matching internal keypair, so TLS/SNI validate.
              proxy_server: teleport-cluster.security.svc.cluster.local:443
              onboarding:
                token: tape-archiver-control-worker
                join_method: kubernetes
              storage:
                type: memory
              services:
                - type: workload-identity-jwt
                  selector:
                    name: tape-archiver-control-worker
                  audiences:
                    - temporal.${SECRET_PUBLIC_DOMAIN_NAME}
                  destination:
                    type: directory
                    path: /var/run/teleport/jwt

      # ServiceAccount and snapshot-reader RBAC are intentionally NOT set
      # here: as of chart 0.0.3 both are built in (values serviceAccount +
      # rbac blocks) and enabled by default, and the single controller binds
      # to the chart's ServiceAccount automatically.

      persistence:
        # Shared between tbot and the worker: tbot writes the JWT, the worker
        # reads it on every Temporal RPC.
        tbot-jwt:
          type: emptyDir
          advancedMounts:
            main:
              tbot:
                - path: /var/run/teleport/jwt
              main:
                - path: /var/run/teleport/jwt
                  readOnly: true
        tbot-config:
          type: configMap
          identifier: tbot-config
          defaultMode: 0444
          items:
            - key: tbot.yaml
              path: tbot.yaml
          advancedMounts:
            main:
              tbot:
                - path: /etc/tbot
                  readOnly: true
        # Cluster intermediate-CA root, distributed to every namespace by the
        # extract-root-ca-certificate Kyverno ClusterPolicy. tbot needs this
        # to validate the Teleport proxy's serving cert.
        tbot-root-ca:
          type: secret
          name: root-ca-pub-cert
          defaultMode: 0444
          items:
            - key: ca.pem
              path: root-ca.pem
          advancedMounts:
            main:
              tbot:
                - path: /etc/ssl/certs/root-ca.pem
                  subPath: root-ca.pem
                  readOnly: true
        # Audience-scoped, short-lived projected SA token used by tbot's
        # kubernetes (in_cluster) join method. The kubelet refreshes the file
        # in place at 80% of TTL; tbot re-reads on every join/renewal. The
        # narrow audience limits blast radius if the token ever leaks — it can
        # only be presented to TokenReview calls asserting the Teleport
        # cluster's audience.
        sa-token:
          type: custom
          volumeSpec:
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    expirationSeconds: 600
                    audience: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
          advancedMounts:
            main:
              tbot:
                - path: /var/run/secrets/tokens
                  readOnly: true
