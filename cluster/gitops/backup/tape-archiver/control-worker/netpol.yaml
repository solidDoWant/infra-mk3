---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tape-archiver-control-worker
specs:
  - description: control-worker
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: tape-archiver-control-worker
        app.kubernetes.io/instance: tape-archiver-control-worker
    egress:
      # DNS resolution — required for cluster DNS lookups (Temporal frontend,
      # teleport proxy, kubernetes.default, discord.com).
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Temporal frontend — task-queue polling and workflow progress over
      # gRPC/TLS, authenticated with the tbot-issued JWT.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: data
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Teleport proxy — the tbot sidecar joins via the in-cluster
      # ServiceAccount token and renews JWT-SVIDs over the TLS-routing port.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: teleport-cluster
              app.kubernetes.io/instance: teleport-cluster
              app.kubernetes.io/component: proxy
        toPorts:
          - ports:
              - port: tls
                protocol: TCP
      # kube-apiserver — VolumeSnapshot / VolumeSnapshotContent resolution
      # when a run names k8s sources.
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
      # Discord — run-failure alerts (DISCORD_FAILURE_WEBHOOK_URL).
      - toFQDNs:
          - matchName: discord.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
    ingress:
      # Kubelet liveness/readiness probes hit the worker health port and the
      # tbot diag port directly.
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
              - port: "4444"
                protocol: TCP
      # Victoria Metrics agent scrapes /metrics (worker + tbot diag).
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9090"
                protocol: TCP
              - port: "4444"
                protocol: TCP
