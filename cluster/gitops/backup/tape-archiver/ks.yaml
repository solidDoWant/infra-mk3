---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Teleport identity (TPM-joined bot + workload identity) for the tape-archiver
# data worker running on ubuntu-storage-host-01. The host-side tbot (managed by
# ansible, see ansible/remote/vms/storage/roles/setup_tape_archiver) renews a
# `backup:write` JWT-SVID against these resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tape-archiver-data-worker-identity
spec:
  targetNamespace: backup
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/backup/tape-archiver/data-worker
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: teleport-cluster
    - name: teleport-cr-mirror-policy
