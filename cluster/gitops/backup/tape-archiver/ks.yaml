---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Cluster-side footprint of the tape-archiver data worker running on
# ubuntu-storage-host-01 (the workload itself is a systemd-managed container,
# see ansible/remote/vms/storage/roles/setup_tape_archiver): the Teleport
# identity (TPM-joined bot + workload identity) its host tbot renews a
# `backup:write` JWT-SVID against, and the static scrape of its metrics
# endpoint.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tape-archiver-data-worker
spec:
  targetNamespace: backup
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/backup/tape-archiver/data-worker
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: prometheus-crds
    - name: teleport-cluster
    - name: teleport-cr-mirror-policy
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name tape-archiver-control-worker
spec:
  targetNamespace: backup
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/backup/tape-archiver/control-worker
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: prometheus-crds
    - name: temporal-app
    # ScaledJob CRD + the operator hosting the Temporal scaler
    - name: keda-crds
    - name: keda
    # TriggerAuthentication reads the JWT Secret this produces
    - name: backup-temporal-keda-auth
    - name: teleport-cluster
    - name: teleport-cr-mirror-policy
