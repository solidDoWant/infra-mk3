---
# yaml-language-server: $schema=../../../../../schemas/crds/certificaterequestpolicy_v1alpha1.json
# Approve the the keda admission webhook certificate specifically.
apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: system-controllers-intermediary-ca-keda-webhook-cert
spec:
  selector:
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: system-controllers-intermediary-ca
    namespace:
      matchNames:
        - system-controllers
  allowed:
    dnsNames:
      required: true
      values:
        - keda-operator.system-controllers.svc
        - keda-operator.system-controllers.svc.cluster.local
        - keda-admission-webhooks.system-controllers.svc
        - keda-admission-webhooks.system-controllers.svc.cluster.local
    usages:
      - server auth
  constraints:
    maxDuration: 1h
