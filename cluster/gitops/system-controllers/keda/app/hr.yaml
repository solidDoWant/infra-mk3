---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  interval: 1h
  chart:
    spec:
      chart: ./keda
      sourceRef:
        kind: GitRepository
        name: kedacore-charts
        namespace: flux-system
      reconcileStrategy: Revision
  values:
    # CRDs are deployed in a separate Flux Kustomization (keda-crds).
    crds:
      install: false

    # Only ScaledJob is used here, which talks to the operator directly.
    # The metrics-apiserver is only needed for ScaledObject (HPA External Metrics).
    metricsServer:
      enabled: false

    priorityClassName: system-cluster-critical

    operator:
      replicaCount: 2

    podLabels:
      # KEDA's Temporal scaler runs in the operator pod, so the operator is
      # what dials the Temporal frontend on port 7233 to query task-queue
      # backlog. The frontend's ingress netpol gates access on this label,
      # following the same pattern as in-cluster service-workers; lifting
      # the gate this way keeps the pre-existing namespace-scoped ingress
      # rule reusable instead of adding a keda-specific exception.
      keda:
        endpoints.netpols.home.arpa/temporal-frontend-client: "true"

    webhooks:
      replicaCount: 2
      # Fail closed — the cluster prefers the webhook to be available.
      failurePolicy: Fail

    upgradeStrategy:
      operator:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1
      webhooks:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1

    podDisruptionBudget:
      operator:
        minAvailable: 1
      webhooks:
        minAvailable: 1

    # KEDA's Temporal scaler ignores its `ca` auth parameter on the API-key
    # path, so trust has to come from the system pool. subPath preserves the
    # image's /etc/ssl/certs/ contents.
    volumes:
      keda:
        extraVolumes:
          - name: cluster-root-ca
            secret:
              secretName: root-ca-pub-cert
              defaultMode: 0444
              items:
                - key: ca.pem
                  path: ca.pem
        extraVolumeMounts:
          - name: cluster-root-ca
            mountPath: /etc/ssl/certs/cluster-root-ca.pem
            subPath: ca.pem
            readOnly: true

    # CPU limits omitted to allow bursting; memory limits pinned to requests
    # per cluster convention.
    resources:
      operator:
        requests:
          cpu: 100m
          memory: &memory 256Mi
        limits:
          memory: *memory
      webhooks:
        requests:
          cpu: 100m
          memory: *memory
        limits:
          memory: *memory

    # The TLS cert covers the admission webhook (kube-apiserver -> webhook
    # over HTTPS, validates ScaledJob/ScaledObject configs at admission time).
    # cainjector reads the issued cert and injects the CA into the
    # ValidatingWebhookConfiguration's caBundle (chart wires the
    # `cert-manager.io/inject-ca-from` annotation automatically).
    certificates:
      autoGenerated: false
      certManager:
        enabled: true
        generateCA: false
        # Pinned under the CertificateRequestPolicy maxDuration (1h).
        duration: 1h
        renewBefore: 30m
        issuer:
          generate: false
          name: system-controllers-intermediary-ca
          kind: Issuer

    prometheus:
      operator:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 1m
        prometheusRules:
          enabled: true
          alerts:
            - alert: KEDAOperatorDown
              annotations:
                summary: "KEDA operator is down"
                description: "All KEDA operator replicas have been unreachable for >5m.
                  ScaledJobs will not reconcile."
              expr: absent(up{job=~".*keda-operator.*"} == 1)
              for: 5m
              labels:
                severity: critical
            - alert: KEDAScalerErrors
              annotations:
                summary: "KEDA scaler {{ $labels.scaler }} is erroring"
                description: "Scaler {{ $labels.scaler }} on {{ $labels.scaledObject }} (ns {{
                  $labels.namespace }}) is producing errors. Check operator logs
                  and the trigger configuration."
              expr: sum by (namespace, scaledObject, scaler)
                (rate(keda_scaler_detail_errors_total[5m])) > 0
              for: 10m
              labels:
                severity: warning
            - alert: KEDAScaledJobErrors
              annotations:
                summary: "KEDA ScaledJob {{ $labels.scaledJob }} is erroring"
                description: "ScaledJob {{ $labels.scaledJob }} in namespace {{
                  $labels.namespace }} is producing errors when creating jobs."
              expr: sum by (namespace, scaledJob) (rate(keda_scaled_job_errors_total[5m])) > 0
              for: 10m
              labels:
                severity: warning
      webhooks:
        enabled: true
        serviceMonitor:
          enabled: true
          interval: 1m
        prometheusRules:
          enabled: true
          alerts:
            - alert: KEDAWebhookDown
              annotations:
                summary: "KEDA admission webhook is down"
                description: "The KEDA admission webhook has been unreachable for >5m. With
                  failurePolicy=Fail, ScaledJob/ScaledObject creation is
                  blocked."
              expr: absent(up{job=~".*keda-admission-webhooks.*"} == 1)
              for: 5m
              labels:
                severity: critical

  # Patch the chart-rendered Certificate to fit the namespace issuer + the
  # repo's admission-cert pattern:
  #   * dnsNames: drop bare-namespace forms (violate the issuer's critical
  #     nameConstraints) and the metrics-apiserver SANs (metricsServer disabled).
  #   * commonName: removed; cert-manager defaults to the first dnsName, which
  #     keeps the request inside the namespace issuer's name constraints and
  #     mirrors the other admission certs in this repo (k8tz).
  #   * usages: drop `client auth` — only the webhook server cert is in use,
  #     metricsServer (which would have used client auth) is disabled.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: cert-manager.io
              version: v1
              kind: Certificate
              name: keda-operator-tls-certificates
            patch: |
              - op: replace
                path: /spec/dnsNames
                value:
                  - keda-operator.system-controllers.svc
                  - keda-operator.system-controllers.svc.cluster.local
                  - keda-admission-webhooks.system-controllers.svc
                  - keda-admission-webhooks.system-controllers.svc.cluster.local
              - op: remove
                path: /spec/commonName
              - op: replace
                path: /spec/usages
                value:
                  - server auth
