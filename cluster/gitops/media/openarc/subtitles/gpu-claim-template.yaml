---
# Exclusive claim — openarc holds VRAM continuously, unlike
# media-processor/fileflows which use adminAccess to ride along.
# Two consumers (runtime Deployment + pre-upgrade setup Job) each
# allocate their own claim; the cluster has 3 Arc Pro nodes so both
# can be exclusive without contention.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: openarc-subtitles-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].family == 'Arc Pro'
