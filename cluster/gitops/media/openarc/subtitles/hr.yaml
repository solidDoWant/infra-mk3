---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openarc-subtitles
spec:
  interval: 5m
  # First-time install downloads ~5 GB from HF and compiles the OpenVINO
  # graphs for each registered model — easily 10–15 min for the 4B LLM
  # cold compile. Upgrades with a warm cache are much faster, but the
  # same timeout applies.
  timeout: 30m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      # Pre-upgrade hook. Two init containers each download one model
      # and register it via `openarc add`; the main warm container then
      # starts the server once, loads every model named in
      # OPENARC_AUTOLOAD_MODEL, and exits when each reports
      # status="loaded". Helm waits for this Job before rolling the
      # Deployment, so the runtime pod always boots into a warm OV
      # cache and avoids the high-memory cold-compile path.
      setup:
        type: job
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-5"
          helm.sh/hook-delete-policy: before-hook-creation
        job:
          backoffLimit: 1
          ttlSecondsAfterFinished: 500
        defaultContainerOptions:
          image: &image
            repository: ghcr.io/soliddowant/openarc
            tag: main-7de77a45-r3
            pullPolicy: Always
          securityContext: &container_security_context
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env: &common_env_vars
            # Helm loses map key ordering, which screws up env var substitution.
            # Use `AAA_` as a prefix to ensure that these vars come first and
            # can be used for substitution in the rest of the env block.
            AAA_CACHE_DIR: /cache
            OPENARC_CONFIG_FILE: $(AAA_CACHE_DIR)/openarc_config.json
            # Used by register-model.sh to build per-model paths under
            # the shared cache PVC. Set here (not just on init containers)
            # so init+warm+runtime all share one env anchor without a
            # duplicate-merge-key, which kustomize-controller rejects.
            OPENARC_CACHE_DIR: $(AAA_CACHE_DIR)
            # huggingface-cli writes to HF_HOME; the default ~/.cache
            # path is unwritable under readOnlyRootFilesystem. Harmless
            # on the runtime container since HF isn't touched there.
            HF_HOME: /tmp/hf-home
            # Space-separated list of model names to auto-load on
            # startup. Each must be registered in OPENARC_CONFIG_FILE
            # (handled by the register-* init containers). start-openarc.sh
            # word-splits this into positional args for `openarc load`.
            OPENARC_AUTOLOAD_MODEL: >-
              qwen3-asr-0_6b-int8-asym
              qwen3-4b-instruct-int4-awq
            OPENARC_LOG_FILE: /dev/null
            NUMBA_CACHE_DIR: /tmp/numba-cache
        initContainers:
          # Per-model: download from HF + `openarc add`. No GPU access
          # needed (compile happens later in the warm container).
          # openarc-config.json accumulates across containers because
          # save_model_config merges by model_name.
          register-asr:
            command:
              - /bin/register-model
            env:
              <<: *common_env_vars
              MODEL_NAME: qwen3-asr-0_6b-int8-asym
              HF_REPO: Echo9Zulu/Qwen3-ASR-0.6B-INT8_ASYM-OpenVINO
              MODEL_TYPE: qwen3_asr
              ENGINE: openvino
            resources:
              requests: &register_asr_requests
                cpu: 500m
                # Largest shard in the ASR repo is ~0.6 GiB; xet client
                # buffers one shard at a time, plus python/HF overhead.
                memory: 1Gi
              limits: *register_asr_requests
          register-chat:
            command:
              - /bin/register-model
            env:
              <<: *common_env_vars
              MODEL_NAME: qwen3-4b-instruct-int4-awq
              HF_REPO: Echo9Zulu/Qwen3-4B-Instruct-2507-int4_asym-awq-ov
              MODEL_TYPE: llm
              ENGINE: ovgenai
            resources:
              requests: &register_chat_requests
                cpu: 500m
                # The LLM's openvino_model.bin is ~2.7 GiB and xet
                # downloads it as one shard, so the client briefly holds
                # the whole shard in memory. 1 Gi OOMKills mid-download
                # (observed 2026-05-25); 4 Gi covers buffer + verify.
                memory: 4Gi
              limits: *register_chat_requests
        containers:
          # Starts the openarc server once, loads every name in
          # OPENARC_AUTOLOAD_MODEL, verifies status="loaded" for each,
          # and exits.
          warm:
            command:
              - /bin/warm-cache
            resources:
              requests:
                cpu: 500m
                # Cold-compile path runs each model sequentially. The
                # 4B int4 LLM dominates the peak (graph optimization +
                # GPU upload of ~2.5 GiB of int4 weights). 10 Gi gives
                # headroom over the observed ~6–7 GiB peak.
                memory: &warm_memory 10Gi
              limits:
                memory: *warm_memory
              claims:
                - name: gpu
        pod:
          # A single failure is unlikely to succeed on another attempt.
          restartPolicy: Never
      openarc-subtitles:
        replicas: 1
        # Release the GPU device cleanly between revisions.
        strategy: Recreate
        containers:
          openarc:
            image: *image
            securityContext: *container_security_context
            env: *common_env_vars
            ports:
              - name: web
                containerPort: &web_port 8000
            probes:
              # /openarc/status lists each registered model with its
              # individual status. status="loaded" appears only after a
              # successful compile. The openai_model_names field
              # registers names regardless of load state, so it can't be
              # used to detect a failed compile or a silent unload
              # (which happens on certain bad requests).
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      # check-models-loaded (Python) queries
                      # /openarc/status, treats request timeouts as
                      # success so a busy server mid-inference isn't
                      # killed, and exits 1 if any named model is missing
                      # or not in status="loaded" — catching silent
                      # unloads (certain bad transcription requests
                      # unload the model without crashing the server).
                      # Word-split OPENARC_AUTOLOAD_MODEL into positional
                      # args; sh handles the split since the binary is
                      # invoked via shell.
                      - sh
                      - -c
                      - exec /bin/check-models-loaded $${OPENARC_AUTOLOAD_MODEL}
                  initialDelaySeconds: 15
                  # 5s period × 3 failures = up to 15s to react to a silent
                  # unload (bad transcription requests can unload the model
                  # without crashing the server).
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                # Warm-cache runtime: weights resident in CPU/GPU memory.
                # Qwen3 4B int4 (~2.5 GiB) dominates over Qwen3-ASR
                # 0.6B int8 (~0.6 GiB); plus OV runtime, Python, and
                # KV cache headroom for the LLM. 6 Gi covers both.
                memory: 6Gi
              claims:
                - name: gpu
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: openarc-subtitles-gpu
    persistence:
      # RWX so the pre-upgrade setup Job and the still-Running runtime
      # Deployment can both mount during an upgrade.
      cache:
        type: persistentVolumeClaim
        existingClaim: openarc-subtitles-cache
        globalMounts:
          - path: /cache
      # OpenArc writes benchmark SQLite under /persist; without this mount
      # the readOnlyRootFilesystem would block it.
      persist:
        type: emptyDir
        advancedMounts:
          openarc-subtitles:
            openarc:
              - path: /persist
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      openarc-subtitles:
        controller: openarc-subtitles
        ports:
          web:
            port: *web_port
            primary: true
