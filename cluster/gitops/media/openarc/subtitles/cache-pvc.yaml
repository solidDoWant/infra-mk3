---
# Standalone (not chart-managed) so deleting the HelmRelease doesn't
# take the cache with it. RWX so a pre-upgrade Job can mount alongside
# the still-Running runtime pod.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openarc-subtitles-cache
spec:
  storageClassName: ssd-replicated-filesystem
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      # Holds raw HF model files + OV compile caches for every model
      # registered in openarc-subtitles's openarc_config.json. Currently:
      # Qwen3-ASR-0.6B int8 (~0.7 GiB) + Qwen3-4B-Instruct int4 awq
      # (~2.7 GiB) + their OV caches.
      storage: 10Gi
