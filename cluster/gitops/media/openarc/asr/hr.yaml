---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openarc-asr
spec:
  interval: 5m
  # First-time install downloads ~2 GB from HF and compiles three
  # OpenVINO models - easily 6–8 min. Upgrades with a warm cache are
  # much faster, but the same timeout applies.
  timeout: 20m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      # Cache-population hook. Helm waits for this Job to succeed before
      # rolling the Deployment, so the runtime pod always boots into a
      # warm cache and avoids the high-memory cold-compile path. This cuts
      # the peak memory usage (and therefore limit) of the main deployment
      # from 6 Gi to 2 Gi.
      setup:
        type: job
        annotations:
          helm.sh/hook: pre-install,pre-upgrade
          helm.sh/hook-weight: "-5"
          helm.sh/hook-delete-policy: before-hook-creation
        job:
          backoffLimit: 1
          ttlSecondsAfterFinished: 500
        defaultContainerOptions:
          env: &common_env_vars
            OPENARC_CONFIG_FILE: /cache/openarc_config.json
            OPENARC_OV_CACHE_DIR: /cache/ov-cache
            OPENARC_AUTOLOAD_MODEL: qwen3-asr-0_6b-int8-asym
            OPENARC_LOG_FILE: /dev/null
            NUMBA_CACHE_DIR: /tmp/numba-cache
        containers:
          openarc:
            image: &image
              repository: ghcr.io/soliddowant/openarc
              tag: main-8856d1d9-r5
              pullPolicy: Always
            command:
              - /bin/setup-cache
            securityContext: &container_security_context
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            env:
              <<: *common_env_vars
              MODEL_TYPE: qwen3_asr
              HF_REPO: Echo9Zulu/Qwen3-ASR-0.6B-INT8_ASYM-OpenVINO
              MODEL_PATH: /cache/qwen3_asr/$(HF_REPO)
              # huggingface-cli writes to HF_HOME; the default
              # ~/.cache path is unwritable under readOnlyRootFilesystem.
              HF_HOME: /tmp/hf-home
            resources:
              requests:
                cpu: 500m
                # Cold-compile path: full graph optimization + GPU upload.
                # Empirically peaks ~2.7 Gi; 6 Gi gives headroom.
                memory: &openarc_setup_memory 6Gi
              limits:
                memory: *openarc_setup_memory
              claims:
                - name: gpu
        pod:
          # A single failure is unlikely to succeed on another attempt
          restartPolicy: Never
      openarc-asr:
        replicas: 1
        # Release the GPU device cleanly between revisions.
        strategy: Recreate
        containers:
          openarc:
            image: *image
            securityContext: *container_security_context
            env: *common_env_vars
            ports:
              - name: web
                containerPort: &web_port 8000
            probes:
              # /openarc/status lists the model with status="loaded" only
              # after a successful compile. The openai_model_names field
              # registers names regardless of load state, so it can't be
              # used to detect a failed compile or a silent unload (which
              # happens on certain bad requests).
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - bash
                      - -c
                      - >-
                        resp=$$(curl -sf http://localhost:8000/openarc/status);
                        [[ "$${resp}" == *"\"model_name\":\"$${OPENARC_AUTOLOAD_MODEL}\""* &&
                          "$${resp}" == *"\"status\":\"loaded\""* ]]
                  initialDelaySeconds: 15
                  # 5s period × 3 failures = up to 15s to react to a silent
                  # unload (bad transcription requests can unload the model
                  # without crashing the server).
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: &openarc_memory 2Gi
              limits:
                memory: *openarc_memory
              claims:
                - name: gpu
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: openarc-asr-gpu
    persistence:
      # RWX so the pre-upgrade setup Job and the still-Running runtime
      # Deployment can both mount during an upgrade.
      cache:
        type: persistentVolumeClaim
        existingClaim: openarc-asr-cache
        globalMounts:
          - path: /cache
      # OpenArc writes benchmark SQLite under /persist; without this mount
      # the readOnlyRootFilesystem would block it.
      persist:
        type: emptyDir
        advancedMounts:
          openarc-asr:
            openarc:
              - path: /persist
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      openarc-asr:
        controller: openarc-asr
        ports:
          web:
            port: *web_port
            primary: true
