---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jellyfin
specs:
  - description: jellyfin
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/controller: jellyfin
        app.kubernetes.io/instance: jellyfin
    egress:
      # DNS resolution
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # openid-configuration-proxy: serves the rewritten OIDC discovery doc
      # so the SSO plugin's token/JWKS/userinfo URLs resolve to in-cluster
      # endpoints. HTTPS on 8443; some OIDC clients refuse plain HTTP.
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: openid-configuration-proxy
              app.kubernetes.io/instance: openid-configuration-proxy
        toPorts:
          - ports:
              - port: "8443"
                protocol: TCP
      # Seerr — the Jellyfin Enhanced plugin calls Seerr's API from the
      # Jellyfin server side to submit/track requests on behalf of users.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: seerr
              app.kubernetes.io/controller: seerr
              app.kubernetes.io/instance: seerr
        toPorts:
          - ports:
              - port: "5055"
                protocol: TCP
      # Sonarr — Jellyfin Enhanced plugin queries the Sonarr API for download
      # status / queue inspection.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: sonarr
              app.kubernetes.io/controller: sonarr
              app.kubernetes.io/instance: sonarr
        toPorts:
          - ports:
              - port: "8989"
                protocol: TCP
      # Radarr — same plugin queries Radarr's API for movie download status.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: radarr
              app.kubernetes.io/controller: radarr
              app.kubernetes.io/instance: radarr
        toPorts:
          - ports:
              - port: "7878"
                protocol: TCP
      # Metadata providers and plugin/update repositories.
      - toFQDNs:
          # TMDB metadata + posters
          - matchName: api.themoviedb.org
          - matchName: image.tmdb.org
          # TVDB metadata + artwork
          - matchName: api4.thetvdb.com
          - matchName: artworks.thetvdb.com
          # OMDb metadata provider
          - matchName: omdbapi.com
          - matchName: www.omdbapi.com
          # IMDb / Amazon image CDN (poster + cover art)
          - matchName: m.media-amazon.com
          # Schedules Direct (Live TV / DVR EPG)
          - matchName: json.schedulesdirect.org
          # Jellyfin's official plugin and update repository, plus mirror CDN
          - matchName: repo.jellyfin.org
          - matchPattern: "*.mirror.jellyfin.org"
          # Third-party plugin manifests (the SSO plugin is hosted here)
          - matchName: raw.githubusercontent.com
          # iamparadox plugin repository (additional Jellyfin plugin manifest host)
          - matchName: www.iamparadox.dev
          # Intro Skipper plugin
          - matchName: intro-skipper.org
          - matchName: cdn.jsdelivr.net
          # Plugin downloads sometimes redirect to GitHub release assets
          - matchPattern: "*.github.com"
          - matchName: github.com
          - matchName: objects.githubusercontent.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
    ingress:
      # Kubelet for healthchecks
      - fromEntities:
          - host
        toPorts: &http_ports
          - ports:
              - port: "8096"
                protocol: TCP
      - fromEndpoints:
          # Internal gateway forwards user traffic
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              app.kubernetes.io/name: ingress-gateways
              gateway.networking.k8s.io/gateway-name: internal-gateway
          # Metrics scraping (Jellyfin serves /metrics on the same port as the
          # web UI). This requires EnableMetrics=true in network.xml — set via
          # the admin UI after first boot.
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
          # Seerr — request frontend; uses the Jellyfin API for user import
          # and library state.
          - matchLabels:
              app.kubernetes.io/name: seerr
              app.kubernetes.io/controller: seerr
              app.kubernetes.io/instance: seerr
          # Sonarr / Radarr — Connect notifications on import completion
          # trigger a Jellyfin library refresh.
          - matchLabels:
              app.kubernetes.io/name: sonarr
              app.kubernetes.io/controller: sonarr
              app.kubernetes.io/instance: sonarr
          - matchLabels:
              app.kubernetes.io/name: radarr
              app.kubernetes.io/controller: radarr
              app.kubernetes.io/instance: radarr
        toPorts: *http_ports
