---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: houndarr-backup
spec:
  interval: 5m
  chart:
    spec:
      chart: dr-job
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
      version: 0.0.17
  values:
    jobConfig:
      drType: generic
      drAction: backup
      cronjob:
        schedule: "@daily"
      configFile:
        backupName: houndarr-backup
        backupVolume:
          storageClass: zfs-generic-nfs # Backed by storage server
          size: 1Gi
        files:
          # Contains houndarr's database, keys, etc
          - name: config
            pvc: houndarr
            snapshotClass: ssd-replicated-3x-block
            exclude:
              - glob: lost+found
