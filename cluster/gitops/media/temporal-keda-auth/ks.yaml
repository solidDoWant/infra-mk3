---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Namespace-scoped Temporal read credential for KEDA scalers in `media` — an
# instance of the shared component (see cluster/components/temporal/keda-auth).
# Teleport CRs deploy into `media` alongside the workload; the
# teleport-cr-mirror-policy GeneratingPolicy mirrors them into `security` for
# the operator to reconcile.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name media-temporal-keda-auth
spec:
  targetNamespace: &namespace media
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/components/temporal/keda-auth
  postBuild:
    substitute:
      NAMESPACE: *namespace
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: teleport-cluster
    - name: teleport-cr-mirror-policy
