---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lingarr-postgres
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster2
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    instances: 1
    bootstrap:
      recovery:
        volumeSnapshot:
          name: lingarr-postgres-17-pre-migration

    clusterName: lingarr
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    certificates:
      client:
        ca:
          subject: &subject
            countries:
              - US
            provinces:
              - ${SECRET_STATE}
            organizations:
              - infra-mk3
      serving:
        issuerRef:
          name: media-intermediary-ca
        subject: *subject
    users:
      lingarr:
        username: lingarr
        disableReloading: true
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        selector:
          matchLabels:
            app.kubernetes.io/name: lingarr
            app.kubernetes.io/controller: lingarr
            app.kubernetes.io/instance: lingarr
