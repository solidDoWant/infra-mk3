---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lingarr-postgres-17
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  dependsOn:
    - name: lingarr-postgres-auth
  values:
    clusterName: lingarr
    certificates:
      serving:
        issuerRef:
          name: media-intermediary-ca
        subject:
          countries:
            - US
          provinces:
            - ${SECRET_STATE}
          organizations:
            - infra-mk3
        # ECDSA for consistency with the rest of the cluster's postgres serving
        # certs. Envoy / BoringSSL support is most reliable here, and .NET's
        # Npgsql (used by Lingarr) doesn't speak Ed25519 anyway.
        privateKey:
          algorithm: ECDSA
          size: 384
          encoding: PKCS8
          rotationPolicy: Always
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        # The Envoy sidecar lives in the lingarr pod and inherits its pod
        # labels, so the lingarr controller selector is what reaches the DB.
        selectors:
          - matchLabels:
              app.kubernetes.io/name: lingarr
              app.kubernetes.io/controller: lingarr
              app.kubernetes.io/instance: lingarr
