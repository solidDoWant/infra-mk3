---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lingarr-postgres-auth
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/auth
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    serviceName: lingarr
    certificates:
      ca:
        subject:
          countries:
            - US
          provinces:
            - ${SECRET_STATE}
          organizations:
            - infra-mk3
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    users:
      lingarr:
        username: lingarr
        # Envoy uses file-based SDS with watched_directory on the cert mount,
        # so cert rotations are hot-reloaded — no pod restart needed.
        disableReloading: true
