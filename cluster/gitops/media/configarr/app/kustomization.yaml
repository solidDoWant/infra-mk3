---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - hr.yaml
  - netpol.yaml
# Builds the configarr config into a ConfigMap from the standalone config/ file
# instead of inlining it in the HelmRelease. The hash suffix is left enabled so
# a config.yml edit yields a new ConfigMap name; hr-values-from-cm-transformer.yaml
# rewrites that name into the HR's persistence.config.name, so an edit changes
# the HR → Flux upgrades it → the post-upgrade Job applies the change (no wait
# for the weekly cron). Flux prunes the superseded ConfigMap.
configMapGenerator:
  - name: configarr-config
    files:
      - config.yml=config/config.yml
configurations:
  - hr-values-from-cm-transformer.yaml
