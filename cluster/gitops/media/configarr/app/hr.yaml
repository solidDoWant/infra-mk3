---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: configarr
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      # Post-install/upgrade Job. Fires on every HelmRelease upgrade —
      # including config.yml edits, which re-hash the mounted ConfigMap's name
      # and so change the HR (see kustomization.yaml). Applies config changes
      # without waiting for the weekly cron.
      job:
        type: job
        annotations:
          helm.sh/hook: post-install,post-upgrade,post-rollback
          # before-hook-creation: deletes the previous Job before recreating
          #   (Jobs are immutable, so without this the upgrade would fail).
          # hook-succeeded: cleans up the Job after success so kubectl is tidy.
          # Failed Jobs are left in place for debugging.
          helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        job:
          backoffLimit: 1
          ttlSecondsAfterFinished: 600
        containers:
          configarr: &configarr_container
            image:
              repository: ghcr.io/raydak-labs/configarr
              tag: 1.28.0
            env:
              RADARR_API_KEY:
                secretKeyRef:
                  name: radarr-api-key
                  key: API_KEY
              SONARR_API_KEY:
                secretKeyRef:
                  name: sonarr-api-key
                  key: API_KEY
              STOP_ON_ERROR: true
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
      # Weekly run picks up upstream TRaSH-Guides changes. Local config.yml
      # edits are picked up by the post-upgrade Job above, not this.
      cron:
        type: cronjob
        cronjob:
          schedule: "0 3 * * 0" # Sun 03:00
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 3
          backoffLimit: 1
          ttlSecondsAfterFinished: 600
        containers:
          configarr: *configarr_container
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    persistence:
      # Shared cache for cloned TRaSH-Guides repo. configarr `git pull`s an
      # existing repo rather than re-cloning, so persisting this across runs
      # saves a clone every weekly cron + every config-change Job invocation.
      # Both controllers share this PVC; they never run concurrently (Job and
      # CronJob lifecycles don't overlap), so RWO is fine.
      repos:
        type: persistentVolumeClaim
        storageClass: ssd-replicated-3x
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/repos
      # Mount the configarr-config ConfigMap (built by kustomize
      # configMapGenerator from config/config.yml) as the single config file
      # configarr reads. subPath keeps it from masking the rest of /app/config.
      # NOTE: the literal name here is the pre-hash base — kustomize rewrites it
      # to the hash-suffixed name (configarr-config-<hash>) at build time.
      config:
        type: configMap
        name: configarr-config
        globalMounts:
          - path: /app/config/config.yml
            subPath: config.yml
