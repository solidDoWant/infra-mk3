---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: configarr
specs:
  - description: configarr
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: configarr
        app.kubernetes.io/instance: configarr
    egress:
      # DNS resolution
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Clone / pull TRaSH-Guides + Recyclarr template repos
      - toFQDNs:
          - matchName: github.com
        toPorts:
          - ports:
              - port: "443"
                protocol: TCP
      # Apply rendered config to the radarr API.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: radarr
              app.kubernetes.io/controller: radarr
              app.kubernetes.io/instance: radarr
        toPorts:
          - ports:
              - port: "7878"
                protocol: TCP
    # No ingress — configarr listens on no ports.
