---
# Tells kustomize that the HelmRelease field spec.values.persistence.config.name
# is a ConfigMap-name reference, so the configMapGenerator's hash suffix is
# rewritten into it. See kustomization.yaml for why this matters.
nameReference:
  - kind: ConfigMap
    fieldSpecs:
      - kind: HelmRelease
        path: spec/values/persistence/config/name
