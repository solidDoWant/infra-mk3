# Custom formats defined in-config (top-level → applied to every *arr
# instance). configarr matches by name; the trash_id can be any unique slug.
customFormatDefinitions:
  # value: 1 is the radarr/sonarr language-enum entry for English. Scored
  # heavily in custom_formats below — see there for the rationale.
  - trash_id: prefer-english-audio
    name: "Language: English Audio"
    includeCustomFormatWhenRenaming: false
    specifications:
      - name: English
        implementation: LanguageSpecification
        negate: false
        required: true
        fields:
          value: 1

radarr:
  radarr:
    base_url: http://radarr.media.svc.cluster.local:7878
    api_key: !env RADARR_API_KEY

    # configarr is authoritative: profiles/CFs present in radarr but not
    # managed here (or by an included template) are deleted each run. The first
    # run is aggressive — it removes radarr's built-in default profiles.
    delete_unmanaged_quality_profiles:
      enabled: true
    delete_unmanaged_custom_formats:
      enabled: true

    # Must match radarr's library mount path.
    root_folders:
      - /mnt/library

    # `fields:` keys are snake_case of the radarr API names (useSsl → use_ssl);
    # `type:` is the lowercase implementation name (Nzbget → nzbget).
    download_clients:
      update_password: true
      delete_unmanaged:
        enabled: true
      config:
        # Disabling this causes several problems:
        # * Radarr stops tracking downloads, which makes it impossible to tell ingestion state from the UI
        # * Radarr seems to sometimes download multiple copies via different releases because it doesn't know another one is in-flight
        # * The media-processor pipeline can no longer look up media information via Radarr because the file path is not in the download queue
        enable_completed_download_handling: true
        download_client_working_folders: "_UNPACK_|_FAILED_"
        check_for_finished_download_interval: 1 # minutes
        auto_redownload_failed: true
        auto_redownload_failed_from_interactive_search: true
      # Translate the client's reported path to radarr's mount: the clients
      # write under /config in their own pods; radarr sees the same NFS share
      # at /mnt/complete. host: matches the client's host FQDN, not its name.
      remote_paths:
        - host: nzbget.downloads.svc.cluster.local
          remote_path: /config/completed/Movies/
          local_path: /mnt/complete/
        - host: qbittorrent.downloads.svc.cluster.local
          remote_path: /config/Downloads/Movies/
          local_path: /mnt/complete/
      data:
        - name: NZBGet
          type: nzbget
          enable: true
          priority: 1
          remove_completed_downloads: true
          remove_failed_downloads: true
          fields:
            host: nzbget.downloads.svc.cluster.local
            port: 6789
            use_ssl: false
            url_base: ""
            username: nzbget
            password: dummy-value
            movie_category: Movies
            recent_movie_priority: 0 # Normal
            older_movie_priority: 0 # Normal
            add_paused: false
        - name: qBittorrent
          type: qbittorrent
          enable: true
          priority: 1
          remove_completed_downloads: true
          remove_failed_downloads: true
          fields:
            host: qbittorrent.downloads.svc.cluster.local
            port: 8080
            use_ssl: false
            url_base: ""
            username: ""
            password: ""
            movie_category: Movies
            movie_imported_category: ""
            recent_movie_priority: 0 # Last
            older_movie_priority: 0 # Last
            initial_state: 0 # Started
            sequential_order: false
            first_and_last: false
            content_layout: 0 # Default

    # Maps to radarr's /api/v3/config/mediamanagement. NOTE: keys here are
    # camelCase (verbatim API names), unlike the snake_case used elsewhere.
    media_management:
      # ---- File management
      # Files are on the same NFS share but use different mount points,
      # so copying is required
      copyUsingHardlinks: false
      importExtraFiles: true
      extraFileExtensions: sub,nfo
      enableMediaInfo: true
      # ---- Importing
      skipFreeSpaceCheckWhenImporting: false
      minimumFreeSpaceWhenImporting: 100 # MB, required free space after import
      useScriptImport: false
      scriptImportPath: ""
      # ---- Folder behavior
      createEmptyMovieFolders: false
      deleteEmptyFolders: true
      autoRenameFolders: false
      pathsDefaultStatic: false
      # ---- Recycle bin
      recycleBin: "" # empty = delete permanently
      recycleBinCleanupDays: 7
      # ---- File handling
      downloadPropersAndRepacks: preferAndUpgrade
      autoUnmonitorPreviouslyDownloadedMovies: false
      fileDate: none
      rescanAfterRefresh: always
      # ---- Permissions
      # The NFS server will handle permissions so this is not needed
      setPermissionsLinux: false
      chmodFolder: "755"
      chownGroup: ""

    # Values are TRaSH-Guides preset keys (radarr-naming.json). The "anime"
    # file preset is used for ALL movies deliberately: it equals jellyfin-tmdb
    # but adds MediaInfo AudioLanguages + VideoBitDepth, so 8-bit SDR and 10-bit
    # HDR are distinguishable in the filename. rename: true also reformats
    # existing files on the next scan.
    media_naming:
      folder: jellyfin-tmdb
      movie:
        rename: true
        standard: jellyfin-anime-tmdb

    # NOTE: these fields are camelCase (verbatim radarr API), unlike the
    # snake_case used elsewhere. Both delays are 0, so release age is ignored
    # and every release is immediately eligible. radarr then sorts by: CF score
    # → quality → languages → preferredProtocol (usenet beats torrent on ties)
    # → indexer/client priority. bypassIf* fields are inert at delay 0.
    delay_profiles:
      default:
        enableUsenet: true
        enableTorrent: true
        preferredProtocol: usenet
        usenetDelay: 0
        torrentDelay: 0
        bypassIfHighestQuality: false
        bypassIfAboveCustomFormatScore: false
        minimumCustomFormatScore: 0

    # These templates both create the UHD/HD Bluray+WEB profiles (kept as
    # alternates) AND import the full CF library re-scored below.
    # GOTCHA: configarr resolves RECYCLARR templates against the `includes/`
    # tree (prefixed names like radarr-quality-profile-*), NOT the top-level
    # `templates/` dir — short names like `uhd-bluray-web` won't resolve.
    include:
      - template: radarr-quality-definition-movie
      - template: radarr-quality-profile-uhd-bluray-web
      - template: radarr-custom-formats-uhd-bluray-web
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web

    # Single catch-all profile. language: Any keeps non-English releases
    # eligible as a fallback (the English CF below biases toward English).
    # Qualities are enabled top-down by preference; radarr grabs the best
    # available. min_format_score: 0 filters out negatively-scored releases
    # (Scene, x265 re-encodes, etc.) so they're never queued.
    quality_profiles:
      - name: Any Quality
        language: Any
        score_set: default
        min_format_score: 0
        quality_sort: top
        # CF scores not set by our blocks below are reset to 0, so manual
        # tweaks made in the radarr UI don't persist.
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Remux-2160p
          until_score: 10000
        qualities:
          - name: Remux-2160p
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p
          - name: Remux-1080p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: Bluray-576p
          - name: Bluray-480p
          - name: DVD
          - name: SDTV
          - name: REGIONAL
          - name: WORKPRINT
          - name: TELESYNC
          - name: TELECINE
          - name: CAM
          # BR-DISK (disc structures: .iso/BDMV/VIDEO_TS) and Raw-HD (raw .ts
          # streams) are intentionally omitted — containers, not finished
          # files. The negative BR-DISK CF below is a second line of defense.

    # Most blocks below omit an explicit score: and inherit TRaSH defaults
    # (score_set: default) so upstream curation stays current. The exceptions
    # are the English-audio and DV blocks, which set explicit scores.
    custom_formats:
      # +100000 dwarfs the sum of every other CF (a few thousand at most), so
      # any English-tagged release outranks any non-English one.
      - trash_ids:
          - prefer-english-audio
        assign_scores_to:
          - name: Any Quality
            score: 100000

      # HDR — one unified CF covering HDR10/HDR10+/HLG/PQ.
      - trash_ids:
          - 493b6d1dbec3c3364c59d7607f7e3405 # HDR
        assign_scores_to:
          - name: Any Quality

      # Hard-block DV-only releases (no HDR10 fallback) — unplayable on non-DV
      # hardware. -1000000 (vs the TRaSH default -10000, which the +100000
      # English score easily outweighs) drives the total below min_format_score
      # so the release is rejected, not just deprioritized. DV+HDR10 hybrids
      # don't match this CF and pass through fine.
      - trash_ids:
          - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
        assign_scores_to:
          - name: Any Quality
            score: -1000000

      # Remasters / special editions.
      - trash_ids:
          - 570bc9ebecd92723d2d21500f4be314c # Remaster
          - eca37840c13c6ef2dd0262b141a5482f # 4K Remaster
          - e0c07d59beb37348e975a930d5e50319 # Criterion Collection
          - 9d27d9d2181838f76dee150882bdc58c # Masters of Cinema
          - db9b4c4b53d312a3ca5f1378f6440fc9 # Vinegar Syndrome
          - 957d0f44b592285f26449575e8b1167e # Special Edition
          - eecf3a857724171f968a66cb5719e152 # IMAX
          - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
        assign_scores_to:
          - name: Any Quality

      # Audio codecs, ranked by TRaSH defaults. No channel-count filtering —
      # the downstream media-processor handles layout (5.1→2.0 downmix etc.).
      - trash_ids:
          - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95 # DTS X
          - 417804f7f2c4308c1f4c5d380d4c4475 # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
          - e7c2fcae07cbada050a0af3357491d7b # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db # DTS-HD HRA
          - 185f1dd7264c4562b9022d963ac37424 # DD+
          - f9f847ac70a0af62ea4a08280b859636 # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73 # DTS
          - 240770601cc226190c367ef59aba7463 # AAC
          - c2998bd0d90ed5621d8df281e839436e # DD
        assign_scores_to:
          - name: Any Quality

      # HQ release groups — TRaSH-curated encoder-group tiers.
      - trash_ids:
          - 4d74ac4c4db0b64bff6ce0cffef99bf0 # UHD Bluray Tier 01
          - a58f517a70193f8e578056642178419d # UHD Bluray Tier 02
          - e71939fae578037e7aed3ee219bbe7c1 # UHD Bluray Tier 03
          - ed27ebfef2f323e964fb1f61391bcb35 # HD Bluray Tier 01
          - c20c8647f2746a1f4c4262b0fbbeeeae # HD Bluray Tier 02
          - 5608c71bcebba0a5e666223bae8c9227 # HD Bluray Tier 03
          - c20f169ef63c5f40c2def54abaf4438e # WEB Tier 01
          - 403816d65392c79236dcb6dd591aeda4 # WEB Tier 02
          - af94e0fe497124d1f9ce732069ec8c3b # WEB Tier 03
        assign_scores_to:
          - name: Any Quality

      # Streaming services — consistent-bitrate sources.
      - trash_ids:
          - b3b3a6ac74ecbd56bcdbefa4799fb9df # AMZN
          - 40e9380490e748672c2522eaaeb692f7 # ATVP
          - 84272245b2988854bfb76a16e60baea5 # DSNP
          - 509e5f41146e278f9eab1ddaceb34515 # HBO
          - 5763d1b0ce84aff3b21038eea8e9b8ad # HMAX
          - 526d445d4c16214309f0fd2b3be18a89 # Hulu
          - e0ec9672be6cac914ffad34a6b077209 # iT
          - 6a061313d22e51e0f25b7cd4dc065233 # MAX
          - 170b1d363bd8516fbf3a3eb05d4faff6 # NF
          - c9fd353f8f5f1baf56dc601c4cb29920 # PCOK
          - e36a0ba1bc902b26ee40818a1d59b8bd # PMTP
          - c2863d2a50c9acad1fb50e53ece60817 # STAN
          - cc5e51a9e85a6296ceefe097a77f12f4 # BCORE
          - 16622a6911d1ab5d5b8b713d5b0036d4 # CRiT
          - 2a6039655313bf5dab1e43523b62c374 # MA
        assign_scores_to:
          - name: Any Quality

      # Repack / Proper.
      - trash_ids:
          - e7718d7a3ce595f289bfee26adc178f5 # Repack/Proper
          - ae43b294509409a6a13919dedd4764c4 # Repack2
          - 5caaaa1c08c1742aa4342d8c4cc463f2 # Repack3
        assign_scores_to:
          - name: Any Quality

      # Unwanted attributes — TRaSH defaults are heavily negative, so at
      # min_format_score 0 these are effectively blocked. Note x265 (HD) targets
      # re-encodes (h264→h265); native HEVC in 2160p remux/bluray is unaffected.
      - trash_ids:
          - ed38b889b31be83fda192888e2286d83 # BR-DISK
          - e6886871085226c3da1830830146846c # Generated Dynamic HDR
          - 90a6f9a284dff5103f6346090e6280c8 # LQ
          - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
          - b8cd450cbfa689c0259a01d9e29ba3d6 # 3D
          - bfd8eb01832d646a0a89c4deb46f8564 # Upscaled
          - 0a3f082873eb454bde444150b70253cc # Extras
          - 712d74cd88bceb883ee32f773656b1f5 # Sing-Along Versions
          - cae4ca30163749b891686f95532519bd # AV1
        assign_scores_to:
          - name: Any Quality

      # Bad release flags — deprioritized, not hard-blocked: at
      # min_format_score 0 they lose to better options but stay eligible.
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: Any Quality

# Sonarr — mirrors the radarr setup above; comments below cover only the
# series-specific differences (episodes vs movies, sonarr-specific trash_ids,
# WEB-centric profiles).
sonarr:
  sonarr:
    base_url: http://sonarr.media.svc.cluster.local:8989
    api_key: !env SONARR_API_KEY

    delete_unmanaged_quality_profiles:
      enabled: true
    delete_unmanaged_custom_formats:
      enabled: true

    root_folders:
      - /mnt/library

    # Same as radarr but with TV categories / tv_* fields. The NZBGet password
    # is a dummy: nzbget runs with no auth (empty ControlUsername/Password).
    download_clients:
      update_password: true
      delete_unmanaged:
        enabled: true
      config:
        # See Radarr note about download handling - same issue with sonarr
        enable_completed_download_handling: true
        download_client_working_folders: "_UNPACK_|_FAILED_"
        auto_redownload_failed: true
        auto_redownload_failed_from_interactive_search: true
      remote_paths:
        - host: nzbget.downloads.svc.cluster.local
          remote_path: /config/completed/Series/
          local_path: /mnt/complete/
        - host: qbittorrent.downloads.svc.cluster.local
          remote_path: /config/Downloads/Series/
          local_path: /mnt/complete/
      data:
        - name: NZBGet
          type: nzbget
          enable: true
          priority: 1
          remove_completed_downloads: true
          remove_failed_downloads: true
          fields:
            host: nzbget.downloads.svc.cluster.local
            port: 6789
            use_ssl: false
            url_base: ""
            username: nzbget
            password: dummy-value
            tv_category: Series
            recent_tv_priority: 0 # Normal
            older_tv_priority: 0 # Normal
            add_paused: false
        - name: qBittorrent
          type: qbittorrent
          enable: true
          priority: 1
          remove_completed_downloads: true
          remove_failed_downloads: true
          fields:
            host: qbittorrent.downloads.svc.cluster.local
            port: 8080
            use_ssl: false
            url_base: ""
            username: ""
            password: ""
            tv_category: Series
            tv_imported_category: ""
            recent_tv_priority: 0 # Last
            older_tv_priority: 0 # Last
            initial_state: 0 # Started
            sequential_order: false
            first_and_last: false
            content_layout: 0 # Default

    # Media Management tab. Schema differs from radarr's:
    # episodes-vs-movies field names, no pathsDefaultStatic or
    # autoRenameFolders, adds episodeTitleRequired.
    media_management:
      # ---- File management
      # Copy, not hardlink — same NFS-mount reason as radarr.
      copyUsingHardlinks: false
      importExtraFiles: true
      extraFileExtensions: sub,nfo
      enableMediaInfo: true
      # Wait for proper metadata; reject releases with unresolved episode titles.
      episodeTitleRequired: always
      # ---- Importing
      skipFreeSpaceCheckWhenImporting: false
      minimumFreeSpaceWhenImporting: 100
      useScriptImport: false
      scriptImportPath: ""
      # ---- Folder behavior
      createEmptySeriesFolders: false
      deleteEmptyFolders: true
      # ---- Recycle bin
      recycleBin: ""
      recycleBinCleanupDays: 7
      # ---- File handling
      downloadPropersAndRepacks: preferAndUpgrade
      autoUnmonitorPreviouslyDownloadedEpisodes: false
      fileDate: none
      rescanAfterRefresh: always
      # ---- Permissions
      setPermissionsLinux: false
      chmodFolder: "755"
      chownGroup: ""

    # TRaSH preset keys mirroring radarr's jellyfin scheme (series jellyfin-tvdb
    # → "{Series TitleYear} [tvdbid-{TvdbId}]"). GOTCHA: sonarr's standard/daily
    # episode presets omit AudioLanguages + VideoBitDepth (only the anime preset
    # has them), so episode filenames are slightly less rich than radarr's
    # movies — exact parity would need media_naming_api. Existing folders aren't
    # auto-renamed (no autoRenameFolders); rename: true still reformats files.
    # media_naming can't set multiEpisodeStyle/colonReplacementFormat/etc.
    media_naming:
      series: jellyfin-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    # Same as radarr's delay profile (see above): zero delays, NZB beats
    # torrent on ties.
    delay_profiles:
      default:
        enableUsenet: true
        enableTorrent: true
        preferredProtocol: usenet
        usenetDelay: 0
        torrentDelay: 0
        bypassIfHighestQuality: false
        bypassIfAboveCustomFormatScore: false
        minimumCustomFormatScore: 0

    # Like radarr, but WEB-only: sonarr's language-neutral catalog has no
    # Bluray+WEB combo profile (series are WEB-sourced). GOTCHA: profile/CF
    # templates use the `sonarr-v4-` prefix, but the quality definition is
    # `sonarr-quality-definition-series` (no v4).
    include:
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-quality-profile-web-2160p
      - template: sonarr-v4-custom-formats-web-2160p
      - template: sonarr-v4-quality-profile-web-1080p
      - template: sonarr-v4-custom-formats-web-1080p

    # Same shape as radarr's Any Quality. Raw-HD is omitted (raw .ts streams);
    # BR-DISK isn't a sonarr quality enum (radarr-only).
    quality_profiles:
      - name: Any Quality
        language: Any
        score_set: default
        min_format_score: 0
        quality_sort: top
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p Remux
          until_score: 10000
        qualities:
          - name: Bluray-2160p Remux
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: HDTV-2160p
          - name: Bluray-1080p Remux
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: HDTV-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBDL-720p
              - WEBRip-720p
          - name: HDTV-720p
          - name: Bluray-576p
          - name: Bluray-480p
          - name: DVD
          - name: WEB 480p
            qualities:
              - WEBDL-480p
              - WEBRip-480p
          - name: SDTV

    # Sonarr trash_ids differ from radarr's even when the CF name matches;
    # catalog gaps vs radarr are noted per block.
    custom_formats:
      # English preference (the shared top-level prefer-english-audio CF).
      - trash_ids:
          - prefer-english-audio
        assign_scores_to:
          - name: Any Quality
            score: 100000

      # HDR — single unified CF covers HDR10/HDR10+/HLG/PQ.
      - trash_ids:
          - 505d871304820ba7106b693be6fe4a9e # HDR
        assign_scores_to:
          - name: Any Quality

      # Hard-block DV-only releases — see the radarr DV block for why -1000000
      # (vs the TRaSH default -10000).
      - trash_ids:
          - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
        assign_scores_to:
          - name: Any Quality
            score: -1000000

      # Remaster. Sonarr ships only this generic CF; radarr's other
      # remaster/edition CFs (Criterion, IMAX, etc.) are movie-only.
      - trash_ids:
          - b735f09d3c025cbb7d75a5d38325b73b # Remaster
        assign_scores_to:
          - name: Any Quality

      # Audio codecs (see radarr's note on skipping channel-count filtering).
      - trash_ids:
          - 0d7824bb924701997f874e7ff7d4844a # TrueHD ATMOS
          - 9d00418ba386a083fbf4d58235fc37ef # DTS X
          - b6fbafa7942952a13e17e2b1152b539a # ATMOS (undefined)
          - 4232a509ce60c4e208d13825b7c06264 # DD+ ATMOS
          - 1808e4b9cee74e064dfae3f1db99dbfe # TrueHD
          - c429417a57ea8c41d57e6990a8b0033f # DTS-HD MA
          - 851bd64e04c9374c51102be3dd9ae4cc # FLAC
          - 30f70576671ca933adbdcfc736a69718 # PCM
          - cfa5fbd8f02a86fc55d8d223d06a5e1f # DTS-HD HRA
          - 63487786a8b01b7f20dd2bc90dd4a477 # DD+
          - c1a25cd67b5d2e08287c957b1eb903ec # DTS-ES
          - 5964f2a8b3be407d083498e4459d05d0 # DTS
          - a50b8a0c62274a7c38b09a9619ba9d86 # AAC
          - dbe00161b08a25ac6154c55f95e6318d # DD
        assign_scores_to:
          - name: Any Quality

      # HQ release groups — sonarr has fewer tiers than radarr (no UHD Bluray,
      # no HD Bluray Tier 03) plus a WEB Scene CF.
      - trash_ids:
