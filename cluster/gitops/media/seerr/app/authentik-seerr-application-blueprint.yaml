---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-seerr-application-blueprint
  labels:
    k8s-sidecar.home.arpa/application: authentik
type: Opaque
stringData:
  # Unfortunately this must be a secret (rather than secretGenerator) or Flux will not substitute
  # values within it
  authentik-seerr-application-blueprint.yaml: |
    ---
    # yaml-language-server: $schema=../../../../../schemas/configs/blueprint.authentik_v1.json
    version: 1
    metadata:
      name: Seerr application
      labels:
        blueprints.goauthentik.io/description: Resources for Seerr SSO
    entries:
      # Dependencies
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Implicit provider authentication
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Password authentication flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Invalidation flow
          required: true
      # Application
      - model: authentik_providers_oauth2.oauth2provider
        id: seerr-provider
        identifiers:
          name: Seerr
        attrs:
          name: Seerr
          authorization_flow:
            !Find [authentik_flows.flow, [slug, implicit-authorization-flow]]
          client_type: confidential
          # Required: the field's model default is an EMPTY list, and the authorize
          # endpoint rejects any grant type not listed — a provider (re)created from
          # this blueprint without it cannot log anyone in. The app runs the
          # browser authorization-code flow; refresh_token covers server-side
          # session renewal. (Also drops the unused legacy grants the pre-field
          # migration back-filled: hybrid/implicit/password/client_credentials/
          # device_code.)
          grant_types:
            - authorization_code
            - refresh_token
          client_id: "${SECRET_SEERR_AUTHENTIK_OIDC_CLIENT_ID}"
          client_secret: "${SECRET_SEERR_AUTHENTIK_OIDC_CLIENT_SECRET}"
          # Redirect URIs from Seerr's OIDC implementation (PR #2715).
          redirect_uris:
            - url: https://seerr.${SECRET_PUBLIC_DOMAIN_NAME}/login
              matching_mode: strict
            - url: https://seerr.${SECRET_PUBLIC_DOMAIN_NAME}/profile/settings/linked-accounts
              matching_mode: strict
          signing_key:
            !Find [
              authentik_crypto.certificatekeypair,
              [name, authentik Self-signed Certificate],
            ]
          authentication_flow:
            !Find [authentik_flows.flow, [slug, password-authentication-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: minutes=5
          refresh_token_validity: days=30
          property_mappings:
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'email'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'openid'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'profile'"],
              ]
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          issuer_mode: per_provider
      - model: authentik_core.application
        id: seerr-application
        identifiers:
          slug: seerr
        attrs:
          name: Seerr
          slug: seerr
          group: Media access
          provider: !KeyOf seerr-provider
          policy_engine_mode: any
          meta_launch_url: https://seerr.${SECRET_PUBLIC_DOMAIN_NAME}
          # icon: # TODO
      - model: authentik_core.group
        id: seerr-group
        identifiers:
          name: Seerr access
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_SEERR_DISCORD_ROLE_ID}"
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf seerr-group
          target: !KeyOf seerr-application
