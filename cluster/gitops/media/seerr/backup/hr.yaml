---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr-backup
spec:
  interval: 5m
  chart:
    spec:
      chart: dr-job
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
      version: 0.0.17
  values:
    jobConfig:
      drType: generic
      drAction: backup
      cronjob:
        schedule: "@daily"
      configFile:
        backupName: seerr-backup
        backupVolume:
          storageClass: zfs-generic-nfs # Backed by storage server
          size: 2Gi
        postgres:
          - name: &cluster_name seerr-postgres
            cluster: *cluster_name
        files:
          # Seerr's /app/config PVC: settings, cookies, schema migration markers,
          # etc. Postgres holds the relational data; this captures everything else.
          - name: config
            pvc: seerr-config
            snapshotClass: ssd-replicated-3x-block
            exclude:
              - glob: cache
              - glob: lost+found
