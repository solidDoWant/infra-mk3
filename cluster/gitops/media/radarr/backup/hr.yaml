---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr-backup
spec:
  interval: 5m
  chart:
    spec:
      chart: dr-job
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
      version: 0.0.18
  values:
    jobConfig:
      drType: generic
      drAction: backup
      cronjob:
        schedule: "0 0 * * *" # Staggered to avoid concurrent snapshots on the shared zfs-generic-nfs provisioner
      configFile:
        backupName: radarr-backup
        backupVolume:
          storageClass: zfs-generic-nfs # Backed by storage server
          # Holds a logical dump of the radarr database (~15Mi live).
          size: 1Gi
        postgres:
          - name: &cluster_name radarr-postgres
            cluster: *cluster_name
