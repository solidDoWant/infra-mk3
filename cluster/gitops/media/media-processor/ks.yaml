---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Teleport CRs (bot/role/token/workload identity) live alongside the app in
# the `media` namespace. The Teleport operator only watches its own namespace
# (security), so the teleport-cr-mirror-policy ClusterPolicy mirrors them
# into security where the operator can reconcile them. This workaround can
# be removed when https://github.com/gravitational/teleport/pull/66134 ships.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  namespace: flux-system
  name: &app_name media-processor
spec:
  targetNamespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app_name
  interval: 5m
  path: /cluster/gitops/media/media-processor/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-mk3
  wait: true
  dependsOn:
    - name: prometheus-crds
    - name: temporal-app
    - name: intel-resource-drivers-gpu
    - name: radarr
    - name: sonarr
    - name: teleport-cluster
    - name: teleport-cr-mirror-policy
