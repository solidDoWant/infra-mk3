---
apiVersion: v1
kind: ConfigMap
metadata:
  name: media-processor-tbot-config
data:
  # Mounted at /etc/tbot/tbot.yaml in the tbot sidecar of every pod that needs
  # a Temporal JWT (watcher and worker). The sidecar joins the cluster via the
  # in-cluster kubernetes ServiceAccount token, then continually renews a
  # JWT-SVID (containing permissions=["media:worker"]) into a shared emptyDir.
  # The Temporal Go SDK reads the JWT file fresh on every RPC because we set
  # apiKey to file:///var/run/teleport/jwt/jwt — so renewals propagate without
  # restarting the worker.
  tbot.yaml: |
    version: v2
    # In-cluster ClusterIP publicAddr of the proxy. tbot only joins and renews
    # SVIDs (no reverse tunnel), so it honors the dialed address and reaches the
    # proxy directly — bypassing the internal gateway. The proxy lists this name
    # in publicAddr and serves a matching internal keypair, so TLS/SNI validate.
    proxy_server: teleport-cluster.security.svc.cluster.local:443
    onboarding:
      token: media-processor
      join_method: kubernetes
    storage:
      type: memory
    services:
      - type: workload-identity-jwt
        selector:
          name: media-processor
        audiences:
          - temporal.${SECRET_PUBLIC_DOMAIN_NAME}
        destination:
          type: directory
          path: /var/run/teleport/jwt
