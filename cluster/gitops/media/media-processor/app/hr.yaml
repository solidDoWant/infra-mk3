---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-processor
spec:
  interval: 5m
  chart:
    spec:
      chart: media-processor
      version: 0.0.32
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
  values:
    config:
      temporal:
        # In-cluster gRPC over TLS; auth is JWT bearer (apiKey below).
        # Frontend's serving cert SANs match this hostname, so SNI / cert
        # verification works without a serverName override.
        address: temporal-frontend.data.svc.cluster.local:7233
        # Maps to the Temporal namespace auto-created by temporal-namespace-manager
        # (k8s namespace "media" carries temporal.home.arpa/enabled=true).
        namespace: media
        taskQueue: media-processor
        # file:/// prefix tells the app worker to re-read the JWT from disk
        # on every RPC. tbot rotates the JWT well before expiry, so the worker
        # picks up new tokens without restart.
        apiKey:
          value: file:///var/run/teleport/jwt/jwt_svid
        # Trust the cluster root CA (distributed to every namespace as
        # root-ca-pub-cert by the extract-root-ca-certificate Kyverno policy).
        # The frontend serves leaf + data-intermediary-ca, which chains to this
        # root, so no per-namespace intermediate distribution is needed.
        tls:
          enabled: true
          caCert:
            secretKeyRef:
              name: root-ca-pub-cert
              key: ca.pem
        # KEDA's Temporal scaler runs in the keda-operator pod and can't host
        # a tbot sidecar, so it reads a JWT-SVID from a Secret refreshed by the
        # standalone media-temporal-keda-auth tbot Deployment (separate
        # workload identity scoped to media:read, distinct from the workers'
        # media:write credential). KEDA re-reads the Secret each polling
        # interval, picking up rotated JWTs without restart.
        keda:
          apiKey:
            secretKeyRef:
              name: media-temporal-keda-auth
              key: jwt_svid

      watcher:
        watches:
          - name: bittorrent-movies
            mediaType: movie
            input:
              volumeName: media
              mountPath: /media/input/bittorrent/Movies
              subPath: downloads/bittorrent/Movies
            output: &movie_output
              volumeName: media
              mountPath: /media/output/movies
              subPath: converted/Movies
              remotePath: /mnt/complete
            preserveSource: true
            ignorePatterns: &qbittorrent_ignore
              - "\\.!qB$" # qbittorrent incomplete downloads
            skipCropDetection: true
          - name: bittorrent-shows
            mediaType: show
            input:
              volumeName: media
              mountPath: /media/input/bittorrent/Series
              subPath: downloads/bittorrent/Series
            output: &show_output
              volumeName: media
              mountPath: /media/output/shows
              subPath: converted/Shows
              remotePath: /mnt/complete
            preserveSource: true
            ignorePatterns: *qbittorrent_ignore
            skipCropDetection: true
          - name: usenet-movies
            mediaType: movie
            input:
              volumeName: media
              mountPath: /media/input/usenet/Movies
              subPath: downloads/usenet/Movies
            output: *movie_output
            preserveSource: false
            ignorePatterns: &nzbget_ignore
              - "(^|/)_unpack(/|$)" # nzbget in-progress extraction directories
              - (?:^|/)[0-9a-zA-Z]{32}\.[^/]+$ # hashed temp names of moved files pending rename. This is less than ideal, but the only realistic workaround
            skipCropDetection: true
          - name: usenet-shows
            mediaType: show
            input:
              volumeName: media
              mountPath: /media/input/usenet/Series
              subPath: downloads/usenet/Series
            output: *show_output
            preserveSource: false
            ignorePatterns: *nzbget_ignore
            skipCropDetection: true
        volumes:
          media:
            type: nfs
            server: ${NFS_ADDRESS}
            path: ${NFS_MEDIA_PATH}
        metrics:
          enabled: true

      worker:
        metrics:
          enabled: true
        radarr:
          url: "http://radarr.media.svc:7878"
          apiKey:
            secretKeyRef:
              name: radarr-api-key
              key: API_KEY
        sonarr:
          url: "http://sonarr.media.svc:8989"
          apiKey:
            secretKeyRef:
              name: sonarr-api-key
              key: API_KEY

    # Split the worker fleet so the GPU-bound transcode activity runs in its
    # own pod. The general worker handles everything else (workflow
    # orchestration, file moves, Radarr/Sonarr import). Each entry produces a
    # separate Deployment with its own task queue subscription.
    workers:
      general:
        activities:
          - all
          - "!transcode"
      transcode:
        activities:
          - transcode

    resources:
      # Single ServiceAccount used for the kubernetes join method on tbot in
      # every controller — referenced by the TeleportProvisionToken's
      # kubernetes.allow.service_account: "media:media-processor".
      serviceAccount:
        media-processor: {}

      controllers:
        watcher:
          serviceAccount:
            identifier: media-processor
          pod:
            labels:
              # Ingress allow into temporal-frontend:7233.
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
              # Egress allow to the teleport-cluster proxy TLS-routing port.
              endpoints.netpols.home.arpa/teleport-bot-client: "true"
          # Native sidecar (initContainer with restartPolicy: Always) — k8s
          # blocks the watcher container until tbot has started, guaranteeing
          # the JWT exists before the watcher tries to call Temporal.
          initContainers:
            tbot: &tbot_container
              dependsOn: []
              restartPolicy: Always
              image:
                repository: public.ecr.aws/gravitational/tbot-distroless
                tag: 18.7.6
              args:
                - start
                - --config
                - /etc/tbot/tbot.yaml
                - --diag-addr
                - :4444
              env:
                # Override tbot's hard-coded default
                # (/var/run/secrets/kubernetes.io/serviceaccount/token) so the
                # kubernetes join method reads the audience-scoped projected
                # token mounted via the sa-token persistence entry.
                KUBERNETES_TOKEN_PATH: /var/run/secrets/tokens/token
              ports:
                - name: tbot-diag
                  containerPort: 4444
              probes:
                liveness: &probe
                  enabled: true
                  type: HTTP
                  port: tbot-diag
                  path: /livez
                readiness:
                  <<: *probe
                  path: /readyz
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 64Mi

        # KEDA scales each worker from 0 → maxReplicaCount based on Temporal
        # task-queue backlog; one trigger per resolved activity task queue
        # (plus a workflow-typed trigger when activities resolve to include
        # workflow). Pods exit after WORKER_IDLE_EXIT_AFTER (chart default 5m,
        # or 15m when activities include workflow) so a quiet queue collapses
        # to zero without leaving idle workers running. maxReplicaCount caps
        # concurrency at the previous deployment's replicas=2 — for transcode
        # the cap matters (single Intel Arc GPU); for general it preserves
        # the prior capacity envelope until we have data to relax it.
        general:
          type: scaledjob
          keda:
            maxReplicaCount: 2
            # Spawn a new pod when any general activity queue's backlog hits
            # 50. The worker binary doesn't currently expose Temporal SDK
            # MaxConcurrent* knobs, so per-pod concurrency stays at the SDK
            # default (1000) — targetQueueSize is the only ceiling. Setting
            # it to 50 means one pod is expected to absorb ~50 backlog items
            # before KEDA spins up a second; the SDK default leaves ample
            # headroom for that. Revisit if the binary grows a real per-pod
            # cap or if the 1000-default starts saturating CPU/memory.
            targetQueueSize: 50
          serviceAccount:
            identifier: media-processor
          pod:
            labels: &worker_pod_labels
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
              endpoints.netpols.home.arpa/teleport-bot-client: "true"
          initContainers:
            tbot: *tbot_container

        transcode:
          type: scaledjob
          keda:
            # Three hosts with A40 Pro GPUs and the per-node anti-affinity below
            # mean each pod ends up on a different node, getting full transcoding
            # performance without contending with other transcode pods for resource.
            maxReplicaCount: 3
            # Strict 1:1 pod-to-transcode behavior: KEDA spawns a fresh pod
            # for every queued transcode (up to maxReplicaCount). Transcodes usually
            # take > 50% but < 100% of available accelerator hardware, so this means
            # that the first three transcode jobs will run as fast as possible, but
            # jobs 4-6 can run with degraded performance.
            targetQueueSize: 1
            # Keep only the last 3 finished Jobs around for debug; ttl below
            # bounds how long any individual finished Job lingers.
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 3
          job:
            ttlSecondsAfterFinished: 900
          serviceAccount:
            identifier: media-processor
          pod:
            labels: *worker_pod_labels
            resourceClaims:
              - name: gpu
                resourceClaimTemplateName: media-processor-transcode-gpu
            # The cluster-level PodTopologySpread default in talconfig.yaml only
            # auto-derives a labelSelector from Service / RC / ReplicaSet /
            # StatefulSet owners — Jobs (and therefore KEDA ScaledJob pods) are
            # not in that list, so the scheduler attaches no constraint to these
            # pods. Pin one-per-node explicitly via anti-affinity instead.
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - topologyKey: kubernetes.io/hostname
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: media-processor
                        app.kubernetes.io/controller: transcode
          initContainers:
            tbot:
              <<: *tbot_container
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                # Needed for the JWT file to be readable by UID 0 in the worker container
                runAsUser: 0
                runAsNonRoot: false
          containers:
            # The chart names the worker container "main" regardless of the
            # workers.<key>.
            main:
              securityContext:
                capabilities:
                  add:
                    - PERFMON
                # Needed to access performance counters for hardware-accelerated transcoding, which
                # is required for load-based scheduling to work.
                # Actual "root" access is limited to PERFMON capabilities.
                runAsUser: 0
                runAsNonRoot: false
              resources:
                claims:
                  - name: gpu

      defaultPodOptions:
        dnsConfig:
          options:
            - name: ndots
              value: "1"

      persistence:
        # Shared between tbot and watcher/worker: tbot writes the JWT, the app
        # reads it on every Temporal RPC.
        tbot-jwt:
          type: emptyDir
          advancedMounts:
            watcher:
              tbot:
                - path: /var/run/teleport/jwt
              watcher:
                - path: /var/run/teleport/jwt
                  readOnly: true
            general: &tbot_jwt_worker_mount
              tbot:
                - path: /var/run/teleport/jwt
              main:
                - path: /var/run/teleport/jwt
                  readOnly: true
            transcode: *tbot_jwt_worker_mount
        tbot-config:
          type: configMap
          name: media-processor-tbot-config
          defaultMode: 0444
          items:
            - key: tbot.yaml
              path: tbot.yaml
          advancedMounts:
            watcher: &tbot_config_volume_mount
              tbot:
                - path: /etc/tbot
                  readOnly: true
            general: *tbot_config_volume_mount
            transcode: *tbot_config_volume_mount
        # Cluster intermediate-CA root, distributed to every namespace by the
        # extract-root-ca-certificate Kyverno ClusterPolicy. tbot needs this
        # to validate the Teleport proxy's serving cert.
        tbot-root-ca:
          type: secret
          name: root-ca-pub-cert
          defaultMode: 0444
          items:
            - key: ca.pem
              path: root-ca.pem
          advancedMounts:
            watcher: &tbot_root_ca_volume_mount
              tbot:
                - path: /etc/ssl/certs/root-ca.pem
                  subPath: root-ca.pem
                  readOnly: true
            general: *tbot_root_ca_volume_mount
            transcode: *tbot_root_ca_volume_mount
        # Audience-scoped, short-lived projected SA token used by tbot's
        # kubernetes (in_cluster) join method. The kubelet refreshes the file
        # in place at 80% of TTL; tbot re-reads on every join/renewal. The
        # narrow audience limits blast radius if the token ever leaks — it can
        # only be presented to TokenReview calls asserting the Teleport
        # cluster's audience.
        sa-token:
          type: custom
          volumeSpec:
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    expirationSeconds: 600
                    audience: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
          advancedMounts:
            watcher: &sa_token_volume_mount
              tbot:
                - path: /var/run/secrets/tokens
                  readOnly: true
            general: *sa_token_volume_mount
            transcode: *sa_token_volume_mount
