---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: media-processor
spec:
  interval: 5m
  chart:
    spec:
      chart: media-processor
      version: 0.0.17
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: soliddowant-charts
  values:
    config:
      temporal:
        # In-cluster plaintext gRPC; auth is JWT bearer (apiKey below).
        address: temporal-frontend.data.svc.cluster.local:7233
        # Maps to the Temporal namespace auto-created by temporal-namespace-manager
        # (k8s namespace "media" carries temporal.home.arpa/enabled=true).
        namespace: media
        taskQueue: media-processor
        # file:/// prefix tells the app worker to re-read the JWT from disk
        # on every RPC. tbot rotates the JWT well before expiry, so the worker
        # picks up new tokens without restart.
        apiKey:
          value: file:///var/run/teleport/jwt/jwt_svid

      # Full NFS restricted to the downloads subtree — watcher gets read-only, worker read-write.
      inputVolume:
        type: nfs
        server: ${NFS_ADDRESS}
        path: ${NFS_MEDIA_PATH}
        subPath: downloads

      watcher:
        watches:
          - name: bittorrent-movies
            watchedPath: /media/input/bittorrent/Movies
            mediaType: movie
            output: &movie_output
              volumeName: media
              mountPath: /media/output/movies
              subPath: converted/Movies
              remotePath: /mnt/complete
            preserveSource: true
            ignorePatterns: &qbittorrent_ignore
              - "\\.!qB$" # qbittorrent incomplete downloads
          - name: bittorrent-shows
            watchedPath: /media/input/bittorrent/Series
            mediaType: show
            output: &show_output
              volumeName: media
              mountPath: /media/output/shows
              subPath: converted/Shows
              remotePath: /mnt/complete
            preserveSource: true
            ignorePatterns: *qbittorrent_ignore
          - name: usenet-movies
            watchedPath: /media/input/usenet/Movies
            mediaType: movie
            output: *movie_output
            preserveSource: false
            ignorePatterns: &nzbget_ignore
              - "(^|/)_unpack(/|$)" # nzbget in-progress extraction directories
              - (?:^|/)[0-9a-zA-Z]{32}\.[^/]+$ # hashed temp names of moved files pending rename. This is less than ideal, but the only realistic workaround
          - name: usenet-shows
            watchedPath: /media/input/usenet/Series
            mediaType: show
            output: *show_output
            preserveSource: false
            ignorePatterns: *nzbget_ignore
        volumes:
          media:
            type: nfs
            server: ${NFS_ADDRESS}
            path: ${NFS_MEDIA_PATH}
        metrics:
          enabled: true

      worker:
        metrics:
          enabled: true
        radarr:
          url: "http://radarr.media.svc:7878"
          apiKey:
            secretKeyRef:
              name: radarr-api-key
              key: API_KEY
        sonarr:
          url: "http://sonarr.media.svc:8989"
          apiKey:
            secretKeyRef:
              name: sonarr-api-key
              key: API_KEY

    # Split the worker fleet so the GPU-bound transcode activity runs in its
    # own pod. The general worker handles everything else (workflow
    # orchestration, file moves, Radarr/Sonarr import). Each entry produces a
    # separate Deployment with its own task queue subscription.
    workers:
      general:
        activities:
          - all
          - "!transcode"
      transcode:
        activities:
          - transcode

    resources:
      # Single ServiceAccount used for the kubernetes join method on tbot in
      # every controller — referenced by the TeleportProvisionToken's
      # kubernetes.allow.service_account: "media:media-processor".
      serviceAccount:
        media-processor: {}

      controllers:
        watcher:
          serviceAccount:
            identifier: media-processor
          pod:
            labels:
              # Ingress allow into temporal-frontend:7233.
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
              # Egress allow to the teleport-cluster proxy TLS-routing port.
              endpoints.netpols.home.arpa/teleport-bot-client: "true"
          # Native sidecar (initContainer with restartPolicy: Always) — k8s
          # blocks the watcher container until tbot has started, guaranteeing
          # the JWT exists before the watcher tries to call Temporal.
          initContainers:
            tbot: &tbot_container
              dependsOn: []
              restartPolicy: Always
              image:
                repository: public.ecr.aws/gravitational/tbot-distroless
                tag: 18.7.6
              args:
                - start
                - --config
                - /etc/tbot/tbot.yaml
                - --diag-addr
                - :4444
              ports:
                - name: tbot-diag
                  containerPort: 4444
              probes:
                liveness: &probe
                  enabled: true
                  type: HTTP
                  port: tbot-diag
                  path: /livez
                readiness:
                  <<: *probe
                  path: /readyz
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 64Mi

        general:
          replicas: 2
          serviceAccount:
            identifier: media-processor
          pod:
            labels: &worker_pod_labels
              endpoints.netpols.home.arpa/temporal-frontend-client: "true"
              endpoints.netpols.home.arpa/teleport-bot-client: "true"
          initContainers:
            tbot: *tbot_container

        transcode:
          replicas: 2
          serviceAccount:
            identifier: media-processor
          pod:
            labels: *worker_pod_labels
            resourceClaims:
              - name: gpu
                resourceClaimTemplateName: media-processor-transcode-gpu
          initContainers:
            tbot:
              <<: *tbot_container
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                # Needed for the JWT file to be readable by UID 0 in the worker container
                runAsUser: 0
                runAsNonRoot: false
          containers:
            # The chart names the worker container "main" regardless of the
            # workers.<key>.
            main:
              securityContext:
                capabilities:
                  add:
                    - PERFMON
                # Needed to access performance counters for hardware-accelerated transcoding, which
                # is required for load-based scheduling to work.
                # Actual "root" access is limited to PERFMON capabilities.
                runAsUser: 0
                runAsNonRoot: false
              resources:
                claims:
                  - name: gpu

      defaultPodOptions:
        dnsConfig:
          options:
            - name: ndots
              value: "1"

      persistence:
        # Shared between tbot and watcher/worker: tbot writes the JWT, the app
        # reads it on every Temporal RPC.
        tbot-jwt:
          type: emptyDir
          advancedMounts:
            watcher:
              tbot:
                - path: /var/run/teleport/jwt
              watcher:
                - path: /var/run/teleport/jwt
                  readOnly: true
            general: &tbot_jwt_worker_mount
              tbot:
                - path: /var/run/teleport/jwt
              main:
                - path: /var/run/teleport/jwt
                  readOnly: true
            transcode: *tbot_jwt_worker_mount
        tbot-config:
          type: configMap
          name: media-processor-tbot-config
          defaultMode: 444
          items:
            - key: tbot.yaml
              path: tbot.yaml
          advancedMounts:
            watcher: &tbot_config_volume_mount
              tbot:
                - path: /etc/tbot
                  readOnly: true
            general: *tbot_config_volume_mount
            transcode: *tbot_config_volume_mount
        # Cluster intermediate-CA root, distributed to every namespace by the
        # extract-root-ca-certificate Kyverno ClusterPolicy. tbot needs this
        # to validate the Teleport proxy's serving cert.
        tbot-root-ca:
          type: secret
          name: root-ca-pub-cert
          defaultMode: 444
          items:
            - key: ca.pem
              path: root-ca.pem
          advancedMounts:
            watcher: &tbot_root_ca_volume_mount
              tbot:
                - path: /etc/ssl/certs/root-ca.pem
                  subPath: root-ca.pem
                  readOnly: true
            general: *tbot_root_ca_volume_mount
            transcode: *tbot_root_ca_volume_mount
