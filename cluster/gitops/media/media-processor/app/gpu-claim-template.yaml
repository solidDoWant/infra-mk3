---
# Provides the Intel Arc Pro GPU to the transcode worker pod via DRA. The
# general worker is GPU-less; only the transcode-specialised worker references
# this template. The worker auto-detects the device path; no
# MEDIA_HARDWARE_DEVICE_PATH env var is needed.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: media-processor-transcode-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            # adminAccess avoids consuming the node's single GPU allocation slot,
            # since the transcode worker is not the only consumer (fileflows
            # also uses it).
            adminAccess: true
            allocationMode: All
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].family == 'Arc Pro'
