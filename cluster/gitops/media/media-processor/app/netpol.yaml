---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: media-processor
specs:
  - description: watcher
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: media-processor
        app.kubernetes.io/controller: watcher
        app.kubernetes.io/instance: media-processor
    egress:
      # DNS resolution — required for cluster DNS lookups
      - &dns_resolution
        toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: "*"
      # Temporal frontend — watcher dispatches workflows via gRPC
      - &temporal_frontend_egress
        toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: data
              app.kubernetes.io/name: temporal
              app.kubernetes.io/instance: temporal
              app.kubernetes.io/component: frontend
        toPorts:
          - ports:
              - port: "7233"
                protocol: TCP
      # Teleport proxy — tbot sidecar joins the cluster and renews JWT-SVIDs
      # over the proxy's TLS-routing port (multiplex). Resolved via the
      # public hostname which the proxy Service annotates back to its
      # in-cluster LB IP, so traffic stays in-cluster.
      - &teleport_proxy_egress
        toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: security
              app.kubernetes.io/name: teleport-cluster
              app.kubernetes.io/instance: teleport-cluster
              app.kubernetes.io/component: proxy
        toPorts:
          - ports:
              - port: tls
                protocol: TCP
    ingress:
      # Kubelet health probes — liveness/readiness on watcher health port
      - fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8081"
                protocol: TCP
      # Victoria Metrics agent — Prometheus metrics scraping
      - fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9091"
                protocol: TCP

  # General worker — runs every activity except transcode (workflow
  # orchestration, file moves, Radarr/Sonarr import).
  - description: general worker
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: media-processor
        app.kubernetes.io/controller: general
        app.kubernetes.io/instance: media-processor
    egress:
      - *dns_resolution
      # Temporal frontend — worker polls task queue and reports completions
      - *temporal_frontend_egress
      # Teleport proxy — same purpose as watcher, see above
      - *teleport_proxy_egress
      # Radarr — notifies Radarr to import transcoded movie files
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: radarr
              app.kubernetes.io/controller: radarr
              app.kubernetes.io/instance: radarr
        toPorts:
          - ports:
              - port: "7878"
                protocol: TCP
      # Sonarr — notifies Sonarr to import transcoded show files
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: sonarr
              app.kubernetes.io/controller: sonarr
              app.kubernetes.io/instance: sonarr
        toPorts:
          - ports:
              - port: "8989"
                protocol: TCP
    ingress:
      # Kubelet health probes — liveness/readiness on worker health port
      - &worker_kubelet_ingress
        fromEntities:
          - host
        toPorts:
          - ports:
              - port: "8080"
                protocol: TCP
      # Victoria Metrics agent — Prometheus metrics scraping
      - &worker_metrics_ingress
        fromEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: monitoring
              endpoints.netpols.home.arpa/metrics-scraper: "true"
        toPorts:
          - ports:
              - port: "9090"
                protocol: TCP

  # Transcode worker — GPU-bound transcode activity only. Doesn't touch
  # Radarr/Sonarr (those calls live in the import activities, which run on
  # the general worker).
  - description: transcode worker
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: media-processor
        app.kubernetes.io/controller: transcode
        app.kubernetes.io/instance: media-processor
    egress:
      - *dns_resolution
      - *temporal_frontend_egress
      - *teleport_proxy_egress
    ingress:
      - *worker_kubelet_ingress
      - *worker_metrics_ingress
