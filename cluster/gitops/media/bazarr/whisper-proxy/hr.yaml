---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr-whisper-proxy
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      bazarr-whisper-proxy:
        containers:
          app:
            image:
              repository: ghcr.io/soliddowant/bazarr-whisper-proxy
              tag: 0.0.12
            env:
              # Upstream ASR — OpenAI-compatible /v1/audio/transcriptions on openarc-subtitles.
              OPENARC_BASE_URL: http://openarc-subtitles.media.svc.cluster.local:8000
              # Must match openarc-subtitles's OPENARC_AUTOLOAD_MODEL (see openarc/subtitles/hr.yaml).
              OPENARC_MODEL: qwen3-asr-0_6b-int8-asym
              # Lingarr translation backend (task=translate). Uses the public
              # gateway hostname instead of the in-cluster service URL so all
              # Lingarr API access goes through a single TLS-terminating
              # ingress. Routes through the internal-gateway only — the
              # hostname is internal-DNS-only and not reachable from outside
              # the home network.
              LINGARR_BASE_URL: https://lingarr.media.svc.cluster.local:8080
              LINGARR_API_KEY:
                secretKeyRef:
                  name: bazarr-whisper-proxy-lingarr
                  key: API_KEY
              LOG_FORMAT: json
              # Flush stdout immediately so logs aren't held until shutdown.
              PYTHONUNBUFFERED: "1"
              MAX_AUDIO_BYTES: "536870912" # 512 MiB
            ports:
              - name: web
                # App binds 0.0.0.0:9000 (hardcoded in whisper_proxy.__main__).
                containerPort: &container_port 9000
            probes:
              liveness:
                # /healthz is a cheap local check — don't restart the pod just
                # because OpenArc is reloading its model.
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *container_port
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *container_port
                  timeoutSeconds: 5
              startup:
                # First-time OpenArc model load is 6–8 min (see openarc/subtitles/hr.yaml
                # timeout). 60 * 10s = 10 min before the pod is killed.
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: *container_port
                  timeoutSeconds: 5
                  failureThreshold: 60
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                memory: 4Gi
              claims:
                - name: gpu
    defaultPodOptions:
      securityContext:
        # The image sets no User; force non-root at the pod level.
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: whisper-proxy-gpu
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    persistence:
      # Server reads multipart data files into /tmp.
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      bazarr-whisper-proxy:
        controller: bazarr-whisper-proxy
        ports:
          web:
            port: *container_port
            primary: true
