---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bazarr-whisper-proxy
specs:
  - description: bazarr-whisper-proxy
    endpointSelector:
      matchLabels:
        app.kubernetes.io/name: bazarr-whisper-proxy
        app.kubernetes.io/controller: bazarr-whisper-proxy
        app.kubernetes.io/instance: bazarr-whisper-proxy
    egress:
      # DNS resolution
      - toEndpoints:
          - matchLabels:
              io.kubernetes.pod.namespace: networking
              endpoints.netpols.home.arpa/cluster-dns: "true"
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
            rules:
              dns:
                - matchPattern: openarc-subtitles.media.svc.cluster.local
                - matchPattern: lingarr.media.svc.cluster.local
      # OpenArc — OpenAI-compatible ASR. The proxy POSTs WAV-wrapped audio
      # to /v1/audio/transcriptions and reads /openarc/status for readiness.
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: openarc-subtitles
              app.kubernetes.io/controller: openarc-subtitles
              app.kubernetes.io/instance: openarc-subtitles
        toPorts:
          - ports:
              - port: "8000"
                protocol: TCP
      # Lingarr translation backend
      - toEndpoints:
          - matchLabels:
              app.kubernetes.io/name: lingarr
              app.kubernetes.io/controller: lingarr
              app.kubernetes.io/instance: lingarr
        toPorts:
          - ports:
              - port: "9876"
                protocol: TCP
    ingress:
      # Kubelet for liveness/readiness/startup probes.
      - fromEntities:
          - host
        toPorts: &web_port
          - ports:
              - port: "9000"
                protocol: TCP
      # Bazarr WhisperAI provider — POSTs /asr and /detect-language here.
      - fromEndpoints:
          - matchLabels:
              app.kubernetes.io/name: bazarr
              app.kubernetes.io/controller: bazarr
              app.kubernetes.io/instance: bazarr
        toPorts: *web_port
