---
apiVersion: v1
kind: Secret
metadata:
  name: authentik-bazarr-application-blueprint
  labels:
    k8s-sidecar.home.arpa/application: authentik
type: Opaque
stringData:
  # Unfortunately this must be a secret (rather than secretGenerator) or Flux will not substitute
  # values within it
  authentik-bazarr-application-blueprint.yaml: |
    ---
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: Bazarr application
      labels:
        blueprints.goauthentik.io/description: Resources for Bazarr SSO
    entries:
      # Dependencies
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Implicit provider authentication
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Password authentication flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Invalidation flow
          required: true
      - model: authentik_blueprints.metaapplyblueprint
        attrs:
          identifiers:
            name: Blueprint library
          required: true
      # Application
      - model: authentik_providers_proxy.proxyprovider
        id: bazarr-provider
        identifiers:
          name: Bazarr
        attrs:
          name: Bazarr
          mode: forward_single
          external_host: https://bazarr.${SECRET_PUBLIC_DOMAIN_NAME}
          intercept_header_auth: true
          authentication_flow:
            !Find [authentik_flows.flow, [slug, password-authentication-flow]]
          authorization_flow:
            !Find [authentik_flows.flow, [slug, implicit-authorization-flow]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, invalidation-flow]]
          # Long-lived to avoid mid-session proxy-cookie renewal, which breaks the
          # SPA's XHR/SignalR traffic via CORS on stock authentik (no PR #17233).
          # Renewal then happens on a normal page load instead.
          access_token_validity: days=7
          refresh_token_validity: days=30
          property_mappings:
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: Application Entitlements"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'email'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'openid'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: OpenID 'profile'"],
              ]
            - !Find [
                authentik_providers_oauth2.scopemapping,
                [name, "authentik default OAuth Mapping: Proxy outpost reduced"],
              ]
      - model: authentik_core.application
        id: bazarr-application
        identifiers:
          slug: bazarr
        attrs:
          name: Bazarr
          slug: bazarr
          group: Downloads access
          provider: !KeyOf bazarr-provider
          policy_engine_mode: any
          meta_launch_url: https://bazarr.${SECRET_PUBLIC_DOMAIN_NAME}
          # icon: # TODO
      # Groups
      - model: authentik_core.group
        id: bazarr-group
        identifiers:
          name: Bazarr access
        attrs:
          attributes:
            discord_role_id: "${SECRET_AUTHENTIK_BAZARR_DISCORD_ROLE_ID}"
      - model: authentik_policies.policybinding
        identifiers:
          order: 0
          group: !KeyOf bazarr-group
          target: !KeyOf bazarr-application
