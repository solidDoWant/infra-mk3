---
# Proxies Bazarr's plaintext psycopg2 connection (127.0.0.1:5432) to the
# postgres cluster with mTLS via Envoy's postgres_proxy filter. Uses
# file-based SDS for the client cert and validation context so cert rotations
# are hot-reloaded without a pod restart (cert files live in projected k8s
# Secrets — inotify on the mount directory picks up the atomic ..data swap).
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 8000

node:
  id: envoy-bazarr-postgres-proxy
  cluster: media

static_resources:
  clusters:
    - name: postgres_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      load_assignment:
        cluster_name: postgres_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: bazarr-postgres-rw.media.svc.cluster.local
                      port_value: 5432
      health_checks:
        - timeout: 1s
          interval: 3s
          unhealthy_threshold: 2
          healthy_threshold: 1
          tcp_health_check: {}
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: postgres_upstream_tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.starttls.v3.UpstreamStartTlsConfig
          tls_socket_config:
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_3
                tls_maximum_protocol_version: TLSv1_3
              tls_certificate_sds_secret_configs:
                - name: postgres_client_cert
                  sds_config:
                    resource_api_version: V3
                    path_config_source:
                      path: /etc/envoy/postgres-client-cert-sds.yaml
                      watched_directory:
                        path: /etc/envoy/secrets/postgres
              validation_context_sds_secret_config:
                name: postgres_serving_cert
                sds_config:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/postgres-validation-context-sds.yaml
                    watched_directory:
                      path: /etc/envoy/secrets/root-ca
            auto_host_sni: true
            auto_sni_san_validation: true
      close_connections_on_host_health_failure: true
      ignore_health_on_host_removal: true

  listeners:
    - name: postgres_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 5432
      filter_chains:
        - filters:
            - name: envoy.filters.network.postgres_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.postgres_proxy.v3alpha.PostgresProxy
                stat_prefix: egress_postgres
                enable_sql_parsing: false
                upstream_ssl: REQUIRE
            - name: envoy.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_postgres
                cluster: postgres_cluster
                # Let psycopg2 manage idle connections; Envoy idle teardown
                # has caused stale-connection errors in similar apps.
                idle_timeout: 0s
