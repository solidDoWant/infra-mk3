---
# Exclusive claim — openarc holds VRAM continuously, unlike
# media-processor/fileflows which use adminAccess to ride along.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: openarc-gpu
spec:
  spec:
    devices:
      requests:
        - name: gpu
          exactly:
            deviceClassName: gpu.intel.com
            selectors:
              - cel:
                  expression: device.attributes["gpu.intel.com"].family == 'Arc Pro'
