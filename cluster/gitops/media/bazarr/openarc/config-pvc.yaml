---
# Holds /app/openarc_config.json — populated by the model-download Job
# (Helm pre-install/pre-upgrade hook) via `openarc add`, then mounted
# read-only by the openarc Deployment via subPath. The Job and the
# Deployment never run concurrently (Helm waits for the hook Job to
# complete before applying the rest of the chart), so RWO is fine.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openarc-config
spec:
  storageClassName: ssd-replicated-3x
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
