---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bazarr-openarc
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        namespace: flux-system
        name: bjw-s-charts
      version: 4.6.2
  values:
    controllers:
      openarc:
        replicas: 1
        # Release the GPU device cleanly between revisions.
        strategy: Recreate
        containers:
          openarc:
            image:
              repository: ghcr.io/soliddowant/openarc
              tag: 2.0.4
              pullPolicy: Always
            securityContext:
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            env:
              OPENARC_API_KEY:
                secretKeyRef:
                  name: openarc-api-key
                  key: OPENARC_API_KEY
              # Tells our patched openarc to read its config from the image
              # volume mount instead of the venv-relative default.
              OPENARC_CONFIG_FILE: /model/openarc_config.json
              # Must match the modelName baked into the asr-models image's
              # openarc_config.json (= image tag by convention; see
              # container images/openarc-asr-models/flake.nix).
              OPENARC_AUTOLOAD_MODEL: &model_tag qwen3-asr-0_6b-int8-asym
            ports:
              - name: web
                containerPort: &web_port 8000
            probes:
              # TCP probe — keeps the API key out of probe config and avoids
              # depending on undocumented unauthenticated routes.
              # TODO use openarc status command instead
              readiness: &probe
                enabled: true
                type: TCP
                port: *web_port
              liveness: *probe
            resources:
              requests:
                cpu: 500m
                memory: &openarc_memory 2Gi
              limits:
                memory: *openarc_memory
              claims:
                - name: gpu
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: openarc-gpu
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup needed so UID 1000 can write to the persist emptyDir; the
        # image volume is read-only and its baked-in files are world-readable.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    persistence:
      model:
        type: image
        image:
          repository: ghcr.io/soliddowant/openarc-asr
          tag: *model_tag
        pullPolicy: IfNotPresent
        advancedMounts:
          openarc:
            openarc:
              - path: /model
                readOnly: true
      # OpenArc writes benchmark SQLite under /persist; without this mount
      # the readOnlyRootFilesystem would block it.
      persist:
        type: emptyDir
        advancedMounts:
          openarc:
            openarc:
              - path: /persist
    service:
      openarc:
        controller: openarc
        ports:
          web:
            port: *web_port
            primary: true
