---
# Register Coder as a Teleport application (app access). This lives alongside
# Coder; the copy-teleport-crs-to-security-namespace Kyverno policy clones it into
# the security namespace where the Teleport operator runs. The teleport-agent's
# app_service (appResources matcher on the label below) then proxies it.
#
# Public access is 100% through Teleport: users reach it at coder.teleport.<domain>
# (the *.teleport wildcard route -> proxy -> app access -> this internal URI).
# Coder's own coder.<domain> stays internal-only, so nothing bypasses Teleport.
apiVersion: resources.teleport.dev/v1
kind: TeleportAppV3
metadata:
  name: coder
  labels:
    teleport.home.arpa/app.enabled: "true"
spec:
  uri: "http://coder.development.svc.cluster.local"
  public_addr: coder.teleport.${SECRET_PUBLIC_DOMAIN_NAME}
