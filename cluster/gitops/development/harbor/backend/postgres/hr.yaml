---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor-postgres
spec:
  interval: 5m
  chart:
    spec:
      chart: ./cluster/charts/postgres/cluster
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        namespace: flux-system
        name: infra-mk3
  values:
    clusterName: harbor
    teleportDomainName: teleport.${SECRET_PUBLIC_DOMAIN_NAME}
    certificates:
      client:
        ca:
          subject: &subject
            countries:
              - US
            provinces:
              - ${SECRET_STATE}
            organizations:
              - infra-mk3
      serving:
        issuerRef:
          name: development-intermediary-ca
        subject: *subject
    users:
      harbor:
        username: harbor
        # Harbor's envoy sidecars consume this client cert via file-based SDS
        # (watched_directory), so cert-manager rotations hot-reload without a
        # restart -- the Kyverno workload-reloader restart is unnecessary and was
        # the source of ~45-min pod churn. Drops the cnpg.io/reload label so the
        # reloader no longer matches this cert secret.
        disableReloading: true
    bucket:
      endpoint: https://s3.${SECRET_PUBLIC_DOMAIN_NAME}
    netpol:
      applicationAccess:
        selectors:
          - matchLabels:
              app.kubernetes.io/name: harbor
              app.kubernetes.io/component: core
              app.kubernetes.io/instance: harbor
          - matchLabels:
              app.kubernetes.io/name: harbor
              app.kubernetes.io/component: jobservice
              app.kubernetes.io/instance: harbor
          - matchLabels:
              app.kubernetes.io/name: harbor
              app.kubernetes.io/component: exporter
              app.kubernetes.io/instance: harbor
