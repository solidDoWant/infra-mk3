---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "cluster-resource-name" . }}
specs:
  - description: instances
    endpointSelector:
      matchLabels:
        cnpg.io/cluster: {{ include "cluster-resource-name" . }}
        cnpg.io/podRole: instance
    egress:
      - toEndpoints:
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/podRole: instance
        toPorts:
          - ports:
              # Replication between primary and replicas
              - port: postgresql
                protocol: TCP
              # Status checks between primary and replicas
              - port: status
                protocol: TCP
      # DNS resolution
      - toEndpoints:
          - {{ .Values.netpol.dns.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
      {{- if .Values.bucket.endpoint }}
      # Access to S3 for WAL archiving
      - toEndpoints:
          - {{ .Values.netpol.bucket.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: {{ include "bucket.port" . }}
                protocol: TCP
      {{- end }}
      # Access k8s resources (e.g. serving and client CA certificate secrets)
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
    ingress:
      # Status check
      - fromEntities:
          # kubelet for healthcheck
          - host
        toPorts: &status_ports
          - ports:
              - port: status
                protocol: TCP
      - fromEndpoints:
          # Operator access for maintenance
          - {{ .Values.netpol.operator.selector | toYaml | nindent 12 | trim }}
        toPorts: *status_ports
      # Postgres client access
      - fromEndpoints:
          # Replication between primary and replicas
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/podRole: instance
          # Replica joining
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/jobRole: join
          # Configuration and maintenance from the operator
          - {{ .Values.netpol.operator.selector | toYaml | nindent 12 | trim }}
          # Access from Teleport
          - {{ .Values.netpol.teleportAccess.selector | toYaml | nindent 12 | trim }}
          {{- if .Values.netpol.applicationAccess.selector }}
          # Access from the application
          - {{ .Values.netpol.applicationAccess.selector | toYaml | nindent 12 | trim }}
          {{- end }}
          {{- if .Values.netpol.applicationAccess.selectors }}
          # Access from applications
          {{ .Values.netpol.applicationAccess.selectors | toYaml | nindent 10 | trim }}
          {{- end }}
          {{- if .Values.pooler.enabled }}
          # Access from PgBouncer
          - matchLabels:
              cnpg.io/poolerName: {{ include "pooler-name" . }}
          {{- end }}
        toPorts:
          - ports:
              - port: postgresql
                protocol: TCP
      # Metrics
      - fromEndpoints:
          - {{ .Values.netpol.metricsScraper.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: metrics
                protocol: TCP
      # Status check from other instances
      - fromEndpoints:
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/podRole: instance
        toPorts: *status_ports
  - description: initdb
    endpointSelector:
      matchLabels:
        cnpg.io/cluster: {{ include "cluster-resource-name" . }}
        cnpg.io/jobRole: initdb
    egress:
      # Kubelet to get cluster info
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
  - description: join
    endpointSelector:
      matchLabels:
        cnpg.io/cluster: {{ include "cluster-resource-name" . }}
        cnpg.io/jobRole: join
    egress:
      # DNS resolution
      - toEndpoints:
          - {{ .Values.netpol.dns.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
      # Kubelet to get cluster info
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
      # Allow access to other instances
      - toEndpoints:
          # Replication between primary and replicas
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/podRole: instance
        toPorts:
          - ports:
              - port: postgresql
                protocol: TCP
  {{- if .Values.pooler.enabled }}
  - description: pooler
    endpointSelector:
      matchLabels:
        cnpg.io/poolerName: {{ include "pooler-name" . }}
    egress:
      # DNS resolution
      - toEndpoints:
          - {{ .Values.netpol.dns.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: "53"
                protocol: UDP
              - port: "53"
                protocol: TCP
      # PostgreSQL connections to cluster instances
      - toEndpoints:
          - matchLabels:
              cnpg.io/cluster: {{ include "cluster-resource-name" . }}
              cnpg.io/podRole: instance
        toPorts:
          - ports:
              - port: postgresql
                protocol: TCP
      # Access k8s resources (e.g. TLS certificate secrets)
      - toEntities:
          - kube-apiserver
        toPorts:
          - ports:
              - port: "6443"
                protocol: TCP
    ingress:
      # Kubelet health probes
      - fromEntities:
          - host
        toPorts: &pooler_client_port
          - ports:
              - port: "5432"
                protocol: TCP
      # Client access (same selectors as direct cluster access)
      {{- if .Values.netpol.applicationAccess.selector }}
      - fromEndpoints:
          - {{ .Values.netpol.applicationAccess.selector | toYaml | nindent 12 | trim }}
        toPorts: *pooler_client_port
      {{- end }}
      {{- if .Values.netpol.applicationAccess.selectors }}
      - fromEndpoints:
          {{ .Values.netpol.applicationAccess.selectors | toYaml | nindent 10 | trim }}
        toPorts: *pooler_client_port
      {{- end }}
      # Metrics scraping
      - fromEndpoints:
          - {{ .Values.netpol.metricsScraper.selector | toYaml | nindent 12 | trim }}
        toPorts:
          - ports:
              - port: "9127"
                protocol: TCP
  {{- end }}
