{{- if .Values.pooler.rw.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "pooler-rw-name" . }}
spec:
  cluster:
    name: {{ include "cluster-resource-name" . }}
  instances: {{ .Values.pooler.rw.instances }}
  type: rw
  pgbouncer:
    poolMode: {{ .Values.pooler.rw.poolMode }}
    # Cert PgBouncer presents to clients — issued by the same CA as the cluster serving cert.
    clientTLSSecret:
      name: {{ include "pooler-rw-serving-cert-name" . }}
    # CA used to validate incoming client certs — same as the cluster's clientCASecret,
    # so a single client cert works for both direct and pooled connections.
    clientCASecret:
      name: {{ tpl .Values.certificates.clientCA.secretName . }}
    # Client keypair PgBouncer uses when connecting to Postgres (CN = cnpg_pooler_pgbouncer,
    # matched by the pg_ident pooler_map to allow connecting as any user).
    serverTLSSecret:
      name: {{ tpl .Values.pooler.clusterCertSecretName . }}
    # CA used to validate the Postgres server cert (ca.crt from the cluster serving cert secret).
    serverCASecret:
      name: {{ include "serving-cert-name" . }}
    parameters:
      # Require client certificates; the CN is used as the PostgreSQL username.
      # pg_ident pooler_map (added to the Cluster when pooler is enabled) allows
      # cnpg_pooler_pgbouncer's backend cert to connect as any user.
      auth_type: cert
      client_tls_sslmode: verify-full
      {{- with .Values.pooler.rw.parameters }}
      {{- . | toYaml | nindent 6 }}
      {{- end }}
  template:
    spec:
      containers: []
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              cnpg.io/poolerName: {{ include "pooler-rw-name" . }}
{{- end }}
{{- if .Values.pooler.ro.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "pooler-ro-name" . }}
spec:
  cluster:
    name: {{ include "cluster-resource-name" . }}
  instances: {{ .Values.pooler.ro.instances }}
  type: ro
  pgbouncer:
    poolMode: {{ .Values.pooler.ro.poolMode }}
    clientTLSSecret:
      name: {{ include "pooler-ro-serving-cert-name" . }}
    clientCASecret:
      name: {{ tpl .Values.certificates.clientCA.secretName . }}
    serverTLSSecret:
      name: {{ tpl .Values.pooler.clusterCertSecretName . }}
    serverCASecret:
      name: {{ include "serving-cert-name" . }}
    parameters:
      auth_type: cert
      client_tls_sslmode: verify-full
      {{- with .Values.pooler.ro.parameters }}
      {{- . | toYaml | nindent 6 }}
      {{- end }}
  template:
    spec:
      containers: []
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              cnpg.io/poolerName: {{ include "pooler-ro-name" . }}
{{- end }}
