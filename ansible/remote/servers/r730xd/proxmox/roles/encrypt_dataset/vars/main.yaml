---
# cspell:words nabijaczleweli
apt_preferences_dir: /etc/apt/preferences.d
domain_name: debian.nabijaczleweli.xyz
key_path: /usr/share/keyrings/nabijaczleweli-keyring.asc
# Source-only line for the tzpfms repo. Added solely for the duration of a build
# and torn down afterwards, so its (non-tzpfms) sources are never globally visible.
tzpfms_src_repo: deb-src [signed-by={{ key_path }}] https://{{ domain_name }} {{ ansible_distribution_release }} main
backup_path: >-
  {{ ansible_env.HOME }}/{{ dataset_name | replace('/', '_') }}.backup
dataset_name_escaped: >-
  {{ dataset_name | replace('/', '-') }}