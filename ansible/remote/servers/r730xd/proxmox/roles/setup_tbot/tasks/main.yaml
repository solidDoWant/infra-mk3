---
# Machine tbot — see defaults/main.yaml for the role/config split.

- name: Install dependencies
  ansible.builtin.apt:
    name:
      # The unit's ExecStartPost readiness gate (`curl .../wait`)
      - curl
    state: present
    update_cache: true
    cache_valid_time: 600

- name: Create the config directory
  ansible.builtin.file:
    path: "{{ tbot_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: 0750

- name: Install the tbot config
  ansible.builtin.template:
    src: tbot.yaml.j2
    dest: "{{ tbot_config_path }}"
    owner: root
    group: root
    mode: 0640
  notify: Restart tbot

- name: Install the tbot systemd unit
  ansible.builtin.template:
    src: tbot.service.j2
    dest: /etc/systemd/system/{{ tbot_unit_name }}.service
    owner: root
    group: root
    mode: 0644
  notify: Restart tbot

# The Teleport proxy runs in the k8s cluster and is the one external
# dependency of service startup: the unit's start job blocks on a successful
# join (ExecStartPost readiness gate), so `state: started` FAILS outright
# while the cluster is down. Probe the proxy's unauthenticated ping endpoint
# — the same host:port the TPM join dials — and degrade to enable-only when
# it's unreachable, so a later cluster recovery + reboot (or rerun) still
# converges instead of leaving half-enabled units behind. The fact is also
# consumed by dependent roles (e.g. setup_tape_archiver) to gate their own
# service starts.
- name: Check whether the Teleport proxy is reachable
  ansible.builtin.uri:
    url: https://{{ teleport_domain_name }}/webapi/ping
    timeout: 5
  register: tbot_teleport_ping
  failed_when: false

- name: Record cluster availability
  ansible.builtin.set_fact:
    teleport_cluster_available: "{{ tbot_teleport_ping.status | default(0) == 200 }}"

# --check doesn't actually write the unit template above, so on a FIRST
# install `systemctl enable/start` would fail ("unit not found") and abort the
# dry-run. Gate on the unit already existing OR a real run: a real run always
# writes the unit first (so it runs), a check run on an already-installed host
# still previews these, and a first-install dry-run skips them cleanly.
- name: Check whether the tbot unit is already installed
  ansible.builtin.stat:
    path: /etc/systemd/system/{{ tbot_unit_name }}.service
  register: tbot_unit_file

- name: Enable tbot
  ansible.builtin.systemd:
    name: "{{ tbot_unit_name }}.service"
    daemon_reload: true
    enabled: true
  when: tbot_unit_file.stat.exists or not ansible_check_mode

- name: Start tbot
  ansible.builtin.systemd:
    name: "{{ tbot_unit_name }}.service"
    state: started
  when:
    - teleport_cluster_available
    - tbot_unit_file.stat.exists or not ansible_check_mode

- name: Warn that tbot start was skipped
  ansible.builtin.debug:
    msg: >-
      Teleport proxy at {{ teleport_domain_name }} is unreachable (k8s cluster
      down?). tbot was enabled but NOT started/restarted; it will start on
      next boot, or rerun this role once the cluster is available.
  when: not teleport_cluster_available
