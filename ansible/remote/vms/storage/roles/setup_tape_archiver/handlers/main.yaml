---
# Both handlers skip when the Teleport proxy was unreachable during the run
# (see "Check whether the Teleport proxy is reachable" in tasks): tbot's
# restart would fail its readiness-gated start job outright. The trade-off is
# that a config change rolled out during a cluster outage keeps the OLD
# config running until the next boot or rerun — acceptable, since the
# services cannot do useful work without the cluster anyway.
- name: Restart tape-archiver tbot
  ansible.builtin.systemd:
    name: tape-archiver-tbot.service
    daemon_reload: true
    state: restarted
  when: tape_archiver_cluster_available

# Note: restart drains gracefully — the unit's ExecStop hands the worker up to
# tape_archiver_stop_timeout seconds to finish its in-flight activity.
- name: Restart tape-archiver data worker
  ansible.builtin.systemd:
    name: tape-archiver-data-worker.service
    daemon_reload: true
    state: restarted
  when: tape_archiver_cluster_available
