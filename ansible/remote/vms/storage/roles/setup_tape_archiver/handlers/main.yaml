---
# Skips when the Teleport proxy was unreachable during the run (fact set by
# roles/setup_tbot): the worker cannot do useful work without the cluster.
# The trade-off is that a config change rolled out during a cluster outage
# keeps the OLD config running until the next boot or rerun — acceptable.
#
# Note: restart drains gracefully — the unit's ExecStop hands the worker up to
# tape_archiver_stop_timeout seconds to finish its in-flight activity.
- name: Restart tape-archiver data worker
  ansible.builtin.systemd:
    name: tape-archiver-data-worker.service
    daemon_reload: true
    state: restarted
  when: teleport_cluster_available | default(false)
