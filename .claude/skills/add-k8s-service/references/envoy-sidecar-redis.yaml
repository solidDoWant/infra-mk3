# Reusable Envoy config for Dragonfly/Redis mTLS proxying.
#
# Uses file-based SDS so cert-manager rotations are hot-reloaded without a
# pod restart. The watched_directory entries inotify the mount directories;
# when k8s atomically swaps the ..data symlink on a Secret update, Envoy
# picks up the new cert content.
#
# Copy this to app/envoy-config/redis.yaml (or redis-only.yaml) and update:
#   - <service>-dragonfly.<namespace>.svc.cluster.local  → actual dragonfly service hostname
#
# Reference: cluster/gitops/development/harbor/app/envoy-config/redis-only.yaml
#
# LIMITATION: The redis_proxy filter does not support multiple database indexes (SELECT N).
# If the application uses more than one Redis database index, this config will not work —
# flag this to the user before proceeding (envoyproxy/envoy#41659).
# For single-database applications this config works correctly.

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 8000

# SDS requires node.id and node.cluster to be set (it sends them in the
# discovery request, even for file-based path_config_source). Values are
# arbitrary labels used only in stats/logs.
# UPDATE: set id to envoy-<service>-redis-proxy and cluster to <namespace>.
node:
  id: envoy-<service>-redis-proxy
  cluster: <namespace>

static_resources:
  clusters:
    - name: redis_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      load_assignment:
        cluster_name: redis_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # UPDATE: replace with the actual dragonfly service hostname
                      address: <service>-dragonfly.<namespace>.svc.cluster.local
                      port_value: 6379
      health_checks:
        - timeout: 1s
          interval: 3s
          unhealthy_threshold: 2
          healthy_threshold: 1
          custom_health_check:
            name: envoy.health_checkers.redis
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.health_checkers.redis.v3.Redis
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: redis_upstream_tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          common_tls_context:
            tls_params:
              # TLS 1.3 required by Dragonfly; Envoy caps TLS at 1.2 for clients by default
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
              signature_algorithms:
                # REQUIRED when the serving cert is Ed25519 (the chart default).
                # Envoy's BoringSSL supports Ed25519 but doesn't advertise it by
                # default, so without this the TLS 1.3 handshake fails with "no
                # suitable signature algorithm". Keep an RSA entry for the RSA
                # client cert's CertificateVerify. Omit only for RSA/ECDSA certs.
                - ed25519
                - rsa_pss_rsae_sha512
            tls_certificate_sds_secret_configs:
              - name: redis_client_cert
                sds_config:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/redis-client-cert-sds.yaml
                    watched_directory:
                      path: /etc/envoy/secrets/redis
            validation_context_sds_secret_config:
              name: redis_serving_cert
              sds_config:
                resource_api_version: V3
                path_config_source:
                  path: /etc/envoy/redis-validation-context-sds.yaml
                  watched_directory:
                    path: /etc/envoy/secrets/root-ca
          auto_host_sni: true
          auto_sni_san_validation: true
          # Dragonfly does not support TLS session resumption — resumed sessions fail to
          # authenticate. Disable it explicitly.
          max_session_keys: 0
      close_connections_on_host_health_failure: true
      ignore_health_on_host_removal: true

  listeners:
    - name: redis_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 6379
      filter_chains:
        - filters:
            - name: envoy.filters.network.redis_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.redis_proxy.v3.RedisProxy
                stat_prefix: egress_redis
                settings:
                  op_timeout: 5s
                  enable_redirection: true
                  dns_cache_config:
                    name: default
                    dns_lookup_family: V4_ONLY
                prefix_routes:
                  catch_all_route:
                    cluster: redis_cluster
