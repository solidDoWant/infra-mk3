# File-based SDS resource for the root CA used to validate the dragonfly
# serving cert.
#
# Copy this to app/envoy-config/redis-validation-context-sds.yaml.
# Hot-reloaded via watched_directory on /etc/envoy/secrets/root-ca in
# envoy.yaml — no pod restart needed when the root CA secret changes.
resources:
  - "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: redis_serving_cert
    validation_context:
      trusted_ca:
        filename: /etc/envoy/secrets/root-ca/ca.crt
