# Reusable Envoy config for PostgreSQL mTLS proxying.
#
# Uses file-based SDS so cert-manager rotations are hot-reloaded without a
# pod restart. The watched_directory entries inotify the mount directories;
# when k8s atomically swaps the ..data symlink on a Secret update, Envoy
# picks up the new cert content.
#
# Copy this to app/envoy-config/postgres.yaml (or similar) and update:
#   - <service>-postgres-17-rw.<namespace>.svc.cluster.local → actual hostname
#
# Reference implementation: cluster/gitops/media/bazarr/app/envoy-config/
# Note: Must use envoyproxy/envoy:contrib-vX.Y.Z — the postgres_proxy filter
# is contrib-only.

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 8000

# SDS requires node.id and node.cluster to be set (it sends them in the
# discovery request, even for file-based path_config_source). Values are
# arbitrary labels used only in stats/logs.
# UPDATE: set id to envoy-<service>-postgres-proxy and cluster to <namespace>.
node:
  id: envoy-<service>-postgres-proxy
  cluster: <namespace>

static_resources:
  clusters:
    - name: postgres_cluster
      connect_timeout: 1s
      type: STRICT_DNS
      load_assignment:
        cluster_name: postgres_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # UPDATE: replace with the actual postgres service hostname
                      address: <service>-postgres-17-rw.<namespace>.svc.cluster.local
                      port_value: 5432
      health_checks:
        - timeout: 1s
          interval: 3s
          unhealthy_threshold: 2
          healthy_threshold: 1
          tcp_health_check: {}
      dns_lookup_family: V4_ONLY
      transport_socket:
        name: postgres_upstream_tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.starttls.v3.UpstreamStartTlsConfig
          tls_socket_config:
            common_tls_context:
              tls_params:
                tls_minimum_protocol_version: TLSv1_3
                tls_maximum_protocol_version: TLSv1_3
                # REQUIRED when the postgres serving cert uses Ed25519 (the chart
                # default). Envoy embeds BoringSSL, which supports Ed25519 but does
                # NOT advertise `ed25519` in its default signature_algorithms list.
                # In TLS 1.3 the server signs the handshake with its serving-cert
                # key, so if the client never offers `ed25519` the OpenSSL-based
                # postgres rejects the connection with "no suitable signature
                # algorithm" (surfacing app-side as "connection requires a valid
                # client certificate"). Keep an RSA entry too, for the RSA client
                # cert's own CertificateVerify. Omit this block ONLY if the serving
                # cert is RSA/ECDSA (e.g. a .NET/C# app's cluster).
                signature_algorithms:
                  - ed25519
                  - rsa_pss_rsae_sha512
              tls_certificate_sds_secret_configs:
                - name: postgres_client_cert
                  sds_config:
                    resource_api_version: V3
                    path_config_source:
                      path: /etc/envoy/postgres-client-cert-sds.yaml
                      watched_directory:
                        path: /etc/envoy/secrets/postgres
              validation_context_sds_secret_config:
                name: postgres_serving_cert
                sds_config:
                  resource_api_version: V3
                  path_config_source:
                    path: /etc/envoy/postgres-validation-context-sds.yaml
                    watched_directory:
                      path: /etc/envoy/secrets/root-ca
            auto_host_sni: true
            auto_sni_san_validation: true
      close_connections_on_host_health_failure: true
      ignore_health_on_host_removal: true

  listeners:
    - name: postgres_listener
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 5432
      filter_chains:
        - filters:
            - name: envoy.filters.network.postgres_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.postgres_proxy.v3alpha.PostgresProxy
                stat_prefix: egress_postgres
                enable_sql_parsing: false
                upstream_ssl: REQUIRE
            - name: envoy.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tcp_postgres
                cluster: postgres_cluster
                # Disable idle timeout — let the application manage idle connections.
                # Some applications (e.g., Harbor) don't handle Envoy-terminated connections
                # gracefully, leading to errors on idle connection reuse.
                idle_timeout: 0s
